<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 200">
  <!-- Floor -->
  <rect width="250" height="200" fill="#f5ead0"/>
  <!-- Rug -->
  <rect x="60" y="80" width="130" height="90" rx="3" fill="#c9886e" opacity="0.3"/>
  <rect x="65" y="85" width="120" height="80" rx="2" fill="#c9886e" opacity="0.15"/>
  <!-- Bed -->
  <rect x="10" y="10" width="100" height="75" rx="4" fill="#d4c4a8"/>
  <rect x="12" y="12" width="96" height="18" rx="3" fill="#f5f0e0"/>
  <rect x="14" y="14" width="30" height="14" rx="6" fill="white"/>
  <!-- Blanket -->
  <rect x="12" y="30" width="96" height="50" rx="2" fill="#b8cfe0"/>
  <line x1="14" y1="50" x2="106" y2="50" stroke="#a0bbd0" stroke-width="0.5" opacity="0.5"/>
  <!-- Nightstand -->
  <rect x="120" y="15" width="35" height="30" rx="2" fill="#8b7355"/>
  <rect x="122" y="17" width="31" height="12" rx="1" fill="#a08060"/>
  <!-- Lamp -->
  <circle cx="137" cy="25" r="8" fill="#f5e6b8" opacity="0.6"/>
  <rect x="135" y="25" width="4" height="8" fill="#c4b090"/>
  <ellipse cx="137" cy="18" rx="7" ry="5" fill="#f0daa0"/>
  <!-- Wall decorations -->
  <rect x="180" y="20" width="40" height="30" rx="2" fill="none" stroke="#c4b090" stroke-width="1.5"/>
  <rect x="185" y="25" width="30" height="20" fill="#e8dcc8"/>
</svg>
