<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Floor tiles -->
  <rect width="300" height="200" fill="#f0ead4"/>
  <g stroke="#e0d8c0" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="50" x2="300" y2="50"/>
    <line x1="0" y1="100" x2="300" y2="100"/>
    <line x1="0" y1="150" x2="300" y2="150"/>
    <line x1="75" y1="0" x2="75" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="225" y1="0" x2="225" y2="200"/>
  </g>
  <!-- Counter top -->
  <rect x="0" y="0" width="300" height="50" rx="2" fill="#a08060"/>
  <rect x="2" y="2" width="296" height="46" rx="1" fill="#b89070"/>
  <!-- Stove -->
  <rect x="180" y="8" width="50" height="35" rx="3" fill="#404040"/>
  <circle cx="195" cy="22" r="8" fill="#505050"/>
  <circle cx="220" cy="22" r="8" fill="#505050"/>
  <circle cx="195" cy="22" r="4" fill="#606060"/>
  <circle cx="220" cy="22" r="4" fill="#606060"/>
  <!-- Sink -->
  <rect x="80" y="10" width="40" height="30" rx="5" fill="#d0d0d0"/>
  <ellipse cx="100" cy="25" rx="14" ry="8" fill="#e0e0e0"/>
  <circle cx="100" cy="8" r="3" fill="#c0c0c0"/>
  <!-- Table -->
  <rect x="80" y="100" width="140" height="70" rx="4" fill="#8b7355"/>
  <rect x="82" y="102" width="136" height="66" rx="3" fill="#a08060"/>
  <!-- Plate on table -->
  <ellipse cx="120" cy="130" rx="18" ry="12" fill="white"/>
  <ellipse cx="120" cy="129" rx="14" ry="9" fill="#fafaf5"/>
  <!-- Cup -->
  <circle cx="170" cy="125" r="8" fill="#f5e6b8"/>
  <circle cx="170" cy="124" r="6" fill="#c4a060" opacity="0.3"/>
  <!-- Fridge -->
  <rect x="250" y="5" width="40" height="60" rx="3" fill="#e0e0e0"/>
  <rect x="252" y="7" width="36" height="25" rx="2" fill="#d0d0d0"/>
  <rect x="252" y="35" width="36" height="28" rx="2" fill="#d0d0d0"/>
  <circle cx="285" cy="20" r="2" fill="#c0c0c0"/>
  <circle cx="285" cy="48" r="2" fill="#c0c0c0"/>
</svg>
