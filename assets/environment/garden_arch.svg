<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Left pillar -->
  <rect x="0" y="40" width="22" height="260" fill="#8b7355"/>
  <rect x="2" y="42" width="18" height="256" fill="#a08060"/>
  <!-- Right pillar -->
  <rect x="178" y="40" width="22" height="260" fill="#8b7355"/>
  <rect x="180" y="42" width="18" height="256" fill="#a08060"/>
  <!-- Arch top -->
  <path d="M0,50 Q100,-20 200,50" fill="none" stroke="#8b7355" stroke-width="22"/>
  <path d="M5,50 Q100,-10 195,50" fill="none" stroke="#a08060" stroke-width="16"/>
  <!-- Vines on arch -->
  <g fill="#4a8a3a" opacity="0.6">
    <path d="M30,40 Q40,20 50,40 Q40,35 30,40Z"/>
    <path d="M60,25 Q70,8 80,25 Q70,20 60,25Z"/>
    <path d="M110,15 Q120,0 130,18 Q120,12 110,15Z"/>
    <path d="M150,25 Q160,8 170,25 Q160,20 150,25Z"/>
  </g>
  <!-- Vine tendrils on pillars -->
  <g stroke="#4a8a3a" stroke-width="2" fill="none" opacity="0.5">
    <path d="M11,80 Q20,100 11,120 Q0,140 11,160"/>
    <path d="M189,90 Q180,110 189,130 Q198,150 189,170"/>
  </g>
  <!-- Tiny flowers on vines -->
  <g fill="#c9886e" opacity="0.5">
    <circle cx="15" cy="110" r="3"/>
    <circle cx="5" cy="150" r="2.5"/>
    <circle cx="185" cy="120" r="3"/>
    <circle cx="195" cy="160" r="2.5"/>
  </g>
  <g fill="#d4a843" opacity="0.4">
    <circle cx="15" cy="110" r="1.5"/>
    <circle cx="5" cy="150" r="1.2"/>
    <circle cx="185" cy="120" r="1.5"/>
    <circle cx="195" cy="160" r="1.2"/>
  </g>
  <!-- Pillar base decoration -->
  <rect x="-5" y="290" width="32" height="10" rx="2" fill="#7a6348"/>
  <rect x="173" y="290" width="32" height="10" rx="2" fill="#7a6348"/>
</svg>
