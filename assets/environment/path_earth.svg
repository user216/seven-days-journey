  <g fill="#b89868" opacity="0.4">
    <ellipse cx="30" cy="15" rx="15" ry="5"/>
    <ellipse cx="80" cy="12" rx="12" ry="4"/>
    <ellipse cx="130" cy="18" rx="14" ry="5"/>
    <ellipse cx="180" cy="14" rx="10" ry="4"/>
  </g>
  <!-- Edge stones -->
  <g fill="#d4c498" opacity="0.3">
    <circle cx="10" cy="5" r="4"/>
    <circle cx="50" cy="26" r="3"/>
    <circle cx="100" cy="4" r="3.5"/>
    <circle cx="150" cy="27" r="3"/>
    <circle cx="190" cy="5" r="4"/>
  </g>
  <!-- Top/bottom edges -->
  <line x1="0" y1="1" x2="200" y2="1" stroke="#a08858" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="29" x2="200" y2="29" stroke="#a08858" stroke-width="1" opacity="0.3"/>
