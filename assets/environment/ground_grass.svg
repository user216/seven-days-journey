<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <!-- Base soil -->
  <rect width="200" height="100" fill="#5a8a3a"/>
  <!-- Grass variation -->
  <g fill="#4a7a2a" opacity="0.4">
    <ellipse cx="30" cy="20" rx="25" ry="10"/>
    <ellipse cx="100" cy="15" rx="30" ry="12"/>
    <ellipse cx="170" cy="22" rx="22" ry="9"/>
  </g>
  <!-- Individual grass blades -->
  <g stroke="#3a6a20" stroke-width="1.5" fill="none" opacity="0.4">
    <line x1="15" y1="30" x2="12" y2="10"/>
    <line x1="20" y1="30" x2="23" y2="12"/>
    <line x1="55" y1="25" x2="52" y2="8"/>
    <line x1="60" y1="25" x2="63" y2="10"/>
    <line x1="95" y1="28" x2="92" y2="6"/>
    <line x1="100" y1="28" x2="103" y2="8"/>
    <line x1="135" y1="25" x2="132" y2="9"/>
    <line x1="140" y1="25" x2="143" y2="7"/>
    <line x1="175" y1="30" x2="172" y2="12"/>
    <line x1="180" y1="30" x2="183" y2="10"/>
  </g>
  <!-- Tiny flowers -->
  <g fill="#e8c060" opacity="0.4">
    <circle cx="45" cy="40" r="2"/>
    <circle cx="120" cy="35" r="2.5"/>
    <circle cx="185" cy="45" r="2"/>
  </g>
</svg>
