<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Night sky through window -->
  <rect x="20" y="20" width="360" height="460" fill="#0d1b3e"/>
  <!-- Stars -->
  <g fill="#f5e6b8">
    <circle cx="80" cy="80" r="2" opacity="0.7"/>
    <circle cx="150" cy="50" r="1.5" opacity="0.5"/>
    <circle cx="220" cy="90" r="2.5" opacity="0.6"/>
    <circle cx="300" cy="60" r="1.8" opacity="0.55"/>
    <circle cx="350" cy="120" r="1.5" opacity="0.45"/>
    <circle cx="100" cy="150" r="2" opacity="0.5"/>
    <circle cx="260" cy="170" r="1.8" opacity="0.6"/>
    <circle cx="180" cy="200" r="2.2" opacity="0.5"/>
    <circle cx="330" cy="220" r="1.5" opacity="0.45"/>
    <circle cx="70" cy="250" r="2" opacity="0.55"/>
    <circle cx="280" cy="300" r="1.8" opacity="0.5"/>
    <circle cx="120" cy="350" r="2" opacity="0.4"/>
  </g>
  <!-- Moon -->
  <circle cx="320" cy="100" r="28" fill="#f0f0e0" opacity="0.8"/>
  <circle cx="330" cy="92" r="22" fill="#0d1b3e" opacity="0.8"/>
  <!-- Window frame - outer -->
  <rect x="0" y="0" width="400" height="500" rx="6" fill="none" stroke="#8b7355" stroke-width="20"/>
  <!-- Cross bars -->
  <line x1="200" y1="10" x2="200" y2="490" stroke="#8b7355" stroke-width="10"/>
  <line x1="10" y1="250" x2="390" y2="250" stroke="#8b7355" stroke-width="10"/>
  <!-- Frame inner highlight -->
  <rect x="15" y="15" width="370" height="470" rx="3" fill="none" stroke="#a08868" stroke-width="1.5" opacity="0.5"/>
</svg>
