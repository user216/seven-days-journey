<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960">
  <!-- Sky gradient bands -->
  <rect y="0" width="540" height="400" fill="#0d1b3e"/>
  <rect y="400" width="540" height="200" fill="#152848"/>
  <rect y="600" width="540" height="360" fill="#1a3058"/>
  <!-- Stars -->
  <g fill="#f5e6b8">
    <circle cx="60" cy="80" r="2" opacity="0.7"/>
    <circle cx="140" cy="40" r="1.5" opacity="0.5"/>
    <circle cx="220" cy="100" r="2.5" opacity="0.65"/>
    <circle cx="310" cy="55" r="1.8" opacity="0.5"/>
    <circle cx="400" cy="90" r="2" opacity="0.55"/>
    <circle cx="480" cy="30" r="1.5" opacity="0.6"/>
    <circle cx="90" cy="180" r="1.8" opacity="0.45"/>
    <circle cx="200" cy="220" r="2" opacity="0.5"/>
    <circle cx="350" cy="160" r="2.2" opacity="0.6"/>
    <circle cx="450" cy="200" r="1.5" opacity="0.5"/>
    <circle cx="120" cy="300" r="2" opacity="0.55"/>
    <circle cx="280" cy="320" r="1.8" opacity="0.45"/>
    <circle cx="430" cy="280" r="2" opacity="0.5"/>
    <circle cx="70" cy="400" r="1.5" opacity="0.4"/>
    <circle cx="250" cy="450" r="2" opacity="0.45"/>
    <circle cx="380" cy="380" r="1.8" opacity="0.5"/>
