  </g>
  <!-- Star crosses (twinkle) -->
  <g stroke="#f5e6b8" stroke-width="0.8" opacity="0.4">
    <line x1="220" y1="97" x2="220" y2="103"/>
    <line x1="217" y1="100" x2="223" y2="100"/>
    <line x1="350" y1="157" x2="350" y2="163"/>
    <line x1="347" y1="160" x2="353" y2="160"/>
    <line x1="60" y1="77" x2="60" y2="83"/>
    <line x1="57" y1="80" x2="63" y2="80"/>
  </g>
  <!-- Moon -->
  <circle cx="440" cy="120" r="35" fill="#f0f0e0" opacity="0.8"/>
  <circle cx="452" cy="110" r="28" fill="#0d1b3e" opacity="0.8"/>
  <!-- Moon craters -->
  <circle cx="432" cy="130" r="4" fill="#e0e0d0" opacity="0.15"/>
  <circle cx="440" cy="115" r="2.5" fill="#e0e0d0" opacity="0.12"/>
  <!-- Subtle ground -->
  <path d="M0,850 Q100,830 200,845 Q350,825 540,850 L540,960 L0,960Z" fill="#0a1530" opacity="0.5"/>
