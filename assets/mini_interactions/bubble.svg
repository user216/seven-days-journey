<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Outer glow -->
  <circle cx="30" cy="30" r="28" fill="#fff" opacity="0.08"/>
  <!-- Bubble body -->
  <circle cx="30" cy="30" r="24" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Inner gradient hint -->
  <circle cx="30" cy="32" r="20" fill="#c0d8ff" opacity="0.08"/>
  <!-- Specular highlight -->
  <ellipse cx="22" cy="22" rx="7" ry="5" fill="white" opacity="0.35" transform="rotate(-20,22,22)"/>
  <circle cx="20" cy="19" r="3" fill="white" opacity="0.45"/>
  <!-- Bottom reflection -->
  <ellipse cx="34" cy="42" rx="5" ry="2" fill="white" opacity="0.12"/>
</svg>
