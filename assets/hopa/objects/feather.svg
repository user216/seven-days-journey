<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Main feather gradient - green to blue to gold -->
    <linearGradient id="featherMain" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2E8B6E"/>
      <stop offset="30%" stop-color="#3A9B7A"/>
      <stop offset="55%" stop-color="#3888A8"/>
      <stop offset="75%" stop-color="#4A78B0"/>
      <stop offset="100%" stop-color="#5A68A0"/>
    </linearGradient>
    <!-- Feather shimmer - golden iridescence -->
    <linearGradient id="featherShimmer" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#F5D978" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#E8C840" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#B8D8A0" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#80C8D0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F5D978" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Eye gradient - peacock eye spot -->
    <radialGradient id="eyeOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2E8B6E"/>
      <stop offset="35%" stop-color="#3A9B7A"/>
      <stop offset="65%" stop-color="#4A78B0"/>
      <stop offset="100%" stop-color="#2E5A8E"/>
    </radialGradient>
    <radialGradient id="eyeInner" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F5E8A0"/>
      <stop offset="40%" stop-color="#E8C840"/>
      <stop offset="70%" stop-color="#D4A020"/>
      <stop offset="100%" stop-color="#B88820"/>
    </radialGradient>
    <radialGradient id="eyeCenter" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="60%" stop-color="#142A48"/>
      <stop offset="100%" stop-color="#0E1E38"/>
    </radialGradient>
    <!-- Quill gradient -->
    <linearGradient id="quillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5ECD7"/>
      <stop offset="30%" stop-color="#E8D9BF"/>
      <stop offset="70%" stop-color="#D4C4A8"/>
      <stop offset="100%" stop-color="#C0B090"/>
    </linearGradient>
    <!-- Barb dark side -->
    <linearGradient id="barbDark" x1="1" y1="0" x2="0" y2="0.3">
      <stop offset="0%" stop-color="#1E6B50"/>
      <stop offset="50%" stop-color="#2A7860"/>
      <stop offset="100%" stop-color="#306848"/>
    </linearGradient>
    <filter id="featherShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1A3A28" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Feather body - curved overall shape -->
  <g filter="url(#featherShadow)">
    <!-- Right side barbs (darker, shadow side) -->
    <path d="M62,8 C72,14 80,22 84,30 C86,34 76,26 62,16Z" fill="url(#barbDark)" opacity="0.8"/>
    <path d="M64,20 C76,28 86,38 90,48 C91,52 80,40 64,28Z" fill="url(#barbDark)" opacity="0.8"/>
    <path d="M65,34 C78,44 90,56 92,66 C93,70 82,58 65,42Z" fill="url(#barbDark)" opacity="0.8"/>
    <path d="M64,50 C76,58 86,70 88,80 C89,84 78,72 64,58Z" fill="url(#barbDark)" opacity="0.7"/>

    <!-- Left side barbs (lighter, lit side) -->
    <path d="M58,8 C46,16 36,26 32,34 C30,38 42,28 58,16Z" fill="url(#featherMain)" opacity="0.85"/>
    <path d="M56,22 C42,32 30,44 26,54 C24,58 36,46 56,32Z" fill="url(#featherMain)" opacity="0.85"/>
    <path d="M54,38 C38,50 26,64 24,74 C22,78 34,66 54,48Z" fill="url(#featherMain)" opacity="0.8"/>
    <path d="M53,54 C40,64 30,76 28,86 C26,90 38,78 53,62Z" fill="url(#featherMain)" opacity="0.75"/>

    <!-- Shimmer overlay on barbs -->
    <path d="M58,8 C46,16 36,26 32,34 C30,38 42,28 58,16Z" fill="url(#featherShimmer)"/>
    <path d="M56,22 C42,32 30,44 26,54 C24,58 36,46 56,32Z" fill="url(#featherShimmer)"/>
    <path d="M54,38 C38,50 26,64 24,74 C22,78 34,66 54,48Z" fill="url(#featherShimmer)"/>

    <!-- Central rachis (quill shaft) -->
    <path d="M60,6 C59,30 58,60 56,90 C55,100 54,108 54,114"
          fill="none" stroke="url(#quillGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Rachis highlight -->
    <path d="M60,6 C59,30 58,60 56,90 C55,100 54,108 54,114"
          fill="none" stroke="#FFF8EC" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

    <!-- Peacock eye spot - positioned in upper third -->
    <!-- Outer ring -->
    <ellipse cx="54" cy="36" rx="12" ry="14" fill="url(#eyeOuter)" stroke="#1E5A40" stroke-width="0.5" transform="rotate(-5 54 36)"/>
    <!-- Middle ring - golden -->
    <ellipse cx="54" cy="35" rx="8" ry="10" fill="url(#eyeInner)" transform="rotate(-5 54 35)"/>
    <!-- Inner dark center -->
    <ellipse cx="54" cy="34" rx="4.5" ry="6" fill="url(#eyeCenter)" transform="rotate(-5 54 34)"/>
    <!-- Eye highlight -->
    <ellipse cx="52" cy="31" rx="2" ry="2.5" fill="#FFFFFF" opacity="0.4" transform="rotate(-5 52 31)"/>
    <!-- Eye rim glow -->
    <ellipse cx="54" cy="36" rx="12" ry="14" fill="none" stroke="#80C8D0" stroke-width="0.8" opacity="0.3" transform="rotate(-5 54 36)"/>
  </g>

  <!-- Fine barb lines (texture detail) -->
  <g stroke="#2E8B6E" stroke-width="0.3" opacity="0.4">
    <line x1="58" y1="10" x2="44" y2="20"/>
    <line x1="57" y1="15" x2="40" y2="28"/>
    <line x1="56" y1="50" x2="36" y2="66"/>
    <line x1="55" y1="58" x2="34" y2="74"/>
    <line x1="55" y1="66" x2="36" y2="82"/>
    <line x1="54" y1="74" x2="40" y2="88"/>
  </g>
  <g stroke="#1E6B50" stroke-width="0.3" opacity="0.35">
    <line x1="62" y1="12" x2="76" y2="24"/>
    <line x1="63" y1="18" x2="80" y2="34"/>
    <line x1="64" y1="44" x2="82" y2="62"/>
    <line x1="63" y1="52" x2="80" y2="70"/>
    <line x1="62" y1="62" x2="78" y2="78"/>
    <line x1="60" y1="72" x2="74" y2="86"/>
  </g>

  <!-- Quill tip at bottom -->
  <path d="M54,110 C54,112 53.5,115 53,118 C52.8,119 53.2,119 53.5,118 C54,115 54.5,112 55,110"
        fill="url(#quillGrad)" stroke="#C0B090" stroke-width="0.3"/>

  <!-- Iridescent shimmer streaks -->
  <path d="M48,22 C44,28 40,36 38,42" fill="none" stroke="#80C8D0" stroke-width="0.6" opacity="0.3"/>
  <path d="M50,56 C46,64 42,72 40,78" fill="none" stroke="#F5D978" stroke-width="0.5" opacity="0.25"/>
</svg>