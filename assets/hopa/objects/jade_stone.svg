<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="jade-body" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#7cb88c"/>
      <stop offset="40%" stop-color="#4a8c5c"/>
      <stop offset="80%" stop-color="#2e6b40"/>
      <stop offset="100%" stop-color="#1e5030"/>
    </radialGradient>
    <radialGradient id="jade-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#90d8a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2e6b40" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jade-vein1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a0d8a8" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a0d8a8" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#b8e8bc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a0d8a8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="jade-vein2" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#90c898" stop-opacity="0"/>
      <stop offset="40%" stop-color="#b0e0b4" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#c8f0cc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#90c898" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="jade-specular" cx="0.35" cy="0.3" r="0.3">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Soft outer glow -->
  <ellipse cx="60" cy="64" rx="48" ry="36" fill="url(#jade-glow)"/>
  <!-- Shadow on surface -->
  <ellipse cx="62" cy="92" rx="36" ry="8" fill="#1e3020" opacity="0.2"/>
  <!-- Main stone body (smooth oval) -->
  <ellipse cx="60" cy="62" rx="40" ry="30" fill="url(#jade-body)"/>
  <!-- Light veins across stone -->
  <path d="M28 55 Q42 48 58 52 Q74 56 88 50" fill="none" stroke="url(#jade-vein1)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M34 70 Q50 64 66 68 Q82 72 92 66" fill="none" stroke="url(#jade-vein2)" stroke-width="2" stroke-linecap="round"/>
  <path d="M40 58 Q52 54 60 60 Q70 66 78 62" fill="none" stroke="url(#jade-vein1)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Subtle inner depth markings -->
  <ellipse cx="50" cy="58" rx="12" ry="8" fill="#5a9c6c" opacity="0.15"/>
  <ellipse cx="72" cy="68" rx="10" ry="6" fill="#3a7c4c" opacity="0.12"/>
  <!-- Specular highlight (polished surface) -->
  <ellipse cx="48" cy="52" rx="16" ry="10" fill="url(#jade-specular)"/>
  <!-- Small secondary highlight -->
  <ellipse cx="70" cy="72" rx="6" ry="4" fill="white" opacity="0.1"/>
  <!-- Edge rim light -->
  <path d="M24 68 Q22 58 28 48" fill="none" stroke="#a0d8a8" stroke-width="1" opacity="0.25"/>
</svg>
