<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Upper wing gradient - soft purple to lavender -->
    <radialGradient id="wingUpperL" cx="35%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#E8D5F0"/>
      <stop offset="40%" stop-color="#C9A0DC"/>
      <stop offset="75%" stop-color="#9B6CB0"/>
      <stop offset="100%" stop-color="#7B4F9A"/>
    </radialGradient>
    <radialGradient id="wingUpperR" cx="65%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#E8D5F0"/>
      <stop offset="40%" stop-color="#C9A0DC"/>
      <stop offset="75%" stop-color="#9B6CB0"/>
      <stop offset="100%" stop-color="#7B4F9A"/>
    </radialGradient>
    <!-- Lower wing gradient - warm golden yellow -->
    <radialGradient id="wingLowerL" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF5D4"/>
      <stop offset="45%" stop-color="#F5D978"/>
      <stop offset="80%" stop-color="#E8B830"/>
      <stop offset="100%" stop-color="#D4A020"/>
    </radialGradient>
    <radialGradient id="wingLowerR" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF5D4"/>
      <stop offset="45%" stop-color="#F5D978"/>
      <stop offset="80%" stop-color="#E8B830"/>
      <stop offset="100%" stop-color="#D4A020"/>
    </radialGradient>
    <!-- Body gradient -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3E6B"/>
      <stop offset="50%" stop-color="#4A2E5A"/>
      <stop offset="100%" stop-color="#3A1E4A"/>
    </linearGradient>
    <!-- Wing spot highlight -->
    <radialGradient id="spotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F0E0FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9A0DC" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft shadow -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#4A2E5A" flood-opacity="0.2"/>
    </filter>
    <filter id="wingGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Left upper wing -->
  <path d="M58,52 C48,28 20,12 14,22 C8,32 12,50 22,56 C30,60 46,58 58,52Z"
        fill="url(#wingUpperL)" stroke="#7B4F9A" stroke-width="0.8" filter="url(#softShadow)"/>
  <!-- Wing veins left upper -->
  <path d="M56,52 C46,38 30,28 22,32" fill="none" stroke="#9B6CB0" stroke-width="0.5" opacity="0.5"/>
  <path d="M54,54 C44,42 28,38 20,44" fill="none" stroke="#9B6CB0" stroke-width="0.4" opacity="0.4"/>
  <!-- Spot on left upper wing -->
  <ellipse cx="32" cy="38" rx="7" ry="6" fill="url(#spotGlow)"/>
  <ellipse cx="32" cy="38" rx="4" ry="3.5" fill="#F5D978" opacity="0.6"/>

  <!-- Right upper wing -->
  <path d="M62,52 C72,28 100,12 106,22 C112,32 108,50 98,56 C90,60 74,58 62,52Z"
        fill="url(#wingUpperR)" stroke="#7B4F9A" stroke-width="0.8" filter="url(#softShadow)"/>
  <!-- Wing veins right upper -->
  <path d="M64,52 C74,38 90,28 98,32" fill="none" stroke="#9B6CB0" stroke-width="0.5" opacity="0.5"/>
  <path d="M66,54 C76,42 92,38 100,44" fill="none" stroke="#9B6CB0" stroke-width="0.4" opacity="0.4"/>
  <!-- Spot on right upper wing -->
  <ellipse cx="88" cy="38" rx="7" ry="6" fill="url(#spotGlow)"/>
  <ellipse cx="88" cy="38" rx="4" ry="3.5" fill="#F5D978" opacity="0.6"/>

  <!-- Left lower wing -->
  <path d="M56,58 C42,62 18,72 16,82 C14,92 28,96 38,88 C46,82 54,68 56,58Z"
        fill="url(#wingLowerL)" stroke="#D4A020" stroke-width="0.7" filter="url(#softShadow)"/>
  <!-- Small spot on lower wing -->
  <ellipse cx="30" cy="78" rx="5" ry="4" fill="url(#spotGlow)" opacity="0.7"/>

  <!-- Right lower wing -->
  <path d="M64,58 C78,62 102,72 104,82 C106,92 92,96 82,88 C74,82 66,68 64,58Z"
        fill="url(#wingLowerR)" stroke="#D4A020" stroke-width="0.7" filter="url(#softShadow)"/>
  <!-- Small spot on lower wing -->
  <ellipse cx="90" cy="78" rx="5" ry="4" fill="url(#spotGlow)" opacity="0.7"/>

  <!-- Body -->
  <ellipse cx="60" cy="60" rx="4" ry="18" fill="url(#bodyGrad)" stroke="#3A1E4A" stroke-width="0.5"/>
  <!-- Body segments -->
  <line x1="56" y1="50" x2="64" y2="50" stroke="#5A3E6B" stroke-width="0.4" opacity="0.5"/>
  <line x1="56" y1="55" x2="64" y2="55" stroke="#5A3E6B" stroke-width="0.4" opacity="0.5"/>
  <line x1="56" y1="60" x2="64" y2="60" stroke="#5A3E6B" stroke-width="0.4" opacity="0.5"/>
  <line x1="56" y1="65" x2="64" y2="65" stroke="#5A3E6B" stroke-width="0.4" opacity="0.5"/>

  <!-- Head -->
  <circle cx="60" cy="40" r="4" fill="#4A2E5A" stroke="#3A1E4A" stroke-width="0.5"/>
  <!-- Eyes -->
  <circle cx="58.5" cy="39" r="1" fill="#E8D5F0"/>
  <circle cx="61.5" cy="39" r="1" fill="#E8D5F0"/>

  <!-- Left antenna -->
  <path d="M58,37 C52,22 42,16 38,14" fill="none" stroke="#5A3E6B" stroke-width="1" stroke-linecap="round"/>
  <circle cx="38" cy="14" r="2.5" fill="#C9A0DC" stroke="#9B6CB0" stroke-width="0.5"/>
  <!-- Right antenna -->
  <path d="M62,37 C68,22 78,16 82,14" fill="none" stroke="#5A3E6B" stroke-width="1" stroke-linecap="round"/>
  <circle cx="82" cy="14" r="2.5" fill="#C9A0DC" stroke="#9B6CB0" stroke-width="0.5"/>

  <!-- Wing edge highlights -->
  <path d="M14,22 C20,14 40,18 50,30" fill="none" stroke="#E8D5F0" stroke-width="0.6" opacity="0.5"/>
  <path d="M106,22 C100,14 80,18 70,30" fill="none" stroke="#E8D5F0" stroke-width="0.6" opacity="0.5"/>
</svg>