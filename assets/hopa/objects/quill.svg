<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="qlShaft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3040"/>
      <stop offset="30%" stop-color="#504060"/>
      <stop offset="50%" stop-color="#605070"/>
      <stop offset="70%" stop-color="#483858"/>
      <stop offset="100%" stop-color="#2a2030"/>
    </linearGradient>
    <linearGradient id="qlBarb1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2535"/>
      <stop offset="30%" stop-color="#403550"/>
      <stop offset="60%" stop-color="#584870"/>
      <stop offset="100%" stop-color="#3a3048"/>
    </linearGradient>
    <linearGradient id="qlBarb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#383040"/>
      <stop offset="40%" stop-color="#4a3d5a"/>
      <stop offset="100%" stop-color="#2d2538"/>
    </linearGradient>
    <linearGradient id="qlIridescent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a4878" stop-opacity="0.4"/>
      <stop offset="25%" stop-color="#3a6888" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#488068" stop-opacity="0.25"/>
      <stop offset="75%" stop-color="#5a4878" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#784868" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="qlNib" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8a060"/>
      <stop offset="40%" stop-color="#a08840"/>
      <stop offset="100%" stop-color="#807030"/>
    </linearGradient>
    <linearGradient id="qlNibTip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#908040"/>
      <stop offset="100%" stop-color="#605020"/>
    </linearGradient>
    <radialGradient id="qlInk" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="70%" stop-color="#2a1840" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2a1840" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Ink drops on surface -->
  <ellipse cx="98" cy="108" rx="6" ry="2.5" fill="url(#qlInk)" opacity="0.4"/>
  <circle cx="102" cy="104" r="2" fill="#1a1030" opacity="0.3"/>
  <circle cx="95" cy="110" r="1.2" fill="#1a1030" opacity="0.25"/>
  <!-- Main shaft (rachis) - diagonal -->
  <line x1="14" y1="10" x2="105" y2="108" stroke="url(#qlShaft)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shaft highlight -->
  <line x1="15" y1="9" x2="104" y2="107" stroke="#706080" stroke-width="0.6" opacity="0.5"/>
  <!-- Left barbs (upper/left side of feather) -->
  <g fill="url(#qlBarb1)" stroke="none">
    <path d="M 18 14 Q 8 20 6 30 Q 12 24 22 18 Z" opacity="0.9"/>
    <path d="M 25 20 Q 12 28 8 40 Q 16 32 29 24 Z" opacity="0.85"/>
    <path d="M 32 27 Q 16 36 10 50 Q 22 40 36 31 Z" opacity="0.9"/>
    <path d="M 39 34 Q 22 44 15 58 Q 28 48 43 38 Z" opacity="0.85"/>
    <path d="M 46 41 Q 28 52 20 66 Q 34 55 50 45 Z" opacity="0.88"/>
    <path d="M 53 48 Q 34 60 26 74 Q 40 63 57 52 Z" opacity="0.85"/>
    <path d="M 60 55 Q 42 66 35 78 Q 48 68 64 59 Z" opacity="0.82"/>
    <path d="M 67 62 Q 50 72 44 82 Q 55 74 71 66 Z" opacity="0.78"/>
    <path d="M 74 69 Q 60 78 55 86 Q 64 80 78 73 Z" opacity="0.7"/>
  </g>
  <!-- Right barbs (lower/right side of feather) -->
  <g fill="url(#qlBarb2)" stroke="none">
    <path d="M 22 18 Q 30 10 42 8 Q 32 14 26 22 Z" opacity="0.85"/>
    <path d="M 29 25 Q 38 16 52 12 Q 40 20 33 29 Z" opacity="0.88"/>
    <path d="M 36 32 Q 48 22 60 18 Q 48 28 40 36 Z" opacity="0.85"/>
    <path d="M 43 39 Q 56 28 68 24 Q 56 34 47 43 Z" opacity="0.82"/>
    <path d="M 50 46 Q 64 36 76 32 Q 64 40 54 50 Z" opacity="0.8"/>
    <path d="M 57 53 Q 70 44 82 40 Q 70 48 61 57 Z" opacity="0.78"/>
    <path d="M 64 60 Q 76 52 86 50 Q 76 56 68 64 Z" opacity="0.74"/>
    <path d="M 71 67 Q 82 60 90 58 Q 82 64 75 71 Z" opacity="0.68"/>
    <path d="M 78 74 Q 86 68 94 66 Q 88 72 82 78 Z" opacity="0.6"/>
  </g>
  <!-- Iridescent sheen overlay -->
  <path d="M 18 14 Q 6 30 8 50 Q 15 65 35 78 Q 48 68 60 55 Q 42 66 26 74 L 53 48 Q 34 60 20 66 L 46 41 Q 28 52 15 58 L 39 34 Q 22 44 10 50 L 32 27 Q 16 36 8 40 L 25 20 Q 12 28 6 30 Z" fill="url(#qlIridescent)" opacity="0.5"/>
  <!-- Feather detail lines (barb separations) -->
  <g stroke="#4a3858" stroke-width="0.3" opacity="0.3">
    <line x1="30" y1="28" x2="16" y2="38"/>
    <line x1="44" y1="40" x2="28" y2="52"/>
    <line x1="58" y1="53" x2="42" y2="64"/>
    <line x1="72" y1="66" x2="58" y2="76"/>
  </g>
  <!-- Metal ferrule (nib holder) -->
  <path d="M 84 78 L 90 85 L 108 110 L 104 112 L 86 86 L 82 80 Z" fill="#a09048" stroke="#807030" stroke-width="0.5"/>
  <!-- Ferrule band -->
  <line x1="86" y1="84" x2="90" y2="87" stroke="#c8b868" stroke-width="1.5"/>
  <line x1="85" y1="82" x2="89" y2="85" stroke="#d8c878" stroke-width="0.5" opacity="0.6"/>
  <!-- Metal nib -->
  <path d="M 96 98 L 110 115 L 106 116 L 92 100 Z" fill="url(#qlNib)" stroke="#706028" stroke-width="0.4"/>
  <!-- Nib slit -->
  <line x1="100" y1="102" x2="108" y2="114" stroke="#605020" stroke-width="0.4"/>
  <!-- Nib tip -->
  <path d="M 108 114 L 112 118 L 110 116 Z" fill="url(#qlNibTip)"/>
  <!-- Nib highlight -->
  <line x1="97" y1="98" x2="108" y2="112" stroke="#d8c880" stroke-width="0.4" opacity="0.5"/>
  <!-- Ink on nib tip -->
  <circle cx="111" cy="117" r="1.5" fill="#1a1030" opacity="0.7"/>
  <!-- Feather tip highlight -->
  <path d="M 16 12 Q 20 8 26 10" fill="none" stroke="#807090" stroke-width="0.5" opacity="0.4"/>
</svg>
