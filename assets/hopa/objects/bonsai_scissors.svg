<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="blade-l" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#a0a8b0"/>
      <stop offset="40%" stop-color="#788088"/>
      <stop offset="80%" stop-color="#585e64"/>
      <stop offset="100%" stop-color="#404448"/>
    </linearGradient>
    <linearGradient id="blade-r" x1="1" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#98a0a8"/>
      <stop offset="40%" stop-color="#707880"/>
      <stop offset="80%" stop-color="#505458"/>
      <stop offset="100%" stop-color="#383c40"/>
    </linearGradient>
    <linearGradient id="blade-edge-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0c8d0"/>
      <stop offset="100%" stop-color="#808890"/>
    </linearGradient>
    <linearGradient id="blade-edge-r" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#b8c0c8"/>
      <stop offset="100%" stop-color="#788088"/>
    </linearGradient>
    <linearGradient id="handle-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c09060"/>
      <stop offset="40%" stop-color="#a07848"/>
      <stop offset="100%" stop-color="#7a5830"/>
    </linearGradient>
    <linearGradient id="handle-r" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b88858"/>
      <stop offset="40%" stop-color="#987040"/>
      <stop offset="100%" stop-color="#705028"/>
    </linearGradient>
    <radialGradient id="pivot" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#d0d4d8"/>
      <stop offset="50%" stop-color="#909498"/>
      <stop offset="100%" stop-color="#606468"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="62" cy="104" rx="32" ry="5" fill="#3a3028" opacity="0.15"/>
  <!-- Left handle (curved loop, lower-left) -->
  <path d="M36,90 Q18,88 16,72 Q14,58 30,56" fill="none" stroke="url(#handle-l)" stroke-width="7" stroke-linecap="round"/>
  <!-- Left handle wood grain highlight -->
  <path d="M32,86 Q22,84 20,74 Q18,64 30,60" fill="none" stroke="#d0a870" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Right handle (curved loop, lower-right) -->
  <path d="M84,90 Q102,88 104,72 Q106,58 90,56" fill="none" stroke="url(#handle-r)" stroke-width="7" stroke-linecap="round"/>
  <!-- Right handle wood grain highlight -->
  <path d="M88,86 Q98,84 100,74 Q102,64 90,60" fill="none" stroke="#c8a068" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <!-- Left blade (crossing to upper-right) -->
  <path d="M30,56 L74,22" fill="none" stroke="url(#blade-l)" stroke-width="6" stroke-linecap="round"/>
  <!-- Left blade cutting edge highlight -->
  <path d="M34,54 L72,24" fill="none" stroke="url(#blade-edge-l)" stroke-width="1.2" opacity="0.5"/>
  <!-- Left blade tip -->
  <circle cx="74" cy="22" r="2" fill="#a0a8b0"/>
  <!-- Right blade (crossing to upper-left) -->
  <path d="M90,56 L46,22" fill="none" stroke="url(#blade-r)" stroke-width="6" stroke-linecap="round"/>
  <!-- Right blade cutting edge highlight -->
  <path d="M86,54 L48,24" fill="none" stroke="url(#blade-edge-r)" stroke-width="1.2" opacity="0.5"/>
  <!-- Right blade tip -->
  <circle cx="46" cy="22" r="2" fill="#98a0a8"/>
  <!-- Pivot screw (center, where blades cross) -->
  <circle cx="60" cy="40" r="6" fill="url(#pivot)"/>
  <circle cx="60" cy="40" r="3" fill="#808488"/>
  <!-- Pivot screw slot -->
  <line x1="58" y1="40" x2="62" y2="40" stroke="#606468" stroke-width="1.2"/>
  <!-- Pivot screw highlight -->
  <circle cx="58" cy="38" r="1.5" fill="white" opacity="0.25"/>
  <!-- Blade specular reflections -->
  <line x1="40" y1="50" x2="62" y2="32" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="80" y1="50" x2="58" y2="32" stroke="white" stroke-width="1" opacity="0.12"/>
</svg>
