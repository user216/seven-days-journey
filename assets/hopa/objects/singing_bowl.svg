<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bowl-body" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#e8c868"/>
      <stop offset="50%" stop-color="#c8a040"/>
      <stop offset="100%" stop-color="#a07828"/>
    </radialGradient>
    <linearGradient id="bowl-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="100%" stop-color="#d0a840"/>
    </linearGradient>
    <linearGradient id="bowl-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b08830"/>
      <stop offset="100%" stop-color="#906818"/>
    </linearGradient>
    <linearGradient id="mallet-wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a07040"/>
      <stop offset="50%" stop-color="#c09060"/>
      <stop offset="100%" stop-color="#8b5e34"/>
    </linearGradient>
    <radialGradient id="mallet-head" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#d0a870"/>
      <stop offset="100%" stop-color="#8b6530"/>
    </radialGradient>
  </defs>
  <!-- Bowl body - elliptical shape -->
  <ellipse cx="55" cy="78" rx="38" ry="18" fill="url(#bowl-body)"/>
  <!-- Bowl curved sides -->
  <path d="M17 78 Q17 52 30 45 Q42 38 55 38 Q68 38 80 45 Q93 52 93 78" fill="url(#bowl-body)" stroke="none"/>
  <!-- Bowl inner shadow -->
  <ellipse cx="55" cy="56" rx="28" ry="12" fill="url(#bowl-inner)" opacity="0.7"/>
  <!-- Bowl rim highlight -->
  <ellipse cx="55" cy="45" rx="32" ry="10" fill="none" stroke="url(#bowl-rim)" stroke-width="3"/>
  <!-- Rim top specular -->
  <ellipse cx="45" cy="43" rx="12" ry="3" fill="white" opacity="0.25"/>
  <!-- Decorative band -->
  <ellipse cx="55" cy="62" rx="36" ry="14" fill="none" stroke="#d0a840" stroke-width="1" opacity="0.4"/>
  <ellipse cx="55" cy="68" rx="37" ry="15" fill="none" stroke="#d0a840" stroke-width="0.8" opacity="0.3"/>
  <!-- Bowl base -->
  <ellipse cx="55" cy="90" rx="20" ry="5" fill="#906818" opacity="0.5"/>
  <!-- Mallet handle -->
  <rect x="82" y="28" width="5" height="40" rx="2" fill="url(#mallet-wood)" transform="rotate(25, 84, 48)"/>
  <!-- Mallet head (padded end) -->
  <circle cx="98" cy="34" r="8" fill="url(#mallet-head)"/>
  <circle cx="96" cy="32" r="2" fill="white" opacity="0.2"/>
  <!-- Mallet leather wrap -->
  <rect x="83" y="52" width="5" height="8" rx="1" fill="#705030" transform="rotate(25, 85, 56)" opacity="0.5"/>
  <!-- Sound vibration lines -->
  <path d="M25 35 Q20 30 25 25" fill="none" stroke="#e8c868" stroke-width="1" opacity="0.3"/>
  <path d="M18 40 Q12 34 18 28" fill="none" stroke="#e8c868" stroke-width="1" opacity="0.2"/>
  <!-- Specular highlight on bowl -->
  <ellipse cx="42" cy="55" rx="6" ry="10" fill="white" opacity="0.1" transform="rotate(-15, 42, 55)"/>
</svg>
