<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ss-parch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f0d8"/>
      <stop offset="30%" stop-color="#f0e4c0"/>
      <stop offset="70%" stop-color="#e8d8a8"/>
      <stop offset="100%" stop-color="#d8c890"/>
    </linearGradient>
    <linearGradient id="ss-roll-t" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#d0c090"/>
      <stop offset="40%" stop-color="#f0e4c0"/>
      <stop offset="80%" stop-color="#e8d4a0"/>
      <stop offset="100%" stop-color="#c8b888"/>
    </linearGradient>
    <linearGradient id="ss-roll-b" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d0c090"/>
      <stop offset="40%" stop-color="#f0e4c0"/>
      <stop offset="80%" stop-color="#e8d4a0"/>
      <stop offset="100%" stop-color="#c8b888"/>
    </linearGradient>
    <linearGradient id="ss-gold-cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fae080"/>
      <stop offset="50%" stop-color="#d8a838"/>
      <stop offset="100%" stop-color="#a07020"/>
    </linearGradient>
    <radialGradient id="ss-seal" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#e05040"/>
      <stop offset="50%" stop-color="#c03028"/>
      <stop offset="100%" stop-color="#881818"/>
    </radialGradient>
    <linearGradient id="ss-ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c83028"/>
      <stop offset="50%" stop-color="#a02020"/>
      <stop offset="100%" stop-color="#801818"/>
    </linearGradient>
  </defs>
  <!-- Top roll -->
  <ellipse cx="60" cy="18" rx="42" ry="8" fill="url(#ss-roll-t)"/>
  <!-- Top roll shadow -->
  <ellipse cx="60" cy="22" rx="40" ry="4" fill="#b0a070" opacity="0.3"/>
  <!-- Scroll body (parchment sheet) -->
  <rect x="20" y="18" width="80" height="78" fill="url(#ss-parch)"/>
  <!-- Parchment texture lines -->
  <line x1="24" y1="28" x2="96" y2="28" stroke="#c8b888" stroke-width="0.3" opacity="0.4"/>
  <line x1="24" y1="38" x2="96" y2="38" stroke="#c8b888" stroke-width="0.3" opacity="0.3"/>
  <line x1="24" y1="48" x2="96" y2="48" stroke="#c8b888" stroke-width="0.3" opacity="0.3"/>
  <!-- Mystical symbols on parchment -->
  <!-- Eye of wisdom -->
  <ellipse cx="48" cy="42" rx="8" ry="4" fill="none" stroke="#a08848" stroke-width="1.2" opacity="0.5"/>
  <circle cx="48" cy="42" r="2.5" fill="#a08848" opacity="0.4"/>
  <!-- Spiral symbol -->
  <path d="M72 38 Q78 38 78 42 Q78 48 72 48 Q68 48 68 44 Q68 40 72 40" fill="none" stroke="#a08848" stroke-width="1" opacity="0.5"/>
  <!-- Triangle with dot -->
  <polygon points="60,55 52,68 68,68" fill="none" stroke="#a08848" stroke-width="1" opacity="0.45"/>
  <circle cx="60" cy="63" r="1.5" fill="#a08848" opacity="0.4"/>
  <!-- Wavy text-like lines -->
  <path d="M30 76 Q36 73 42 76 Q48 79 54 76 Q60 73 66 76 Q72 79 78 76 Q84 73 90 76" fill="none" stroke="#b0a060" stroke-width="0.8" opacity="0.35"/>
  <path d="M30 82 Q38 79 46 82 Q54 85 62 82 Q70 79 78 82 Q86 85 90 82" fill="none" stroke="#b0a060" stroke-width="0.7" opacity="0.3"/>
  <!-- Bottom roll -->
  <ellipse cx="60" cy="96" rx="42" ry="8" fill="url(#ss-roll-b)"/>
  <!-- Bottom roll highlight -->
  <ellipse cx="55" cy="94" rx="16" ry="2.5" fill="white" opacity="0.12"/>
  <!-- Golden end caps on top roll -->
  <ellipse cx="18" cy="18" rx="5" ry="9" fill="url(#ss-gold-cap)"/>
  <ellipse cx="17" cy="16" rx="1.5" ry="2" fill="white" opacity="0.2"/>
  <ellipse cx="102" cy="18" rx="5" ry="9" fill="url(#ss-gold-cap)"/>
  <ellipse cx="101" cy="16" rx="1.5" ry="2" fill="white" opacity="0.2"/>
  <!-- Golden end caps on bottom roll -->
  <ellipse cx="18" cy="96" rx="5" ry="9" fill="url(#ss-gold-cap)"/>
  <ellipse cx="102" cy="96" rx="5" ry="9" fill="url(#ss-gold-cap)"/>
  <!-- Golden edge trim -->
  <line x1="20" y1="20" x2="20" y2="94" stroke="#d8a838" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="20" x2="100" y2="94" stroke="#d8a838" stroke-width="1.5" opacity="0.4"/>
  <!-- Wax seal -->
  <circle cx="82" cy="88" r="9" fill="url(#ss-seal)"/>
  <circle cx="82" cy="88" r="6.5" fill="none" stroke="#d04038" stroke-width="1"/>
  <!-- Seal emblem - star -->
  <path d="M82 82 L83.5 86 L88 86 L84.5 89 L86 93 L82 90 L78 93 L79.5 89 L76 86 L80.5 86 Z" fill="#d05048" opacity="0.7"/>
  <circle cx="80" cy="86" r="1.5" fill="white" opacity="0.25"/>
  <!-- Ribbon ties from seal -->
  <path d="M76 92 Q70 100 66 108" fill="none" stroke="url(#ss-ribbon)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88 92 Q92 100 96 106" fill="none" stroke="url(#ss-ribbon)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ribbon ends - forked -->
  <polygon points="64,106 66,108 68,112 66,110" fill="#a02020"/>
  <polygon points="64,106 66,108 64,112 66,110" fill="#c03028"/>
  <polygon points="94,104 96,106 98,110 96,108" fill="#a02020"/>
  <polygon points="94,104 96,106 94,110 96,108" fill="#c03028"/>
  <!-- Top roll highlight -->
  <ellipse cx="55" cy="16" rx="16" ry="2.5" fill="white" opacity="0.15"/>
  <!-- Parchment specular -->
  <rect x="28" y="26" width="20" height="30" rx="4" fill="white" opacity="0.06"/>
</svg>
