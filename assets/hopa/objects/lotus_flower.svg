<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="petal-outer" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#f5a0b8"/>
      <stop offset="60%" stop-color="#e87898"/>
      <stop offset="100%" stop-color="#c85878"/>
    </radialGradient>
    <radialGradient id="petal-inner" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#fcc0d0"/>
      <stop offset="50%" stop-color="#f098b0"/>
      <stop offset="100%" stop-color="#d87898"/>
    </radialGradient>
    <radialGradient id="center" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#ffe870"/>
      <stop offset="100%" stop-color="#e8c040"/>
    </radialGradient>
    <radialGradient id="leaf" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#68b060"/>
      <stop offset="100%" stop-color="#3a7830"/>
    </radialGradient>
    <radialGradient id="droplet" cx="0.35" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#80c0e0" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <!-- Leaf base - left -->
  <ellipse cx="38" cy="88" rx="24" ry="10" fill="url(#leaf)" transform="rotate(-20, 38, 88)"/>
  <line x1="22" y1="93" x2="50" y2="83" stroke="#2a6020" stroke-width="0.8" opacity="0.5"/>
  <!-- Leaf base - right -->
  <ellipse cx="82" cy="88" rx="24" ry="10" fill="url(#leaf)" transform="rotate(20, 82, 88)"/>
  <line x1="66" y1="83" x2="94" y2="93" stroke="#2a6020" stroke-width="0.8" opacity="0.5"/>
  <!-- Outer petals layer (5 petals) -->
  <ellipse cx="60" cy="42" rx="14" ry="22" fill="url(#petal-outer)" transform="rotate(0, 60, 62)"/>
  <ellipse cx="60" cy="42" rx="14" ry="22" fill="url(#petal-outer)" transform="rotate(72, 60, 62)"/>
  <ellipse cx="60" cy="42" rx="14" ry="22" fill="url(#petal-outer)" transform="rotate(144, 60, 62)"/>
  <ellipse cx="60" cy="42" rx="14" ry="22" fill="url(#petal-outer)" transform="rotate(216, 60, 62)"/>
  <ellipse cx="60" cy="42" rx="14" ry="22" fill="url(#petal-outer)" transform="rotate(288, 60, 62)"/>
  <!-- Middle petals layer (5 petals, offset 36deg, smaller) -->
  <ellipse cx="60" cy="47" rx="11" ry="18" fill="url(#petal-inner)" transform="rotate(36, 60, 62)"/>
  <ellipse cx="60" cy="47" rx="11" ry="18" fill="url(#petal-inner)" transform="rotate(108, 60, 62)"/>
  <ellipse cx="60" cy="47" rx="11" ry="18" fill="url(#petal-inner)" transform="rotate(180, 60, 62)"/>
  <ellipse cx="60" cy="47" rx="11" ry="18" fill="url(#petal-inner)" transform="rotate(252, 60, 62)"/>
  <ellipse cx="60" cy="47" rx="11" ry="18" fill="url(#petal-inner)" transform="rotate(324, 60, 62)"/>
  <!-- Inner petals (small cupping petals) -->
  <ellipse cx="60" cy="53" rx="7" ry="12" fill="#fcc8d8" transform="rotate(18, 60, 62)"/>
  <ellipse cx="60" cy="53" rx="7" ry="12" fill="#fcc8d8" transform="rotate(90, 60, 62)"/>
  <ellipse cx="60" cy="53" rx="7" ry="12" fill="#fcc8d8" transform="rotate(162, 60, 62)"/>
  <ellipse cx="60" cy="53" rx="7" ry="12" fill="#fcc8d8" transform="rotate(234, 60, 62)"/>
  <ellipse cx="60" cy="53" rx="7" ry="12" fill="#fcc8d8" transform="rotate(306, 60, 62)"/>
  <!-- Golden center -->
  <circle cx="60" cy="62" r="8" fill="url(#center)"/>
  <circle cx="58" cy="60" r="2" fill="white" opacity="0.3"/>
  <!-- Petal vein hints -->
  <line x1="60" y1="25" x2="60" y2="42" stroke="#d06880" stroke-width="0.6" opacity="0.3"/>
  <!-- Water droplets -->
  <ellipse cx="42" cy="52" rx="2.5" ry="3.5" fill="url(#droplet)"/>
  <ellipse cx="78" cy="56" rx="2" ry="3" fill="url(#droplet)"/>
  <ellipse cx="52" cy="78" rx="1.8" ry="2.5" fill="url(#droplet)"/>
  <!-- Subtle petal edge highlights -->
  <ellipse cx="60" cy="40" rx="12" ry="4" fill="white" opacity="0.08"/>
</svg>
