<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="pr2-face-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="40%" stop-color="#d0d8e8"/>
      <stop offset="100%" stop-color="#b0b8d0"/>
    </linearGradient>
    <linearGradient id="pr2-face-r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8d0e0"/>
      <stop offset="100%" stop-color="#98a0b8"/>
    </linearGradient>
    <linearGradient id="pr2-face-f" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0f0f8"/>
      <stop offset="50%" stop-color="#d8dce8"/>
      <stop offset="100%" stop-color="#b8c0d0"/>
    </linearGradient>
    <radialGradient id="pr2-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pr2-rainbow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="16%" stop-color="#ff8844"/>
      <stop offset="33%" stop-color="#ffcc22"/>
      <stop offset="50%" stop-color="#44cc44"/>
      <stop offset="66%" stop-color="#4488ff"/>
      <stop offset="83%" stop-color="#6644ff"/>
      <stop offset="100%" stop-color="#aa44ff"/>
    </linearGradient>
    <linearGradient id="pr2-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fff8e0" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Incoming light beam -->
  <polygon points="0,44 35,52 35,48" fill="url(#pr2-beam)" opacity="0.6"/>
  <!-- Rainbow refraction - vivid, wider spread -->
  <polygon points="80,30 112,14 112,20" fill="#ff4444" opacity="0.7"/>
  <polygon points="80,36 112,22 112,28" fill="#ff8844" opacity="0.7"/>
  <polygon points="80,42 112,30 112,36" fill="#ffcc22" opacity="0.7"/>
  <polygon points="80,48 112,38 112,44" fill="#44cc44" opacity="0.7"/>
  <polygon points="80,54 112,46 112,52" fill="#4488ff" opacity="0.7"/>
  <polygon points="80,60 112,54 112,60" fill="#6644ff" opacity="0.7"/>
  <polygon points="80,66 112,62 112,68" fill="#aa44ff" opacity="0.65"/>
  <!-- Prism - triangular, larger -->
  <!-- Front face -->
  <polygon points="55,16 30,95 80,95" fill="url(#pr2-face-f)" stroke="#a0a8c0" stroke-width="1"/>
  <!-- Right face (visible 3D edge) -->
  <polygon points="55,16 80,95 90,88" fill="url(#pr2-face-r)" stroke="#a0a8c0" stroke-width="0.8"/>
  <!-- Top edge highlight -->
  <line x1="55" y1="16" x2="90" y2="88" stroke="#e0e4f0" stroke-width="1" opacity="0.5"/>
  <!-- Internal refraction lines -->
  <line x1="38" y1="50" x2="75" y2="45" stroke="url(#pr2-rainbow)" stroke-width="2" opacity="0.25"/>
  <line x1="42" y1="60" x2="78" y2="55" stroke="url(#pr2-rainbow)" stroke-width="1.5" opacity="0.2"/>
  <!-- Face specular highlight -->
  <polygon points="50,30 42,60 60,55 55,28" fill="white" opacity="0.15"/>
  <!-- Edge sparkles on prism -->
  <circle cx="55" cy="16" r="4" fill="url(#pr2-glow)"/>
  <circle cx="80" cy="95" r="3" fill="url(#pr2-glow)"/>
  <!-- Rainbow scatter dots -->
  <circle cx="105" cy="18" r="2.5" fill="#ff6644" opacity="0.5"/>
  <circle cx="108" cy="32" r="2" fill="#ffcc22" opacity="0.5"/>
  <circle cx="110" cy="48" r="2" fill="#44cc44" opacity="0.5"/>
  <circle cx="108" cy="60" r="2" fill="#4488ff" opacity="0.5"/>
  <circle cx="105" cy="70" r="2.5" fill="#8844ff" opacity="0.45"/>
  <!-- Glow around prism -->
  <polygon points="55,12 26,98 84,98 94,90" fill="white" opacity="0.05"/>
  <!-- Small sparkle stars -->
  <path d="M100 25 L102 22 L104 25 L102 28 Z" fill="white" opacity="0.5"/>
  <path d="M106 42 L108 40 L110 42 L108 44 Z" fill="white" opacity="0.4"/>
  <path d="M104 58 L106 56 L108 58 L106 60 Z" fill="white" opacity="0.35"/>
</svg>
