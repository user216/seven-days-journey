<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="sb2-body" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#f8d868"/>
      <stop offset="40%" stop-color="#d8a838"/>
      <stop offset="100%" stop-color="#a07020"/>
    </radialGradient>
    <linearGradient id="sb2-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fae888"/>
      <stop offset="100%" stop-color="#d8b040"/>
    </linearGradient>
    <linearGradient id="sb2-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b89028"/>
      <stop offset="100%" stop-color="#886018"/>
    </linearGradient>
    <radialGradient id="sb2-gem-r" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#ff8888"/>
      <stop offset="100%" stop-color="#c03030"/>
    </radialGradient>
    <radialGradient id="sb2-gem-b" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#88b8ff"/>
      <stop offset="100%" stop-color="#3050c0"/>
    </radialGradient>
    <radialGradient id="sb2-gem-g" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#88e888"/>
      <stop offset="100%" stop-color="#308030"/>
    </radialGradient>
    <linearGradient id="sb2-mallet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b88040"/>
      <stop offset="50%" stop-color="#d0a060"/>
      <stop offset="100%" stop-color="#906030"/>
    </linearGradient>
    <radialGradient id="sb2-mhead" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#e0b870"/>
      <stop offset="100%" stop-color="#8b6030"/>
    </radialGradient>
  </defs>
  <!-- Bowl body - ornate golden -->
  <ellipse cx="55" cy="80" rx="40" ry="18" fill="url(#sb2-body)"/>
  <path d="M15 80 Q15 50 30 42 Q42 34 55 34 Q68 34 80 42 Q95 50 95 80" fill="url(#sb2-body)"/>
  <!-- Ornate decorative band - upper -->
  <ellipse cx="55" cy="50" rx="34" ry="12" fill="none" stroke="#fae888" stroke-width="2" opacity="0.5"/>
  <!-- Gem inlays on band -->
  <ellipse cx="30" cy="56" rx="4" ry="3.5" fill="url(#sb2-gem-r)" transform="rotate(-10,30,56)"/>
  <ellipse cx="30" cy="56" rx="1.2" ry="1" fill="white" opacity="0.5" transform="rotate(-10,30,56)"/>
  <ellipse cx="55" cy="52" rx="4" ry="3.5" fill="url(#sb2-gem-b)"/>
  <ellipse cx="55" cy="52" rx="1.2" ry="1" fill="white" opacity="0.5"/>
  <ellipse cx="80" cy="56" rx="4" ry="3.5" fill="url(#sb2-gem-g)" transform="rotate(10,80,56)"/>
  <ellipse cx="80" cy="56" rx="1.2" ry="1" fill="white" opacity="0.5" transform="rotate(10,80,56)"/>
  <!-- Lower decorative band -->
  <ellipse cx="55" cy="70" rx="38" ry="15" fill="none" stroke="#e8c050" stroke-width="1.2" opacity="0.4"/>
  <!-- Etched pattern between bands -->
  <path d="M28 60 Q34 58 40 60 Q46 62 52 60 Q58 58 64 60 Q70 62 76 60 Q82 58 86 60" fill="none" stroke="#c89828" stroke-width="0.8" opacity="0.5"/>
  <!-- Inner shadow -->
  <ellipse cx="55" cy="52" rx="28" ry="11" fill="url(#sb2-inner)" opacity="0.6"/>
  <!-- Rim highlight -->
  <ellipse cx="55" cy="42" rx="32" ry="10" fill="none" stroke="url(#sb2-rim)" stroke-width="3.5"/>
  <ellipse cx="44" cy="40" rx="12" ry="3" fill="white" opacity="0.25"/>
  <!-- Bowl base -->
  <ellipse cx="55" cy="92" rx="22" ry="5" fill="#886018" opacity="0.5"/>
  <!-- Mallet -->
  <rect x="84" y="24" width="5" height="40" rx="2" fill="url(#sb2-mallet)" transform="rotate(22,86,44)"/>
  <circle cx="100" cy="30" r="8" fill="url(#sb2-mhead)"/>
  <circle cx="98" cy="28" r="2.5" fill="white" opacity="0.2"/>
  <rect x="85" y="50" width="5" height="7" rx="1" fill="#604028" transform="rotate(22,87,53)" opacity="0.5"/>
  <!-- Sound vibration lines - more pronounced -->
  <path d="M22 32 Q16 26 22 20" fill="none" stroke="#f0d060" stroke-width="1.2" opacity="0.35"/>
  <path d="M14 38 Q7 30 14 22" fill="none" stroke="#f0d060" stroke-width="1" opacity="0.25"/>
  <path d="M8 44 Q0 35 8 26" fill="none" stroke="#f0d060" stroke-width="0.8" opacity="0.15"/>
  <!-- Body specular -->
  <ellipse cx="40" cy="58" rx="6" ry="12" fill="white" opacity="0.1" transform="rotate(-12,40,58)"/>
</svg>
