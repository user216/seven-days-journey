<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Brass frame gradient -->
    <linearGradient id="brassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A54A"/>
      <stop offset="35%" stop-color="#C49332"/>
      <stop offset="70%" stop-color="#A87D2A"/>
      <stop offset="100%" stop-color="#7A5B1E"/>
    </linearGradient>
    <!-- Dark iron accent -->
    <linearGradient id="ironGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B6B6B"/>
      <stop offset="50%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <!-- Warm glow inside -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4D4"/>
      <stop offset="30%" stop-color="#FFE08A"/>
      <stop offset="60%" stop-color="#FFB833"/>
      <stop offset="100%" stop-color="#E88B1A" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Outer glow aura -->
    <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD466" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFB833" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB833" stop-opacity="0"/>
    </radialGradient>
    <!-- Glass panel gradient -->
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Handle gradient -->
    <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8923A"/>
      <stop offset="50%" stop-color="#8C6D28"/>
      <stop offset="100%" stop-color="#B8923A"/>
    </linearGradient>
  </defs>

  <!-- Outer glow aura -->
  <ellipse cx="60" cy="65" rx="42" ry="38" fill="url(#auraGrad)"/>

  <!-- Handle arch -->
  <path d="M44,28 Q44,10 60,10 Q76,10 76,28" fill="none" stroke="url(#handleGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Handle rivets -->
  <circle cx="44" cy="28" r="3" fill="#C49332" stroke="#8C6D28" stroke-width="0.8"/>
  <circle cx="76" cy="28" r="3" fill="#C49332" stroke="#8C6D28" stroke-width="0.8"/>

  <!-- Lantern top cap -->
  <path d="M40,30 L42,24 L78,24 L80,30Z" fill="url(#brassGrad)" stroke="#7A5B1E" stroke-width="0.5"/>
  <!-- Small finial -->
  <rect x="56" y="20" width="8" height="5" rx="2" fill="url(#brassGrad)" stroke="#7A5B1E" stroke-width="0.5"/>

  <!-- Main body frame -->
  <rect x="38" y="30" width="44" height="60" rx="3" fill="url(#ironGrad)" stroke="#333" stroke-width="0.8"/>

  <!-- Glass panels (warm glow) -->
  <rect x="42" y="34" width="36" height="52" rx="2" fill="url(#glowGrad)"/>

  <!-- Glass reflection -->
  <rect x="44" y="36" width="10" height="20" rx="2" fill="url(#glassGrad)"/>

  <!-- Cross bars (iron frame detail) -->
  <line x1="42" y1="60" x2="78" y2="60" stroke="#4A4A4A" stroke-width="2" opacity="0.7"/>
  <line x1="60" y1="34" x2="60" y2="86" stroke="#4A4A4A" stroke-width="2" opacity="0.5"/>

  <!-- Frame corner bolts -->
  <circle cx="42" cy="34" r="1.5" fill="#8C6D28"/>
  <circle cx="78" cy="34" r="1.5" fill="#8C6D28"/>
  <circle cx="42" cy="86" r="1.5" fill="#8C6D28"/>
  <circle cx="78" cy="86" r="1.5" fill="#8C6D28"/>

  <!-- Bottom base -->
  <path d="M36,90 L38,95 L82,95 L84,90Z" fill="url(#brassGrad)" stroke="#7A5B1E" stroke-width="0.5"/>
  <!-- Feet -->
  <rect x="40" y="95" width="6" height="5" rx="1" fill="url(#brassGrad)" stroke="#7A5B1E" stroke-width="0.5"/>
  <rect x="74" y="95" width="6" height="5" rx="1" fill="url(#brassGrad)" stroke="#7A5B1E" stroke-width="0.5"/>

  <!-- Flame flicker inside -->
  <path d="M60,72 Q56,60 58,52 Q60,46 62,52 Q64,60 60,72Z" fill="#FFF4D4" opacity="0.8"/>
  <path d="M60,70 Q57,62 59,56 Q60,50 61,56 Q63,62 60,70Z" fill="#FFFFFF" opacity="0.5"/>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="108" rx="28" ry="5" fill="#3D3020" opacity="0.25"/>
</svg>
