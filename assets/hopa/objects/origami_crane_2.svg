<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="oc2-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fae880"/>
      <stop offset="50%" stop-color="#e8c040"/>
      <stop offset="100%" stop-color="#c89828"/>
    </linearGradient>
    <linearGradient id="oc2-wing-l" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#d0a030"/>
      <stop offset="50%" stop-color="#f0d050"/>
      <stop offset="100%" stop-color="#fae888"/>
    </linearGradient>
    <linearGradient id="oc2-wing-r" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c89020"/>
      <stop offset="50%" stop-color="#e8b838"/>
      <stop offset="100%" stop-color="#f8d868"/>
    </linearGradient>
    <linearGradient id="oc2-tail" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0d050"/>
      <stop offset="100%" stop-color="#b88820"/>
    </linearGradient>
    <radialGradient id="oc2-sparkle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Shadow on ground -->
  <ellipse cx="60" cy="108" rx="28" ry="5" fill="#906818" opacity="0.15"/>
  <!-- Left wing - large triangular fold -->
  <polygon points="58,52 8,30 40,72" fill="url(#oc2-wing-l)" stroke="#c89020" stroke-width="0.8"/>
  <!-- Left wing fold line -->
  <line x1="58" y1="52" x2="22" y2="48" stroke="#d8a830" stroke-width="0.8" opacity="0.5"/>
  <line x1="34" y1="52" x2="24" y2="38" stroke="#b88820" stroke-width="0.5" opacity="0.3"/>
  <!-- Right wing -->
  <polygon points="62,52 112,26 80,72" fill="url(#oc2-wing-r)" stroke="#b88820" stroke-width="0.8"/>
  <!-- Right wing fold line -->
  <line x1="62" y1="52" x2="98" y2="44" stroke="#c89828" stroke-width="0.8" opacity="0.5"/>
  <line x1="86" y1="50" x2="96" y2="34" stroke="#a07818" stroke-width="0.5" opacity="0.3"/>
  <!-- Body center diamond -->
  <polygon points="60,38 72,58 60,78 48,58" fill="url(#oc2-body)" stroke="#c89020" stroke-width="0.6"/>
  <!-- Body fold crease -->
  <line x1="60" y1="38" x2="60" y2="78" stroke="#d0a030" stroke-width="0.8" opacity="0.4"/>
  <!-- Head/neck -->
  <polygon points="60,38 54,20 66,20" fill="#f0d050" stroke="#c89020" stroke-width="0.6"/>
  <!-- Beak -->
  <polygon points="60,14 57,20 63,20" fill="#d8a830" stroke="#b88020" stroke-width="0.5"/>
  <!-- Head fold detail -->
  <line x1="60" y1="20" x2="60" y2="38" stroke="#c89828" stroke-width="0.5" opacity="0.3"/>
  <!-- Tail - ornate fanned -->
  <polygon points="60,78 48,100 52,82" fill="url(#oc2-tail)" stroke="#b88820" stroke-width="0.5"/>
  <polygon points="60,78 72,100 68,82" fill="url(#oc2-tail)" stroke="#b88820" stroke-width="0.5"/>
  <polygon points="60,78 60,104 56,84" fill="#e8c040" stroke="#b88820" stroke-width="0.4" opacity="0.8"/>
  <!-- Decorative pattern on wings - small diamonds -->
  <polygon points="30,42 33,45 30,48 27,45" fill="#fff8d0" opacity="0.3"/>
  <polygon points="90,38 93,41 90,44 87,41" fill="#fff8d0" opacity="0.3"/>
  <!-- Sparkle effects -->
  <circle cx="15" cy="26" r="4" fill="url(#oc2-sparkle)"/>
  <circle cx="105" cy="22" r="3" fill="url(#oc2-sparkle)"/>
  <circle cx="60" cy="16" r="2.5" fill="url(#oc2-sparkle)"/>
  <circle cx="38" cy="65" r="2" fill="url(#oc2-sparkle)"/>
  <circle cx="82" cy="62" r="2" fill="url(#oc2-sparkle)"/>
  <!-- Small star sparkles -->
  <path d="M20 50 L22 48 L24 50 L22 52 Z" fill="white" opacity="0.4"/>
  <path d="M100 50 L102 48 L104 50 L102 52 Z" fill="white" opacity="0.35"/>
  <path d="M60 90 L61.5 88 L63 90 L61.5 92 Z" fill="white" opacity="0.3"/>
  <!-- Wing tip highlights -->
  <ellipse cx="14" cy="32" rx="4" ry="2" fill="white" opacity="0.15" transform="rotate(-30,14,32)"/>
  <ellipse cx="106" cy="28" rx="4" ry="2" fill="white" opacity="0.15" transform="rotate(30,106,28)"/>
</svg>
