<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="whisk-handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4b88c"/>
      <stop offset="40%" stop-color="#e8d4a8"/>
      <stop offset="100%" stop-color="#c4a470"/>
    </linearGradient>
    <linearGradient id="whisk-prong" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dcc898"/>
      <stop offset="50%" stop-color="#f0e4c4"/>
      <stop offset="100%" stop-color="#c8b078"/>
    </linearGradient>
    <radialGradient id="whisk-top" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#f0e4c4"/>
      <stop offset="100%" stop-color="#c8b078"/>
    </radialGradient>
    <linearGradient id="whisk-band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a08050"/>
      <stop offset="50%" stop-color="#c0a070"/>
      <stop offset="100%" stop-color="#907040"/>
    </linearGradient>
  </defs>
  <!-- Handle (cylindrical bamboo base) -->
  <rect x="48" y="68" width="24" height="38" rx="6" fill="url(#whisk-handle)"/>
  <!-- Handle highlight -->
  <rect x="54" y="70" width="6" height="34" rx="3" fill="white" opacity="0.12"/>
  <!-- Binding band at top of handle -->
  <rect x="46" y="64" width="28" height="6" rx="2" fill="url(#whisk-band)"/>
  <rect x="47" y="65" width="10" height="4" rx="1" fill="white" opacity="0.15"/>
  <!-- Prong bundle (splayed bamboo tines curving outward) -->
  <!-- Center prongs -->
  <path d="M60 64 Q60 40 60 18" fill="none" stroke="url(#whisk-prong)" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M56 64 Q55 42 54 20" fill="none" stroke="url(#whisk-prong)" stroke-width="2" stroke-linecap="round"/>
  <path d="M64 64 Q65 42 66 20" fill="none" stroke="url(#whisk-prong)" stroke-width="2" stroke-linecap="round"/>
  <!-- Inner prongs -->
  <path d="M52 65 Q49 44 46 24" fill="none" stroke="url(#whisk-prong)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M68 65 Q71 44 74 24" fill="none" stroke="url(#whisk-prong)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Outer prongs curving wider -->
  <path d="M50 66 Q44 46 38 28" fill="none" stroke="url(#whisk-prong)" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M70 66 Q76 46 82 28" fill="none" stroke="url(#whisk-prong)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Far outer prongs -->
  <path d="M48 67 Q40 50 32 34" fill="none" stroke="#d0bc8c" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M72 67 Q80 50 88 34" fill="none" stroke="#d0bc8c" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Outermost prongs -->
  <path d="M47 68 Q36 54 28 40" fill="none" stroke="#c8b080" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M73 68 Q84 54 92 40" fill="none" stroke="#c8b080" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Prong tip curls (curving inward at tips) -->
  <circle cx="60" cy="17" r="1.5" fill="#e8d4a8" opacity="0.7"/>
  <circle cx="54" cy="19" r="1.3" fill="#e8d4a8" opacity="0.6"/>
  <circle cx="66" cy="19" r="1.3" fill="#e8d4a8" opacity="0.6"/>
  <!-- Handle base -->
  <ellipse cx="60" cy="106" rx="12" ry="3" fill="#a08050" opacity="0.4"/>
  <!-- Specular highlight -->
  <ellipse cx="56" cy="80" rx="3" ry="12" fill="white" opacity="0.08"/>
</svg>
