<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="prGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f0ff" stop-opacity="0.85"/>
      <stop offset="30%" stop-color="#d0dff8" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#c0d0f0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b0c8e8" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="prFace1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d8e8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b0c8e8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="prFace2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8d8f0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a0b8d8" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="prRainbow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.8"/>
      <stop offset="17%" stop-color="#ffa64d" stop-opacity="0.75"/>
      <stop offset="33%" stop-color="#ffd93d" stop-opacity="0.75"/>
      <stop offset="50%" stop-color="#6bcf7f" stop-opacity="0.7"/>
      <stop offset="67%" stop-color="#4da6ff" stop-opacity="0.7"/>
      <stop offset="83%" stop-color="#6b5bff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b060d0" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="prRainbow2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8888" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#ffcc66" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#ffe066" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#88dd99" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#88bbff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#cc88ee" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="prGlare" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="prEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8d8f0"/>
      <stop offset="100%" stop-color="#8aa0c8"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="62" cy="108" rx="30" ry="5" fill="#8a7a90" opacity="0.2"/>
  <!-- Rainbow refraction beam emerging right side -->
  <path d="M 78 50 L 108 30 L 110 36 L 80 54 Z" fill="url(#prRainbow)" opacity="0.6"/>
  <path d="M 78 54 L 110 36 L 112 42 L 80 58 Z" fill="url(#prRainbow)" opacity="0.5"/>
  <!-- Wider rainbow spread -->
  <path d="M 80 48 L 105 22 Q 112 28 108 38 L 80 54 Z" fill="url(#prRainbow2)" opacity="0.4"/>
  <!-- Subtle rainbow colors on surface near prism -->
  <ellipse cx="90" cy="44" rx="8" ry="14" fill="url(#prRainbow2)" opacity="0.3" transform="rotate(-30 90 44)"/>
  <!-- Incoming white light beam left side -->
  <path d="M 10 44 L 42 52 L 42 56 L 10 50 Z" fill="#e8f0ff" opacity="0.35"/>
  <line x1="10" y1="47" x2="42" y2="54" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <!-- Main prism body - triangle -->
  <polygon points="60,14 30,98 90,98" fill="url(#prGlass)" stroke="url(#prEdge)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left face shading -->
  <polygon points="60,14 30,98 60,98" fill="url(#prFace1)" opacity="0.3"/>
  <!-- Right face shading -->
  <polygon points="60,14 90,98 60,56" fill="url(#prFace2)" opacity="0.25"/>
  <!-- Internal edge lines (facets) -->
  <line x1="60" y1="14" x2="60" y2="98" stroke="#a0b8d8" stroke-width="0.5" opacity="0.3"/>
  <!-- Edge highlights -->
  <line x1="60" y1="16" x2="32" y2="96" stroke="#e0eaff" stroke-width="0.8" opacity="0.4"/>
  <line x1="60" y1="16" x2="88" y2="96" stroke="#d0e0ff" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="97" x2="88" y2="97" stroke="#c8d8f0" stroke-width="0.6" opacity="0.35"/>
  <!-- Glare on front face -->
  <ellipse cx="52" cy="42" rx="10" ry="14" fill="url(#prGlare)" transform="rotate(-8 52 42)"/>
  <!-- Small bright spot -->
  <ellipse cx="48" cy="36" rx="3" ry="2" fill="#ffffff" opacity="0.6" transform="rotate(-15 48 36)"/>
  <!-- Internal rainbow caustic -->
  <path d="M 58 40 Q 65 55 62 70" fill="none" stroke="url(#prRainbow)" stroke-width="1.2" opacity="0.25"/>
  <!-- Tiny sparkle at apex -->
  <circle cx="60" cy="16" r="1.5" fill="#ffffff" opacity="0.7"/>
</svg>
