<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2840"/>
      <stop offset="100%" stop-color="#3a3558"/>
    </linearGradient>
    <radialGradient id="moonlight" cx="60%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#c8d8f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c8d8f0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor_g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5068"/>
      <stop offset="100%" stop-color="#4a4058"/>
    </linearGradient>
    <radialGradient id="candle1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fce880" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fce880" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="candle2" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fce880" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fce880" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-color="#1a1828" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Dark wall -->
  <rect width="1080" height="1920" fill="url(#wall)"/>

  <!-- Window with moonlight -->
  <rect x="600" y="100" width="280" height="400" rx="140" fill="#1a2238"/>
  <rect x="610" y="110" width="260" height="380" rx="130" fill="#283050"/>
  <!-- Moon -->
  <circle cx="740" cy="200" r="40" fill="#e8e0d0" opacity="0.9"/>
  <circle cx="755" cy="190" r="38" fill="#283050" opacity="0.7"/>
  <!-- Stars in window -->
  <circle cx="650" cy="160" r="2" fill="#e8e0d0" opacity="0.7"/>
  <circle cx="700" cy="130" r="1.5" fill="#e8e0d0" opacity="0.6"/>
  <circle cx="780" cy="280" r="2" fill="#e8e0d0" opacity="0.5"/>
  <circle cx="830" cy="180" r="1.5" fill="#e8e0d0" opacity="0.6"/>
  <!-- Window frame -->
  <rect x="600" y="100" width="280" height="400" rx="140" fill="none" stroke="#5a5068" stroke-width="10"/>
  <!-- Moonlight beam -->
  <rect width="1080" height="1920" fill="url(#moonlight)"/>

  <!-- Floor -->
  <rect x="0" y="1200" width="1080" height="720" fill="url(#floor_g)"/>

  <!-- Meditation mat (circular rug) -->
  <ellipse cx="540" cy="1350" rx="250" ry="100" fill="#6a4a5a" opacity="0.6"/>
  <ellipse cx="540" cy="1350" rx="200" ry="80" fill="#7a5a6a" opacity="0.5"/>
  <ellipse cx="540" cy="1350" rx="150" ry="60" fill="#8a6a7a" opacity="0.4"/>
  <!-- Mandala pattern on rug -->
  <circle cx="540" cy="1350" r="40" fill="none" stroke="#a88898" stroke-width="2" opacity="0.5"/>
  <circle cx="540" cy="1350" r="20" fill="none" stroke="#a88898" stroke-width="1.5" opacity="0.4"/>

  <!-- Meditation cushion (zafu) -->
  <ellipse cx="540" cy="1300" rx="70" ry="25" fill="#8a5a6a"/>
  <ellipse cx="540" cy="1290" rx="65" ry="20" fill="#9a6a7a"/>
  <ellipse cx="540" cy="1285" rx="55" ry="12" fill="#a87a8a"/>

  <!-- Low table left -->
  <rect x="80" y="1050" width="250" height="15" rx="3" fill="#5a4838" filter="url(#shadow)"/>
  <rect x="90" y="1065" width="10" height="130" rx="2" fill="#4a3828"/>
  <rect x="310" y="1065" width="10" height="130" rx="2" fill="#4a3828"/>

  <!-- Low table right -->
  <rect x="750" y="1080" width="220" height="12" rx="3" fill="#5a4838" filter="url(#shadow)"/>
  <rect x="760" y="1092" width="10" height="120" rx="2" fill="#4a3828"/>
  <rect x="950" y="1092" width="10" height="120" rx="2" fill="#4a3828"/>

  <!-- Candles -->
  <rect x="120" y="1010" width="18" height="40" rx="3" fill="#e8d8c0"/>
  <ellipse cx="129" cy="1005" rx="6" ry="10" fill="#fce060" opacity="0.9"/>
  <ellipse cx="129" cy="995" rx="20" ry="25" fill="url(#candle1)" filter="url(#glow)"/>

  <rect x="280" y="1020" width="15" height="30" rx="3" fill="#e8d8c0"/>
  <ellipse cx="287" cy="1015" rx="5" ry="8" fill="#fce060" opacity="0.8"/>
  <ellipse cx="287" cy="1008" rx="16" ry="20" fill="url(#candle2)" filter="url(#glow)"/>

  <rect x="800" y="1045" width="16" height="35" rx="3" fill="#e8d8c0"/>
  <ellipse cx="808" cy="1040" rx="5" ry="9" fill="#fce060" opacity="0.85"/>
  <ellipse cx="808" cy="1032" rx="18" ry="22" fill="url(#candle2)" filter="url(#glow)"/>

  <!-- Wall scroll/tapestry -->
  <rect x="120" y="200" width="250" height="500" rx="4" fill="#4a4060" opacity="0.5"/>
  <rect x="130" y="210" width="230" height="480" rx="2" fill="#3a3050" opacity="0.4"/>
  <!-- Om symbol suggestion -->
  <circle cx="245" cy="400" r="50" fill="none" stroke="#8a7a9a" stroke-width="3" opacity="0.4"/>
  <path d="M220,410 Q230,370 260,380 Q280,390 270,420 Q260,440 240,440" fill="none" stroke="#8a7a9a" stroke-width="2.5" opacity="0.4"/>

  <!-- Incense smoke wisps -->
  <path d="M180,1010 Q175,960 185,920 Q178,880 190,840" fill="none" stroke="#a0a0b8" stroke-width="2" opacity="0.25"/>
  <path d="M185,1010 Q192,955 182,910 Q190,870 180,830" fill="none" stroke="#a0a0b8" stroke-width="1.5" opacity="0.2"/>

  <!-- Shelves on right wall -->
  <rect x="900" y="600" width="160" height="10" rx="2" fill="#5a4a38"/>
  <rect x="900" y="800" width="160" height="10" rx="2" fill="#5a4a38"/>

  <!-- Small potted plants on shelves -->
  <rect x="930" y="570" width="25" height="30" rx="4" fill="#6a5a48"/>
  <ellipse cx="942" cy="560" rx="18" ry="20" fill="#4a7a3a" opacity="0.6"/>
  <rect x="1000" y="765" width="30" height="35" rx="5" fill="#5a4a38"/>
  <ellipse cx="1015" cy="755" rx="20" ry="22" fill="#4a7a3a" opacity="0.6"/>

  <!-- Crystal cluster on floor -->
  <polygon points="840,1190 850,1150 860,1190" fill="#a8b8d8" opacity="0.5"/>
  <polygon points="855,1195 868,1140 878,1195" fill="#98a8c8" opacity="0.45"/>
  <polygon points="830,1195 838,1165 848,1195" fill="#b8c8e0" opacity="0.4"/>

  <!-- Ambient purple tint -->
  <rect width="1080" height="1920" fill="#4a3a6a" opacity="0.06"/>
</svg>
