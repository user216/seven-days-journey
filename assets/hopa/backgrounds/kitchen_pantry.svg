<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="wall_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e8d4"/>
      <stop offset="100%" stop-color="#e0d0b8"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a87a"/>
      <stop offset="100%" stop-color="#a88860"/>
    </linearGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7255"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </linearGradient>
    <linearGradient id="shelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a08868"/>
      <stop offset="100%" stop-color="#8a7050"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fce4a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#4a3a28" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Wall background -->
  <rect width="1080" height="1920" fill="url(#wall_bg)"/>

  <!-- Window -->
  <rect x="380" y="80" width="320" height="300" rx="6" fill="#a0c8d8" opacity="0.5"/>
  <rect x="380" y="80" width="320" height="300" rx="6" fill="none" stroke="#8b7255" stroke-width="12"/>
  <line x1="540" y1="80" x2="540" y2="380" stroke="#8b7255" stroke-width="6"/>
  <line x1="380" y1="230" x2="700" y2="230" stroke="#8b7255" stroke-width="6"/>
  <!-- Window light -->
  <rect x="390" y="90" width="143" height="133" fill="#c8e0e8" opacity="0.3"/>
  <rect x="547" y="90" width="143" height="133" fill="#c8e0e8" opacity="0.25"/>
  <!-- Curtains -->
  <path d="M370,80 Q390,200 370,380" fill="#e8d8c0" stroke="#d0c0a0" stroke-width="2" opacity="0.6"/>
  <path d="M710,80 Q690,200 710,380" fill="#e8d8c0" stroke="#d0c0a0" stroke-width="2" opacity="0.6"/>

  <!-- Top shelf -->
  <rect x="40" y="400" width="1000" height="18" rx="3" fill="url(#shelf)" filter="url(#shadow)"/>
  <!-- Jars on top shelf -->
  <rect x="80" y="340" width="50" height="60" rx="8" fill="#c89858" opacity="0.7"/>
  <rect x="80" y="330" width="50" height="16" rx="6" fill="#a07838" opacity="0.6"/>
  <rect x="170" y="350" width="45" height="50" rx="6" fill="#88a878" opacity="0.7"/>
  <rect x="170" y="342" width="45" height="14" rx="5" fill="#6a8858" opacity="0.6"/>
  <rect x="260" y="330" width="55" height="70" rx="10" fill="#d8b088" opacity="0.7"/>
  <rect x="260" y="320" width="55" height="16" rx="8" fill="#b89068" opacity="0.6"/>
  <rect x="780" y="345" width="48" height="55" rx="7" fill="#a888b8" opacity="0.6"/>
  <rect x="780" y="337" width="48" height="14" rx="6" fill="#8868a0" opacity="0.5"/>
  <rect x="880" y="335" width="52" height="65" rx="9" fill="#c8a858" opacity="0.7"/>
  <rect x="880" y="326" width="52" height="15" rx="7" fill="#a88838" opacity="0.6"/>

  <!-- Middle shelf -->
  <rect x="40" y="620" width="1000" height="18" rx="3" fill="url(#shelf)" filter="url(#shadow)"/>
  <!-- Pots on middle shelf -->
  <circle cx="120" cy="585" r="32" fill="#c87830" opacity="0.6"/>
  <ellipse cx="120" cy="555" rx="35" ry="8" fill="#b06820" opacity="0.5"/>
  <circle cx="300" cy="590" r="28" fill="#808080" opacity="0.5"/>
  <ellipse cx="300" cy="564" rx="30" ry="7" fill="#707070" opacity="0.4"/>
  <rect x="500" y="560" width="70" height="60" rx="4" fill="#d8c8a8" opacity="0.6"/>
  <rect x="820" y="570" width="60" height="50" rx="3" fill="#b89868" opacity="0.6"/>
  <rect x="820" y="565" width="60" height="10" rx="2" fill="#a88858" opacity="0.5"/>

  <!-- Large counter/table -->
  <rect x="0" y="900" width="1080" height="40" rx="4" fill="url(#counter)" filter="url(#shadow)"/>
  <rect x="0" y="940" width="1080" height="980" fill="url(#counter)" opacity="0.85"/>

  <!-- Counter surface items -->
  <!-- Cutting board -->
  <rect x="100" y="850" width="160" height="50" rx="8" fill="#c8a870" opacity="0.7"/>
  <!-- Bowl -->
  <ellipse cx="550" cy="870" rx="60" ry="20" fill="#e8d8c0"/>
  <ellipse cx="550" cy="860" rx="55" ry="15" fill="#d8c8a8"/>

  <!-- Floor area -->
  <rect x="0" y="1300" width="1080" height="620" fill="url(#floor)"/>
  <!-- Floor tile pattern -->
  <line x1="0" y1="1300" x2="1080" y2="1300" stroke="#b89868" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="1500" x2="1080" y2="1500" stroke="#b89868" stroke-width="2" opacity="0.2"/>
  <line x1="0" y1="1700" x2="1080" y2="1700" stroke="#b89868" stroke-width="2" opacity="0.2"/>
  <line x1="270" y1="1300" x2="270" y2="1920" stroke="#b89868" stroke-width="2" opacity="0.2"/>
  <line x1="540" y1="1300" x2="540" y2="1920" stroke="#b89868" stroke-width="2" opacity="0.2"/>
  <line x1="810" y1="1300" x2="810" y2="1920" stroke="#b89868" stroke-width="2" opacity="0.2"/>

  <!-- Cabinet doors -->
  <g opacity="0.7">
    <rect x="40" y="960" width="200" height="300" rx="6" fill="#7a5a3a" stroke="#6a4a2a" stroke-width="3"/>
    <circle cx="220" cy="1110" r="8" fill="#c8a868"/>
    <rect x="290" y="960" width="200" height="300" rx="6" fill="#7a5a3a" stroke="#6a4a2a" stroke-width="3"/>
    <circle cx="310" cy="1110" r="8" fill="#c8a868"/>
    <rect x="590" y="960" width="200" height="300" rx="6" fill="#7a5a3a" stroke="#6a4a2a" stroke-width="3"/>
    <circle cx="770" cy="1110" r="8" fill="#c8a868"/>
    <rect x="840" y="960" width="200" height="300" rx="6" fill="#7a5a3a" stroke="#6a4a2a" stroke-width="3"/>
    <circle cx="860" cy="1110" r="8" fill="#c8a868"/>
  </g>

  <!-- Herbs hanging from ceiling -->
  <g opacity="0.6">
    <line x1="160" y1="0" x2="160" y2="80" stroke="#8b7255" stroke-width="3"/>
    <ellipse cx="160" cy="100" rx="20" ry="35" fill="#6a8a4a"/>
    <ellipse cx="160" cy="95" rx="15" ry="28" fill="#7a9a5a"/>
    <line x1="400" y1="0" x2="400" y2="60" stroke="#8b7255" stroke-width="3"/>
    <ellipse cx="400" cy="85" rx="18" ry="32" fill="#8a7a5a"/>
    <line x1="700" y1="0" x2="700" y2="50" stroke="#8b7255" stroke-width="3"/>
    <ellipse cx="700" cy="80" rx="22" ry="38" fill="#6a8a4a"/>
    <ellipse cx="700" cy="75" rx="16" ry="30" fill="#7a9a5a"/>
    <line x1="900" y1="0" x2="900" y2="70" stroke="#8b7255" stroke-width="3"/>
    <ellipse cx="900" cy="90" rx="16" ry="28" fill="#8a7a5a"/>
  </g>

  <!-- Warm lamp glow -->
  <ellipse cx="540" cy="0" rx="400" ry="300" fill="url(#lamp)"/>

  <!-- Warm tint -->
  <rect width="1080" height="1920" fill="#f8e0a0" opacity="0.05"/>
</svg>
