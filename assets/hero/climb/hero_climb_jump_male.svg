<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a20"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6a5232"/>
      <stop offset="60%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a08868"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Ground shadow (smaller during jump) -->
  <ellipse cx="60" cy="194" rx="22" ry="4" fill="#000" opacity="0.08"/>

  <!-- === LEGS — spread === -->
  <line x1="46" y1="148" x2="36" y2="176" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="74" y1="148" x2="84" y2="176" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>

  <!-- === SHOES === -->
  <ellipse cx="36" cy="182" rx="13" ry="7" fill="url(#shoe)"/>
  <ellipse cx="36" cy="180" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>
  <ellipse cx="84" cy="182" rx="13" ry="7" fill="url(#shoe)"/>
  <ellipse cx="84" cy="180" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>

  <!-- === PANTS — dynamic spread === -->
  <polygon points="26,152 38,100 82,100 94,152" fill="url(#pants)" filter="url(#shadow)"/>
  <line x1="60" y1="100" x2="60" y2="152" stroke="#d8d8d8" stroke-width="1.5" opacity="0.5"/>
  <line x1="28" y1="150" x2="92" y2="150" stroke="#d0d0d0" stroke-width="2"/>

  <!-- === TORSO / SHIRT === -->
  <polygon points="38,100 32,64 88,64 82,100" fill="url(#shirt)" filter="url(#shadow)"/>
  <polygon points="50,66 60,78 70,66" fill="#eeeeee" stroke="#d8d8d8" stroke-width="1"/>
  <circle cx="60" cy="82" r="2" fill="#c8c8c8"/>
  <circle cx="60" cy="92" r="2" fill="#c8c8c8"/>

  <!-- === ARMS — raised === -->
  <!-- Left arm -->
  <line x1="32" y1="70" x2="8" y2="38" stroke="#d4b090" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <line x1="32" y1="68" x2="8" y2="36" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="8" cy="36" r="7" fill="url(#skin)"/>
  <circle cx="6" cy="34" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Right arm -->
  <line x1="88" y1="68" x2="112" y2="36" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="112" cy="36" r="7" fill="url(#skin)"/>
  <circle cx="110" cy="34" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Sleeve caps -->
  <ellipse cx="32" cy="68" rx="12" ry="10" fill="url(#shirt)"/>
  <ellipse cx="32" cy="66" rx="8" ry="5" fill="white" opacity="0.2"/>
  <ellipse cx="88" cy="68" rx="12" ry="10" fill="url(#shirt)"/>
  <ellipse cx="88" cy="66" rx="8" ry="5" fill="white" opacity="0.2"/>

  <!-- === NECK === -->
  <rect x="53" y="46" width="14" height="20" fill="url(#skin)" rx="4"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="30" rx="27" ry="28" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="58" cy="14" rx="14" ry="8" fill="white" opacity="0.08"/>

  <!-- === HAIR === -->
  <path d="M33,26 L38,6 L60,1 L82,6 L87,26 L84,34 L36,34 Z" fill="url(#hair)"/>
  <path d="M35,28 L39,8 L60,3 L81,8 L85,28" fill="url(#hair)"/>
  <line x1="48" y1="5" x2="46" y2="26" stroke="#2a1808" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M52,5 Q56,7 54,20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.1"/>

  <!-- === EYES — excited === -->
  <ellipse cx="48" cy="32" rx="8.5" ry="8" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <ellipse cx="72" cy="32" rx="8.5" ry="8" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <circle cx="50" cy="32" r="5.5" fill="url(#iris)"/>
  <circle cx="74" cy="32" r="5.5" fill="url(#iris)"/>
  <circle cx="50" cy="32" r="2.8" fill="#0a0400"/>
  <circle cx="74" cy="32" r="2.8" fill="#0a0400"/>
  <circle cx="52" cy="30" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="76" cy="30" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="48" cy="34" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="72" cy="34" r="1.4" fill="white" opacity="0.5"/>
  <!-- Eyebrows — raised excited -->
  <path d="M39,20 Q48,15 57,19" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M63,19 Q72,15 81,20" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M60,36 Q62,41 60,42" stroke="#d4b89a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M50,47 Q60,55 70,47" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M53,49 Q60,53 67,49" fill="#a05040" opacity="0.3"/>

  <!-- === RIM LIGHT === -->
  <path d="M86,6 L88,30 L86,64 L94,100 L94,152" stroke="white" stroke-width="1.5" fill="none" opacity="0.1" stroke-linecap="round"/>
</svg>
