<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 120">
  <!-- Shadow -->
  <ellipse cx="32" cy="115" rx="18" ry="4" fill="black" opacity="0.1"/>
  <!-- Legs apart (jumping) -->
  <line x1="22" y1="88" x2="16" y2="108" stroke="#8b7355" stroke-width="6" stroke-linecap="round"/>
  <line x1="42" y1="88" x2="48" y2="108" stroke="#8b7355" stroke-width="6" stroke-linecap="round"/>
  <!-- Pants -->
  <polygon points="18,74 22,88 32,88 32,74" fill="#8b7355"/>
  <polygon points="32,74 32,88 42,88 46,74" fill="#8b7355"/>
  <!-- Shirt body -->
  <rect x="18" y="48" width="28" height="28" rx="3" fill="#f0f0f0"/>
  <line x1="32" y1="48" x2="32" y2="76" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Arms raised -->
  <line x1="18" y1="52" x2="4" y2="36" stroke="#f0d4b8" stroke-width="6" stroke-linecap="round"/>
  <line x1="46" y1="52" x2="60" y2="36" stroke="#f0d4b8" stroke-width="6" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="32" cy="34" r="16" fill="#f0d4b8"/>
  <!-- Short hair -->
  <path d="M18,30 Q18,16 32,14 Q46,16 46,30" fill="#6b5339"/>
  <circle cx="32" cy="20" r="10" fill="#6b5339"/>
  <!-- Eyes (excited) -->
  <circle cx="27" cy="34" r="3" fill="#3d3929"/>
  <circle cx="37" cy="34" r="3" fill="#3d3929"/>
  <circle cx="28" cy="33" r="1" fill="white"/>
  <circle cx="38" cy="33" r="1" fill="white"/>
  <!-- Eyebrows raised -->
  <line x1="24" y1="28" x2="30" y2="29" stroke="#6b5339" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="29" x2="40" y2="28" stroke="#6b5339" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Open smile -->
  <path d="M27,41 Q32,46 37,41" stroke="#c9886e" stroke-width="1.5" fill="#f0d4b8"/>
</svg>
