<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 150">
  <!-- Ground shadow -->
  <ellipse cx="40" cy="145" rx="24" ry="6" fill="black" opacity="0.12"/>

  <!-- Feet -->
  <ellipse cx="26" cy="140" rx="9" ry="5" fill="#8b7355"/>
  <ellipse cx="54" cy="140" rx="9" ry="5" fill="#8b7355"/>

  <!-- Legs — spread for jump -->
  <line x1="32" y1="115" x2="26" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="48" y1="115" x2="54" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>

  <!-- Pants — dynamic -->
  <polygon points="18,118 28,78 52,78 62,118" fill="#f0f0f0"/>
  <line x1="40" y1="78" x2="40" y2="118" stroke="#e0e0e0" stroke-width="1.5" opacity="0.4"/>
  <line x1="20" y1="116" x2="60" y2="116" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Torso / shirt -->
  <polygon points="28,78 24,50 56,50 52,78" fill="#f8f8f8"/>
  <polygon points="34,52 40,60 46,52" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="40" cy="64" r="1.5" fill="#d0d0d0"/>
  <circle cx="40" cy="72" r="1.5" fill="#d0d0d0"/>

  <!-- Arms — raised for jump -->
  <line x1="24" y1="54" x2="6" y2="34" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="56" y1="54" x2="74" y2="34" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <circle cx="6" cy="34" r="5" fill="#f0d4b8"/>
  <circle cx="74" cy="34" r="5" fill="#f0d4b8"/>
  <ellipse cx="24" cy="54" rx="9" ry="7" fill="#f2f2f2"/>
  <ellipse cx="56" cy="54" rx="9" ry="7" fill="#f2f2f2"/>

  <!-- Neck -->
  <rect x="36" y="38" width="8" height="13" fill="#f0d4b8" rx="2"/>

  <!-- Head -->
  <ellipse cx="40" cy="26" rx="18" ry="19" fill="#f0d4b8"/>

  <!-- Hair -->
  <polygon points="22,24 26,8 40,5 54,8 58,24 56,30 24,30" fill="#5a3a1a"/>
  <polygon points="24,26 27,10 40,7 53,10 56,26" fill="#5a3a1a"/>
  <line x1="32" y1="9" x2="30" y2="24" stroke="#4a2a10" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Eyes — excited -->
  <ellipse cx="33" cy="26" rx="5.5" ry="5.5" fill="white"/>
  <ellipse cx="47" cy="26" rx="5.5" ry="5.5" fill="white"/>
  <circle cx="34" cy="26" r="3.5" fill="#3a2a1a"/>
  <circle cx="48" cy="26" r="3.5" fill="#3a2a1a"/>
  <circle cx="34" cy="26" r="1.8" fill="#1a0a00"/>
  <circle cx="48" cy="26" r="1.8" fill="#1a0a00"/>
  <circle cx="35.5" cy="25" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="49.5" cy="25" r="1.3" fill="white" opacity="0.85"/>
  <line x1="27" y1="18" x2="38" y2="17" stroke="#5a3a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="17" x2="53" y2="18" stroke="#5a3a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="28" x2="41.5" y2="33" stroke="#d4b89a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M34,36 Q40,42 46,36" stroke="#c9886e" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
