<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a20"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#6a5232"/>
      <stop offset="55%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="194" rx="30" ry="5" fill="#000" opacity="0.1"/>

  <!-- === LEGS === -->
  <line x1="48" y1="155" x2="46" y2="176" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>
  <line x1="48" y1="155" x2="46" y2="176" stroke="#d8b898" stroke-width="11" stroke-linecap="round" opacity="0.15"/>
  <line x1="72" y1="155" x2="74" y2="176" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>

  <!-- === SHOES === -->
  <ellipse cx="46" cy="183" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="46" cy="181" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>
  <ellipse cx="74" cy="183" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="74" cy="181" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>

  <!-- === PANTS (two separate legs) === -->
  <polygon points="36,160 40,106 58,106 54,160" fill="url(#pants)" filter="url(#shadow)"/>
  <polygon points="66,160 62,106 80,106 84,160" fill="url(#pants)" filter="url(#shadow)"/>
  <!-- Side creases -->
  <line x1="48" y1="112" x2="44" y2="156" stroke="#ddd" stroke-width="1.2" opacity="0.3"/>
  <line x1="72" y1="112" x2="76" y2="156" stroke="#ddd" stroke-width="1.2" opacity="0.3"/>
  <!-- Inseam lines -->
  <line x1="56" y1="110" x2="53" y2="158" stroke="#d4d0c8" stroke-width="1" opacity="0.3"/>
  <line x1="64" y1="110" x2="67" y2="158" stroke="#d4d0c8" stroke-width="1" opacity="0.3"/>
  <!-- Hem lines -->
  <line x1="37" y1="158" x2="53" y2="158" stroke="#d0ccc4" stroke-width="1.5" opacity="0.5"/>
  <line x1="67" y1="158" x2="83" y2="158" stroke="#d0ccc4" stroke-width="1.5" opacity="0.5"/>
  <!-- Waistband -->
  <rect x="38" y="104" width="44" height="5" rx="2.5" fill="#e8dcd0" opacity="0.5"/>

  <!-- === TORSO / SHIRT === -->
  <path d="M40,106 Q38,78 42,74 L78,74 Q82,78 80,106Z" fill="url(#shirt)" filter="url(#inner_shadow)"/>
  <!-- Polo collar V-opening -->
  <path d="M60,74 L54,88" stroke="#f0d8c0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M60,74 L66,88" stroke="#f0d8c0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Polo collar (pointed, structured) -->
  <path d="M48,76 L54,80 L60,74 L66,80 L72,76" stroke="#e8e2d8" stroke-width="1.5" fill="#f8f4ee" opacity="0.7"/>
  <!-- 3 buttons -->
  <circle cx="60" cy="88" r="2" fill="#d4cec4"/>
  <circle cx="60" cy="94" r="2" fill="#d4cec4"/>
  <circle cx="60" cy="100" r="2" fill="#d4cec4"/>

  <!-- === ARMS === -->
  <line x1="38" y1="82" x2="22" y2="124" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
  <line x1="38" y1="80" x2="22" y2="122" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="22" cy="122" r="6.5" fill="url(#skin)"/>
  <circle cx="20" cy="120" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <line x1="82" y1="80" x2="98" y2="122" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="98" cy="122" r="6.5" fill="url(#skin)"/>
  <circle cx="96" cy="120" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <!-- Sleeves (fitted) -->
  <ellipse cx="38" cy="80" rx="12" ry="10" fill="url(#shirt)" filter="url(#inner_shadow)"/>
  <ellipse cx="38" cy="78" rx="7" ry="4" fill="white" opacity="0.12"/>
  <ellipse cx="82" cy="80" rx="12" ry="10" fill="url(#shirt)" filter="url(#inner_shadow)"/>
  <ellipse cx="82" cy="78" rx="7" ry="4" fill="white" opacity="0.12"/>

  <!-- === NECK === -->
  <rect x="53" y="58" width="14" height="18" fill="url(#skin)" rx="5"/>

  <!-- === HAIR BACK (BEFORE head so skin shows on top) === -->
  <path d="M28,40 L30,16 L60,5 L90,16 L92,40 L90,63 L84,66 L36,66 L30,63 Z" fill="#2a1808" opacity="0.35"/>
  <path d="M30,38 L32,18 L60,8 L88,18 L90,38 L88,60 L82,62 L38,62 L32,60 Z" fill="url(#hair)"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="40" rx="30" ry="32" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="36" cy="50" rx="7" ry="4" fill="#ffb0a0" opacity="0.12"/>
  <ellipse cx="84" cy="50" rx="7" ry="4" fill="#ffb0a0" opacity="0.12"/>
  <ellipse cx="58" cy="22" rx="16" ry="10" fill="white" opacity="0.07"/>

  <!-- === HAIR TOP (crown + edges, AFTER head, BEFORE face) === -->
  <path d="M30,44 L34,18 L60,8 L86,18 L90,44" fill="url(#hair)"/>
  <path d="M36,20 Q48,10 60,8 Q72,10 84,20" fill="url(#hair)" opacity="0.6"/>
  <!-- Side volume (stops at y=54, above eye line) -->
  <path d="M30,44 Q28,50 30,54 Q32,56 36,54" fill="url(#hair)" opacity="0.9"/>
  <path d="M90,44 Q92,50 90,54 Q88,56 84,54" fill="url(#hair)" opacity="0.9"/>
  <path d="M30,44 Q27,49 29,53 Q30,55 33,53" fill="#3a2010" opacity="0.25"/>
  <path d="M90,44 Q93,49 91,53 Q90,55 87,53" fill="#3a2010" opacity="0.25"/>
  <!-- Part line -->
  <path d="M40,16 Q44,12 50,11" stroke="#2a1808" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M42,12 Q54,6 66,8 Q78,10 84,16" stroke="#4a2a14" stroke-width="1.2" fill="none" opacity="0.2"/>
  <!-- Hair strands (shortened to stay above face) -->
  <path d="M44,14 Q52,10 60,12" stroke="#7a5030" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M48,22 L46,36" stroke="#6a4428" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M72,22 L76,36" stroke="#6a4428" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M38,26 Q40,32 38,38" stroke="#5a3420" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M56,16 Q58,24 56,32" stroke="#6a4428" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M66,18 Q68,26 70,34" stroke="#5a3420" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.15"/>
  <path d="M82,24 Q84,32 82,38" stroke="#6a4428" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Hair shine -->
  <path d="M50,14 Q54,18 52,28" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.1"/>
  <path d="M68,16 Q70,22 68,28" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.07"/>
  <path d="M42,18 Q46,24 44,32" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.08"/>
  <path d="M76,18 Q78,24 76,32" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.06"/>
  <path d="M60,10 Q62,16 60,22" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.12"/>

  <!-- === EYES === -->
  <ellipse cx="46" cy="44" rx="10" ry="9" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <ellipse cx="74" cy="44" rx="10" ry="9" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <circle cx="48" cy="44" r="6.5" fill="url(#iris)"/>
  <circle cx="76" cy="44" r="6.5" fill="url(#iris)"/>
  <circle cx="48" cy="44" r="3.2" fill="#0a0800"/>
  <circle cx="76" cy="44" r="3.2" fill="#0a0800"/>
  <circle cx="51" cy="42" r="2.8" fill="white" opacity="0.92"/>
  <circle cx="79" cy="42" r="2.8" fill="white" opacity="0.92"/>
  <circle cx="46" cy="47" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="74" cy="47" r="1.5" fill="white" opacity="0.5"/>
  <path d="M36,39 Q46,33 56,39" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <path d="M64,39 Q74,33 84,39" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <path d="M40,50 Q46,52 52,50" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M68,50 Q74,52 80,50" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- Eyebrows — thicker for male -->
  <path d="M37,32 Q46,27 55,31" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M65,31 Q74,27 83,32" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M59,50 Q60.5,55 59.5,56" stroke="#d4b89a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="57.5" cy="56" r="1" fill="#d4b89a" opacity="0.35"/>

  <!-- Mouth -->
  <path d="M51,60 Q60,67 69,60" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M53,63 Q60,65 67,63" stroke="#d8988a" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- === RIM LIGHT === -->
  <path d="M88,18 L90,40 L86,74 L90,106 L92,160" stroke="white" stroke-width="1.5" fill="none" opacity="0.08" stroke-linecap="round"/>
</svg>
