<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a20"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6a5232"/>
      <stop offset="60%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a08868"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="194" rx="32" ry="6" fill="#000" opacity="0.12"/>

  <!-- === LEGS === -->
  <line x1="47" y1="154" x2="44" y2="178" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="47" y1="154" x2="44" y2="178" stroke="#e0b890" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <line x1="73" y1="154" x2="76" y2="178" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>

  <!-- === SHOES === -->
  <ellipse cx="44" cy="186" rx="13" ry="7" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="44" cy="184" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>
  <ellipse cx="76" cy="186" rx="13" ry="7" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="76" cy="184" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>

  <!-- === PANTS === -->
  <polygon points="30,158 40,108 80,108 90,158" fill="url(#pants)" filter="url(#shadow)"/>
  <!-- Center seam -->
  <line x1="60" y1="108" x2="60" y2="158" stroke="#d8d8d8" stroke-width="1.5" opacity="0.5"/>
  <!-- Hem -->
  <line x1="32" y1="156" x2="88" y2="156" stroke="#d0d0d0" stroke-width="2"/>

  <!-- === TORSO / SHIRT === -->
  <polygon points="40,108 34,74 86,74 80,108" fill="url(#shirt)" filter="url(#shadow)"/>
  <!-- Collar -->
  <polygon points="50,76 60,86 70,76" fill="#eeeeee" stroke="#d8d8d8" stroke-width="1"/>
  <!-- Buttons -->
  <circle cx="60" cy="90" r="2" fill="#c8c8c8"/>
  <circle cx="60" cy="100" r="2" fill="#c8c8c8"/>

  <!-- === ARMS === -->
  <!-- Left arm -->
  <line x1="34" y1="80" x2="16" y2="122" stroke="#d4b090" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <line x1="34" y1="78" x2="16" y2="120" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="16" cy="120" r="7" fill="url(#skin)"/>
  <circle cx="14" cy="118" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Right arm -->
  <line x1="86" y1="78" x2="104" y2="120" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="104" cy="120" r="7" fill="url(#skin)"/>
  <circle cx="102" cy="118" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Sleeve caps -->
  <ellipse cx="34" cy="78" rx="12" ry="10" fill="url(#shirt)"/>
  <ellipse cx="34" cy="76" rx="8" ry="5" fill="white" opacity="0.2"/>
  <ellipse cx="86" cy="78" rx="12" ry="10" fill="url(#shirt)"/>
  <ellipse cx="86" cy="76" rx="8" ry="5" fill="white" opacity="0.2"/>

  <!-- === NECK === -->
  <rect x="53" y="56" width="14" height="20" fill="url(#skin)" rx="4"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="40" rx="27" ry="28" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="58" cy="24" rx="14" ry="8" fill="white" opacity="0.08"/>

  <!-- === HAIR — short style === -->
  <path d="M33,36 L38,16 L60,11 L82,16 L87,36 L84,44 L36,44 Z" fill="url(#hair)"/>
  <path d="M35,38 L39,18 L60,13 L81,18 L85,38" fill="url(#hair)"/>
  <!-- Texture lines -->
  <line x1="48" y1="15" x2="46" y2="36" stroke="#2a1808" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="66" y1="14" x2="68" y2="34" stroke="#2a1808" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Shine -->
  <path d="M52,15 Q56,17 54,30" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.1"/>

  <!-- === EYES === -->
  <ellipse cx="48" cy="42" rx="8.5" ry="7.5" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <ellipse cx="72" cy="42" rx="8.5" ry="7.5" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <circle cx="50" cy="42" r="5.5" fill="url(#iris)"/>
  <circle cx="74" cy="42" r="5.5" fill="url(#iris)"/>
  <circle cx="50" cy="42" r="2.8" fill="#0a0400"/>
  <circle cx="74" cy="42" r="2.8" fill="#0a0400"/>
  <circle cx="52" cy="40" r="2.2" fill="white" opacity="0.9"/>
  <circle cx="76" cy="40" r="2.2" fill="white" opacity="0.9"/>
  <circle cx="48" cy="44" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="72" cy="44" r="1.2" fill="white" opacity="0.5"/>
  <!-- Eyebrows — thicker for male -->
  <path d="M39,32 Q48,27 57,31" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M63,31 Q72,27 81,32" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M60,46 Q62,51 60,52" stroke="#d4b89a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Mouth — confident smile -->
  <path d="M52,57 Q60,63 68,57" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- === RIM LIGHT === -->
  <path d="M86,16 L88,40 L86,74 L90,108 L90,158" stroke="white" stroke-width="1.5" fill="none" opacity="0.1" stroke-linecap="round"/>
</svg>
