<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 150">
  <!-- Ground shadow -->
  <ellipse cx="40" cy="145" rx="24" ry="6" fill="black" opacity="0.12"/>

  <!-- Feet / shoes -->
  <ellipse cx="30" cy="140" rx="9" ry="5" fill="#8b7355"/>
  <ellipse cx="50" cy="140" rx="9" ry="5" fill="#8b7355"/>

  <!-- Legs -->
  <line x1="32" y1="120" x2="30" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="48" y1="120" x2="50" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>

  <!-- Pants -->
  <polygon points="20,122 28,86 52,86 60,122" fill="#f0f0f0"/>
  <line x1="40" y1="86" x2="40" y2="122" stroke="#e0e0e0" stroke-width="1.5" opacity="0.4"/>
  <line x1="22" y1="120" x2="58" y2="120" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Torso / shirt -->
  <polygon points="28,86 24,56 56,56 52,86" fill="#f8f8f8"/>
  <!-- Collar -->
  <polygon points="34,58 40,66 46,58" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Shirt buttons -->
  <circle cx="40" cy="70" r="1.5" fill="#d0d0d0"/>
  <circle cx="40" cy="78" r="1.5" fill="#d0d0d0"/>

  <!-- Arms -->
  <line x1="24" y1="60" x2="12" y2="94" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="56" y1="60" x2="68" y2="94" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="12" cy="94" r="5" fill="#f0d4b8"/>
  <circle cx="68" cy="94" r="5" fill="#f0d4b8"/>
  <!-- Sleeve caps -->
  <ellipse cx="24" cy="60" rx="9" ry="7" fill="#f2f2f2"/>
  <ellipse cx="56" cy="60" rx="9" ry="7" fill="#f2f2f2"/>

  <!-- Neck -->
  <rect x="36" y="44" width="8" height="14" fill="#f0d4b8" rx="2"/>

  <!-- Head -->
  <ellipse cx="40" cy="32" rx="18" ry="19" fill="#f0d4b8"/>

  <!-- Hair — short style -->
  <polygon points="22,30 26,14 40,11 54,14 58,30 56,36 24,36" fill="#5a3a1a"/>
  <polygon points="24,32 27,16 40,13 53,16 56,32" fill="#5a3a1a"/>
  <!-- Hair texture -->
  <line x1="32" y1="15" x2="30" y2="30" stroke="#4a2a10" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="44" y1="14" x2="46" y2="28" stroke="#4a2a10" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Eyes -->
  <ellipse cx="33" cy="32" rx="5.5" ry="5" fill="white"/>
  <ellipse cx="47" cy="32" rx="5.5" ry="5" fill="white"/>
  <circle cx="34" cy="32" r="3.5" fill="#3a2a1a"/>
  <circle cx="48" cy="32" r="3.5" fill="#3a2a1a"/>
  <circle cx="34" cy="32" r="1.8" fill="#1a0a00"/>
  <circle cx="48" cy="32" r="1.8" fill="#1a0a00"/>
  <circle cx="35.5" cy="31" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="49.5" cy="31" r="1.3" fill="white" opacity="0.85"/>
  <!-- Eyebrows — thicker for male -->
  <line x1="27" y1="24" x2="38" y2="23" stroke="#5a3a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="23" x2="53" y2="24" stroke="#5a3a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Nose -->
  <line x1="40" y1="34" x2="41.5" y2="39" stroke="#d4b89a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mouth — confident smile -->
  <path d="M35,43 Q40,47 45,43" stroke="#c9886e" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
