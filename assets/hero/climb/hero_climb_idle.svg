<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <!-- Skin gradient -->
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <!-- Hair gradient -->
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <!-- Eye gradient -->
    <radialGradient id="iris" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8b6342"/>
      <stop offset="60%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#3a1a08"/>
    </radialGradient>
    <!-- Dress fabric gradient -->
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfc"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <!-- Blouse gradient -->
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <!-- Shoe leather -->
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a08868"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </radialGradient>
    <!-- Rim light filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="194" rx="32" ry="6" fill="#000" opacity="0.12"/>

  <!-- === LEGS === -->
  <!-- Left leg -->
  <line x1="47" y1="158" x2="44" y2="180" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="47" y1="158" x2="44" y2="180" stroke="#e0b890" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <!-- Right leg -->
  <line x1="73" y1="158" x2="76" y2="180" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>

  <!-- === SHOES === -->
  <ellipse cx="44" cy="186" rx="13" ry="7" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="44" cy="184" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>
  <ellipse cx="76" cy="186" rx="13" ry="7" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="76" cy="184" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>

  <!-- === DRESS === -->
  <polygon points="26,162 40,110 80,110 94,162" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Hem wave -->
  <path d="M26,162 Q38,166 50,160 Q62,166 74,160 Q86,166 94,162" fill="url(#dress)" stroke="#d8d8d8" stroke-width="1"/>
  <!-- Fold lines -->
  <line x1="50" y1="114" x2="47" y2="158" stroke="#ddd" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="114" x2="73" y2="158" stroke="#ddd" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="112" x2="60" y2="160" stroke="#ddd" stroke-width="1" opacity="0.3"/>
  <!-- Waistband -->
  <rect x="38" y="108" width="44" height="6" rx="3" fill="#e0d8d0" opacity="0.5"/>

  <!-- === TORSO / BLOUSE === -->
  <polygon points="40,110 36,80 84,80 80,110" fill="url(#blouse)" filter="url(#shadow)"/>
  <!-- Neckline V -->
  <path d="M60,80 L52,94" stroke="#f0d4b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M60,80 L68,94" stroke="#f0d4b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Collar detail -->
  <path d="M52,82 L60,80 L68,82" stroke="#e8e0d8" stroke-width="1.5" fill="none"/>

  <!-- === ARMS === -->
  <!-- Left arm + shadow -->
  <line x1="36" y1="86" x2="18" y2="130" stroke="#d4b090" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <line x1="36" y1="84" x2="18" y2="128" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="18" cy="128" r="7" fill="url(#skin)"/>
  <circle cx="16" cy="126" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Right arm -->
  <line x1="84" y1="84" x2="102" y2="128" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <!-- Right hand -->
  <circle cx="102" cy="128" r="7" fill="url(#skin)"/>
  <circle cx="100" cy="126" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Sleeve caps -->
  <ellipse cx="36" cy="84" rx="12" ry="10" fill="url(#blouse)"/>
  <ellipse cx="36" cy="82" rx="8" ry="5" fill="white" opacity="0.2"/>
  <ellipse cx="84" cy="84" rx="12" ry="10" fill="url(#blouse)"/>
  <ellipse cx="84" cy="82" rx="8" ry="5" fill="white" opacity="0.2"/>

  <!-- === NECK === -->
  <rect x="53" y="62" width="14" height="20" fill="url(#skin)" rx="4"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="46" rx="28" ry="30" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Cheek glow -->
  <ellipse cx="38" cy="54" rx="8" ry="5" fill="#ffb0a0" opacity="0.18"/>
  <ellipse cx="82" cy="54" rx="8" ry="5" fill="#ffb0a0" opacity="0.18"/>
  <!-- Forehead highlight -->
  <ellipse cx="58" cy="30" rx="14" ry="8" fill="white" opacity="0.08"/>

  <!-- === HAIR === -->
  <!-- Back hair -->
  <path d="M32,42 L34,24 L60,16 L86,24 L88,42 L86,105 L76,108 L44,108 L34,105 Z" fill="url(#hair)"/>
  <!-- Crown -->
  <path d="M33,48 L36,24 L60,16 L84,24 L87,48" fill="url(#hair)"/>
  <!-- Volume highlight -->
  <path d="M44,20 Q52,16 60,18" stroke="#c4985e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M48,26 L46,55" stroke="#b8884e" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Hair shine streak -->
  <path d="M52,20 Q56,22 54,42" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.12"/>

  <!-- === EYES === -->
  <!-- Eye whites with subtle edge -->
  <ellipse cx="48" cy="48" rx="9" ry="8" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <ellipse cx="72" cy="48" rx="9" ry="8" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <!-- Iris with gradient -->
  <circle cx="50" cy="48" r="5.5" fill="url(#iris)"/>
  <circle cx="74" cy="48" r="5.5" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="50" cy="48" r="2.8" fill="#0a0400"/>
  <circle cx="74" cy="48" r="2.8" fill="#0a0400"/>
  <!-- Eye shine — main -->
  <circle cx="52" cy="46" r="2.2" fill="white" opacity="0.9"/>
  <circle cx="76" cy="46" r="2.2" fill="white" opacity="0.9"/>
  <!-- Eye shine — secondary -->
  <circle cx="48" cy="50" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="72" cy="50" r="1.2" fill="white" opacity="0.5"/>
  <!-- Upper eyelid line -->
  <path d="M39,43 Q48,38 57,43" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <path d="M63,43 Q72,38 81,43" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <!-- Eyelashes -->
  <path d="M39,43 L37,40" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M57,43 L59,40" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M63,43 L61,40" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M81,43 L83,40" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M40,36 Q48,32 56,35" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64,35 Q72,32 80,36" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M60,52 Q61,57 60,58" stroke="#d4b89a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="58" cy="58" r="1" fill="#d4b89a" opacity="0.4"/>
  <!-- Mouth — gentle smile -->
  <path d="M52,63 Q60,69 68,63" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lower lip hint -->
  <path d="M54,66 Q60,68 66,66" stroke="#d4988a" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- === FLOWER ACCESSORY === -->
  <g transform="translate(34,30)" filter="url(#shadow)">
    <!-- Petals -->
    <circle cx="0" cy="-4" r="4.5" fill="#e8705e" opacity="0.9"/>
    <circle cx="-5" cy="-1" r="4.5" fill="#e8705e" opacity="0.85"/>
    <circle cx="5" cy="-1" r="4.5" fill="#e8705e" opacity="0.85"/>
    <circle cx="-3" cy="4" r="4.5" fill="#e8705e" opacity="0.8"/>
    <circle cx="3" cy="4" r="4.5" fill="#e8705e" opacity="0.8"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="3.2" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.5" fill="#f5e6b8" opacity="0.7"/>
    <!-- Petal highlights -->
    <circle cx="0" cy="-5" r="1.5" fill="white" opacity="0.2"/>
    <circle cx="-5" cy="-2" r="1.5" fill="white" opacity="0.15"/>
  </g>

  <!-- === RIM LIGHT (right side) === -->
  <path d="M86,24 L88,46 L84,80 L92,110 L94,162" stroke="white" stroke-width="1.5" fill="none" opacity="0.1" stroke-linecap="round"/>
</svg>
