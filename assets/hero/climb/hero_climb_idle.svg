<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 150">
  <!-- Ground shadow -->
  <ellipse cx="40" cy="145" rx="24" ry="6" fill="black" opacity="0.12"/>

  <!-- Feet / shoes -->
  <ellipse cx="30" cy="140" rx="9" ry="5" fill="#8b7355"/>
  <ellipse cx="50" cy="140" rx="9" ry="5" fill="#8b7355"/>

  <!-- Legs -->
  <line x1="32" y1="126" x2="30" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="48" y1="126" x2="50" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>

  <!-- Dress / skirt -->
  <polygon points="18,128 28,86 52,86 62,128" fill="#f0f0f0"/>
  <!-- Hem decoration -->
  <line x1="20" y1="126" x2="60" y2="126" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Fold lines -->
  <line x1="34" y1="88" x2="32" y2="124" stroke="#e0e0e0" stroke-width="1.2" opacity="0.5"/>
  <line x1="46" y1="88" x2="48" y2="124" stroke="#e0e0e0" stroke-width="1.2" opacity="0.5"/>

  <!-- Torso / blouse -->
  <polygon points="28,86 26,62 54,62 52,86" fill="#f8f8f8"/>
  <!-- Neckline -->
  <path d="M40,62 L35,72" stroke="#f0d4b8" stroke-width="3" fill="none"/>
  <path d="M40,62 L45,72" stroke="#f0d4b8" stroke-width="3" fill="none"/>

  <!-- Arms — relaxed at sides -->
  <line x1="26" y1="66" x2="14" y2="100" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="54" y1="66" x2="66" y2="100" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="14" cy="100" r="5" fill="#f0d4b8"/>
  <circle cx="66" cy="100" r="5" fill="#f0d4b8"/>
  <!-- Sleeve caps -->
  <ellipse cx="26" cy="66" rx="9" ry="7" fill="#f2f2f2"/>
  <ellipse cx="54" cy="66" rx="9" ry="7" fill="#f2f2f2"/>

  <!-- Neck -->
  <rect x="36" y="50" width="8" height="14" fill="#f0d4b8" rx="2"/>

  <!-- Head -->
  <ellipse cx="40" cy="38" rx="18" ry="20" fill="#f0d4b8"/>

  <!-- Hair — back -->
  <polygon points="22,34 24,22 40,18 56,22 58,34 56,80 50,82 30,82 24,80" fill="#8b7355"/>
  <!-- Hair — crown -->
  <polygon points="23,40 26,22 40,17 54,22 57,40" fill="#8b7355"/>
  <!-- Hair highlight -->
  <line x1="35" y1="20" x2="33" y2="45" stroke="#a08060" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Eyes — whites -->
  <ellipse cx="33" cy="38" rx="6" ry="5" fill="white"/>
  <ellipse cx="47" cy="38" rx="6" ry="5" fill="white"/>
  <!-- Iris -->
  <circle cx="34" cy="38" r="3.5" fill="#5a3a1a"/>
  <circle cx="48" cy="38" r="3.5" fill="#5a3a1a"/>
  <!-- Pupils -->
  <circle cx="34" cy="38" r="1.8" fill="#1a0a00"/>
  <circle cx="48" cy="38" r="1.8" fill="#1a0a00"/>
  <!-- Eye shine -->
  <circle cx="35.5" cy="37" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="49.5" cy="37" r="1.3" fill="white" opacity="0.85"/>
  <!-- Eyelashes -->
  <path d="M27,35 Q31,31 39,35" stroke="#8b7355" stroke-width="1.5" fill="none"/>
  <path d="M41,35 Q45,31 53,35" stroke="#8b7355" stroke-width="1.5" fill="none"/>
  <!-- Eyebrows -->
  <line x1="28" y1="30" x2="38" y2="28.5" stroke="#8b7355" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="28.5" x2="52" y2="30" stroke="#8b7355" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose -->
  <line x1="40" y1="40" x2="41" y2="44" stroke="#d4b89a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Mouth — gentle smile -->
  <path d="M35,47 Q40,51 45,47" stroke="#c9886e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="30" cy="44" rx="5" ry="3" fill="#ffb0a0" opacity="0.2"/>
  <ellipse cx="50" cy="44" rx="5" ry="3" fill="#ffb0a0" opacity="0.2"/>

  <!-- Flower accessory in hair -->
  <g transform="translate(24,28)">
    <circle cx="0" cy="-3" r="3" fill="#c9886e" opacity="0.9"/>
    <circle cx="-3.5" cy="-1" r="3" fill="#c9886e" opacity="0.85"/>
    <circle cx="3.5" cy="-1" r="3" fill="#c9886e" opacity="0.85"/>
    <circle cx="-2" cy="2.5" r="3" fill="#c9886e" opacity="0.8"/>
    <circle cx="2" cy="2.5" r="3" fill="#c9886e" opacity="0.8"/>
    <circle cx="0" cy="0" r="2.2" fill="#d4a843"/>
    <circle cx="-0.7" cy="-0.7" r="1" fill="#f5e6b8" opacity="0.7"/>
  </g>
</svg>
