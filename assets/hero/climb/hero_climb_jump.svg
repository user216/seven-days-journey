<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8b6342"/>
      <stop offset="60%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#3a1a08"/>
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfc"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a08868"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Ground shadow (jump = smaller/lighter) -->
  <ellipse cx="60" cy="194" rx="22" ry="4" fill="#000" opacity="0.08"/>

  <!-- === LEGS — spread for jump === -->
  <line x1="46" y1="152" x2="38" y2="178" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="74" y1="152" x2="82" y2="178" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>

  <!-- === SHOES === -->
  <ellipse cx="38" cy="184" rx="13" ry="7" fill="url(#shoe)"/>
  <ellipse cx="38" cy="182" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>
  <ellipse cx="82" cy="184" rx="13" ry="7" fill="url(#shoe)"/>
  <ellipse cx="82" cy="182" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>

  <!-- === DRESS — flowing up from jump wind === -->
  <polygon points="22,156 38,102 82,102 98,156" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Hem wave (dramatic flutter) -->
  <path d="M22,156 Q32,162 44,154 Q54,162 66,154 Q78,162 88,154 Q96,160 98,156" fill="url(#dress)" stroke="#d8d8d8" stroke-width="1"/>
  <!-- Fold lines -->
  <line x1="48" y1="106" x2="42" y2="152" stroke="#ddd" stroke-width="1.5" opacity="0.5"/>
  <line x1="72" y1="106" x2="78" y2="152" stroke="#ddd" stroke-width="1.5" opacity="0.5"/>
  <!-- Waistband -->
  <rect x="36" y="100" width="48" height="6" rx="3" fill="#e0d8d0" opacity="0.5"/>

  <!-- === TORSO / BLOUSE === -->
  <polygon points="38,102 34,70 86,70 82,102" fill="url(#blouse)" filter="url(#shadow)"/>
  <path d="M60,70 L52,84" stroke="#f0d4b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M60,70 L68,84" stroke="#f0d4b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M52,72 L60,70 L68,72" stroke="#e8e0d8" stroke-width="1.5" fill="none"/>

  <!-- === ARMS — raised upward === -->
  <!-- Left arm -->
  <line x1="34" y1="76" x2="10" y2="46" stroke="#d4b090" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <line x1="34" y1="74" x2="10" y2="44" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="10" cy="44" r="7" fill="url(#skin)"/>
  <circle cx="8" cy="42" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Right arm -->
  <line x1="86" y1="74" x2="110" y2="44" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="110" cy="44" r="7" fill="url(#skin)"/>
  <circle cx="108" cy="42" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Sleeve caps -->
  <ellipse cx="34" cy="74" rx="12" ry="10" fill="url(#blouse)"/>
  <ellipse cx="34" cy="72" rx="8" ry="5" fill="white" opacity="0.2"/>
  <ellipse cx="86" cy="74" rx="12" ry="10" fill="url(#blouse)"/>
  <ellipse cx="86" cy="72" rx="8" ry="5" fill="white" opacity="0.2"/>

  <!-- === NECK === -->
  <rect x="53" y="52" width="14" height="20" fill="url(#skin)" rx="4"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="36" rx="28" ry="30" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="38" cy="44" rx="8" ry="5" fill="#ffb0a0" opacity="0.18"/>
  <ellipse cx="82" cy="44" rx="8" ry="5" fill="#ffb0a0" opacity="0.18"/>
  <ellipse cx="58" cy="20" rx="14" ry="8" fill="white" opacity="0.08"/>

  <!-- === HAIR — flowing behind from jump === -->
  <path d="M32,32 L34,14 L60,6 L86,14 L88,32 L90,98 L78,102 L42,102 L30,98 Z" fill="url(#hair)"/>
  <path d="M33,38 L36,14 L60,6 L84,14 L87,38" fill="url(#hair)"/>
  <!-- Hair flowing out at bottom from wind -->
  <path d="M30,98 Q24,106 28,112" stroke="url(#hair)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M90,98 Q96,106 92,112" stroke="url(#hair)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Volume highlight -->
  <path d="M44,10 Q52,6 60,8" stroke="#c4985e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M48,16 L46,45" stroke="#b8884e" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M52,10 Q56,12 54,32" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.12"/>

  <!-- === EYES — excited/wide === -->
  <ellipse cx="48" cy="38" rx="9" ry="8.5" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <ellipse cx="72" cy="38" rx="9" ry="8.5" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <circle cx="50" cy="38" r="5.5" fill="url(#iris)"/>
  <circle cx="74" cy="38" r="5.5" fill="url(#iris)"/>
  <circle cx="50" cy="38" r="2.8" fill="#0a0400"/>
  <circle cx="74" cy="38" r="2.8" fill="#0a0400"/>
  <!-- Eye shines -->
  <circle cx="52" cy="36" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="76" cy="36" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="48" cy="40" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="72" cy="40" r="1.4" fill="white" opacity="0.5"/>
  <!-- Eyelids -->
  <path d="M39,33 Q48,28 57,33" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <path d="M63,33 Q72,28 81,33" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <!-- Eyelashes -->
  <path d="M39,33 L36,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M57,33 L59,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M63,33 L61,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M81,33 L83,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyebrows — raised (excited) -->
  <path d="M40,26 Q48,21 56,25" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64,25 Q72,21 80,26" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M60,42 Q61,47 60,48" stroke="#d4b89a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Big excited smile -->
  <path d="M50,54 Q60,62 70,54" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Open mouth hint -->
  <path d="M53,56 Q60,60 67,56" fill="#a05040" opacity="0.3"/>

  <!-- === FLOWER ACCESSORY === -->
  <g transform="translate(34,20)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="4.5" fill="#e8705e" opacity="0.9"/>
    <circle cx="-5" cy="-1" r="4.5" fill="#e8705e" opacity="0.85"/>
    <circle cx="5" cy="-1" r="4.5" fill="#e8705e" opacity="0.85"/>
    <circle cx="-3" cy="4" r="4.5" fill="#e8705e" opacity="0.8"/>
    <circle cx="3" cy="4" r="4.5" fill="#e8705e" opacity="0.8"/>
    <circle cx="0" cy="0" r="3.2" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.5" fill="#f5e6b8" opacity="0.7"/>
    <circle cx="0" cy="-5" r="1.5" fill="white" opacity="0.2"/>
  </g>

  <!-- === RIM LIGHT === -->
  <path d="M86,14 L88,36 L86,70 L96,102 L98,156" stroke="white" stroke-width="1.5" fill="none" opacity="0.1" stroke-linecap="round"/>
</svg>
