<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#7eb89a"/>
      <stop offset="55%" stop-color="#4a8c6a"/>
      <stop offset="100%" stop-color="#2a5c3a"/>
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow (shrunk — character is airborne) -->
  <ellipse cx="60" cy="194" rx="22" ry="4" fill="#000" opacity="0.07"/>

  <!-- === LEGS (spread wider, shifted up 12) === -->
  <line x1="48" y1="143" x2="38" y2="164" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>
  <line x1="48" y1="143" x2="38" y2="164" stroke="#d8b898" stroke-width="11" stroke-linecap="round" opacity="0.15"/>
  <line x1="72" y1="143" x2="82" y2="164" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>

  <!-- === SHOES (spread to x=38/82, shifted up 12) === -->
  <ellipse cx="38" cy="171" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="38" cy="169" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>
  <ellipse cx="82" cy="171" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="82" cy="169" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>

  <!-- === DRESS (A-line skirt, wider flare for jump) === -->
  <path d="M22,148 Q30,96 40,94 L80,94 Q90,96 98,148 Q82,152 60,150 Q38,152 22,148Z" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Hem scallops (4 scallops, dramatic wave, wider flare) -->
  <path d="M22,148 Q32,158 41,147 Q50,158 60,148 Q70,158 79,147 Q89,158 98,148" fill="url(#dress)" stroke="#d4d0c8" stroke-width="0.8"/>
  <!-- Fold lines -->
  <line x1="50" y1="100" x2="44" y2="144" stroke="#ddd" stroke-width="1.2" opacity="0.4"/>
  <line x1="70" y1="100" x2="76" y2="144" stroke="#ddd" stroke-width="1.2" opacity="0.4"/>
  <line x1="60" y1="96" x2="60" y2="146" stroke="#ddd" stroke-width="0.8" opacity="0.25"/>
  <!-- Waistband with bow -->
  <rect x="38" y="92" width="44" height="5" rx="2.5" fill="#e8dcd0" opacity="0.5"/>
  <circle cx="60" cy="94" r="3.5" fill="#e0d4c4" opacity="0.6"/>
  <path d="M54,94 Q56,90 60,94 Q64,90 66,94" fill="#e0d4c4" opacity="0.5"/>

  <!-- === TORSO / BLOUSE (shifted up 12) === -->
  <path d="M40,94 Q38,66 42,62 L78,62 Q82,66 80,94Z" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <!-- Neckline V -->
  <path d="M60,62 L53,78" stroke="#f0d8c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M60,62 L67,78" stroke="#f0d8c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Peter Pan collar -->
  <path d="M48,64 Q54,68 60,62 Q66,68 72,64" stroke="#e8e2d8" stroke-width="1.2" fill="#f8f4ee" opacity="0.6"/>

  <!-- === ARMS (raised upward) === -->
  <!-- Left arm -->
  <line x1="38" y1="70" x2="20" y2="42" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
  <line x1="38" y1="68" x2="20" y2="40" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="20" cy="40" r="6.5" fill="url(#skin)"/>
  <circle cx="18" cy="38" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <!-- Right arm -->
  <line x1="82" y1="68" x2="100" y2="40" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="100" cy="40" r="6.5" fill="url(#skin)"/>
  <circle cx="98" cy="38" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <!-- Puffy sleeves -->
  <ellipse cx="38" cy="68" rx="13" ry="11" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <ellipse cx="38" cy="66" rx="8" ry="5" fill="white" opacity="0.15"/>
  <ellipse cx="82" cy="68" rx="13" ry="11" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <ellipse cx="82" cy="66" rx="8" ry="5" fill="white" opacity="0.15"/>

  <!-- === NECK (shifted up 12) === -->
  <rect x="53" y="46" width="14" height="18" fill="url(#skin)" rx="5"/>

  <!-- === HEAD (chibi — shifted up 12, center at cy=28) === -->
  <ellipse cx="60" cy="28" rx="30" ry="32" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Cheek blush -->
  <ellipse cx="36" cy="38" rx="8" ry="5" fill="#ffb0a0" opacity="0.2"/>
  <ellipse cx="84" cy="38" rx="8" ry="5" fill="#ffb0a0" opacity="0.2"/>
  <!-- Forehead highlight -->
  <ellipse cx="58" cy="10" rx="16" ry="10" fill="white" opacity="0.07"/>

  <!-- === HAIR (shifted up 12) === -->
  <!-- Back volume -->
  <path d="M30,26 L32,6 L60,-4 L88,6 L90,26 L88,88 L78,92 L42,92 L32,88 Z" fill="url(#hair)"/>
  <!-- Crown shape -->
  <path d="M30,32 L34,6 L60,-4 L86,6 L90,32" fill="url(#hair)"/>
  <!-- Side volume -->
  <path d="M30,32 Q28,48 30,63 Q32,68 36,66" fill="url(#hair)" opacity="0.9"/>
  <path d="M90,32 Q92,48 90,63 Q88,68 84,66" fill="url(#hair)" opacity="0.9"/>
  <!-- Hair texture strands -->
  <path d="M44,2 Q52,-2 60,0" stroke="#c49860" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M48,10 L44,40" stroke="#b88a50" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M72,10 L76,40" stroke="#b88a50" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Hair shine -->
  <path d="M50,2 Q54,6 52,26" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.12"/>
  <path d="M68,4 Q70,10 68,22" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.08"/>
  <!-- Flowing hair strands (wind effect from jump) -->
  <path d="M32,88 Q26,94 22,92 Q28,98 34,96" stroke="url(#hair)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M88,88 Q94,94 98,92 Q92,98 86,96" stroke="url(#hair)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M36,90 Q30,98 26,100" stroke="#8a6438" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M84,90 Q90,98 94,100" stroke="#8a6438" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- === EYES (shifted up 12, ry+0.5 — excited expression) === -->
  <!-- Eye whites -->
  <ellipse cx="46" cy="32" rx="10" ry="9.5" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <ellipse cx="74" cy="32" rx="10" ry="9.5" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <!-- Iris -->
  <circle cx="48" cy="32" r="6.5" fill="url(#iris)"/>
  <circle cx="76" cy="32" r="6.5" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="48" cy="32" r="3.2" fill="#0a0800"/>
  <circle cx="76" cy="32" r="3.2" fill="#0a0800"/>
  <!-- Main highlight -->
  <circle cx="51" cy="30" r="2.8" fill="white" opacity="0.92"/>
  <circle cx="79" cy="30" r="2.8" fill="white" opacity="0.92"/>
  <!-- Secondary highlight -->
  <circle cx="46" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="74" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <!-- Upper eyelid -->
  <path d="M36,27 Q46,21 56,27" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <path d="M64,27 Q74,21 84,27" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <!-- Eyelashes -->
  <path d="M36,27 L34,23" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M56,27 L58,23" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64,27 L62,23" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M84,27 L86,23" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower lash line -->
  <path d="M40,38 Q46,40 52,38" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M68,38 Q74,40 80,38" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- Eyebrows (raised 4 units higher than normal shift) -->
  <path d="M37,16 Q46,11 55,15" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M65,15 Q74,11 83,16" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose (shifted up 12) -->
  <path d="M59,38 Q60.5,43 59.5,44" stroke="#d4b89a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="57.5" cy="44" r="1" fill="#d4b89a" opacity="0.35"/>

  <!-- Mouth — wider, slightly open excited smile -->
  <path d="M48,48 Q60,57 72,48" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="60" cy="51" rx="6" ry="3" fill="#c07858" opacity="0.25"/>
  <path d="M52,51 Q60,53 68,51" stroke="#d8988a" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- === FLOWER ACCESSORY (stays with hair, shifted up 12) === -->
  <g transform="translate(32,12)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="5" fill="#e87060" opacity="0.9"/>
    <circle cx="-5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="-3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="0" cy="0" r="3.5" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.8" fill="#f5e6b8" opacity="0.7"/>
    <circle cx="0" cy="-5" r="1.5" fill="white" opacity="0.2"/>
  </g>

  <!-- === RIM LIGHT (shifted up 12) === -->
  <path d="M88,6 L90,28 L86,62 L90,94 L92,148" stroke="white" stroke-width="1.5" fill="none" opacity="0.08" stroke-linecap="round"/>
</svg>
