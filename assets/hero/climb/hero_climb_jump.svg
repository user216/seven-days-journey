<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 150">
  <!-- Ground shadow -->
  <ellipse cx="40" cy="145" rx="24" ry="6" fill="black" opacity="0.12"/>

  <!-- Feet / shoes -->
  <ellipse cx="28" cy="140" rx="9" ry="5" fill="#8b7355"/>
  <ellipse cx="52" cy="140" rx="9" ry="5" fill="#8b7355"/>

  <!-- Legs — jumping spread -->
  <line x1="32" y1="120" x2="28" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="48" y1="120" x2="52" y2="136" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>

  <!-- Dress / skirt — flowing up in jump -->
  <polygon points="16,122 26,80 54,80 64,122" fill="#f0f0f0"/>
  <path d="M16,122 Q24,126 40,120 Q56,126 64,122" stroke="#e0e0e0" stroke-width="2" fill="#f0f0f0"/>
  <!-- Fold lines -->
  <line x1="34" y1="82" x2="30" y2="120" stroke="#e0e0e0" stroke-width="1.2" opacity="0.5"/>
  <line x1="46" y1="82" x2="50" y2="120" stroke="#e0e0e0" stroke-width="1.2" opacity="0.5"/>

  <!-- Torso / blouse -->
  <polygon points="26,80 24,56 56,56 54,80" fill="#f8f8f8"/>
  <path d="M40,56 L35,66" stroke="#f0d4b8" stroke-width="3" fill="none"/>
  <path d="M40,56 L45,66" stroke="#f0d4b8" stroke-width="3" fill="none"/>

  <!-- Arms — raised upward for jump -->
  <line x1="24" y1="60" x2="8" y2="40" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <line x1="56" y1="60" x2="72" y2="40" stroke="#f0d4b8" stroke-width="7" stroke-linecap="round"/>
  <!-- Hands raised -->
  <circle cx="8" cy="40" r="5" fill="#f0d4b8"/>
  <circle cx="72" cy="40" r="5" fill="#f0d4b8"/>
  <!-- Sleeve caps -->
  <ellipse cx="24" cy="60" rx="9" ry="7" fill="#f2f2f2"/>
  <ellipse cx="56" cy="60" rx="9" ry="7" fill="#f2f2f2"/>

  <!-- Neck -->
  <rect x="36" y="43" width="8" height="14" fill="#f0d4b8" rx="2"/>

  <!-- Head -->
  <ellipse cx="40" cy="30" rx="18" ry="20" fill="#f0d4b8"/>

  <!-- Hair — flowing behind in jump -->
  <polygon points="22,26 24,14 40,10 56,14 58,26 60,72 52,75 28,75 20,72" fill="#8b7355"/>
  <polygon points="23,32 26,14 40,10 54,14 57,32" fill="#8b7355"/>
  <line x1="35" y1="13" x2="33" y2="38" stroke="#a08060" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Hair flowing out at bottom from jump wind -->
  <path d="M20,72 Q16,78 18,82" stroke="#8b7355" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M60,72 Q64,78 62,82" stroke="#8b7355" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="33" cy="30" rx="6" ry="5" fill="white"/>
  <ellipse cx="47" cy="30" rx="6" ry="5" fill="white"/>
  <circle cx="34" cy="30" r="3.5" fill="#5a3a1a"/>
  <circle cx="48" cy="30" r="3.5" fill="#5a3a1a"/>
  <circle cx="34" cy="30" r="1.8" fill="#1a0a00"/>
  <circle cx="48" cy="30" r="1.8" fill="#1a0a00"/>
  <circle cx="35.5" cy="29" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="49.5" cy="29" r="1.3" fill="white" opacity="0.85"/>
  <path d="M27,27 Q31,23 39,27" stroke="#8b7355" stroke-width="1.5" fill="none"/>
  <path d="M41,27 Q45,23 53,27" stroke="#8b7355" stroke-width="1.5" fill="none"/>
  <line x1="28" y1="22" x2="38" y2="21" stroke="#8b7355" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="21" x2="52" y2="22" stroke="#8b7355" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="33" x2="41" y2="36" stroke="#d4b89a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Excited smile for jump -->
  <path d="M34,40 Q40,46 46,40" stroke="#c9886e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="30" cy="37" rx="5" ry="3" fill="#ffb0a0" opacity="0.2"/>
  <ellipse cx="50" cy="37" rx="5" ry="3" fill="#ffb0a0" opacity="0.2"/>

  <!-- Flower accessory -->
  <g transform="translate(24,20)">
    <circle cx="0" cy="-3" r="3" fill="#c9886e" opacity="0.9"/>
    <circle cx="-3.5" cy="-1" r="3" fill="#c9886e" opacity="0.85"/>
    <circle cx="3.5" cy="-1" r="3" fill="#c9886e" opacity="0.85"/>
    <circle cx="-2" cy="2.5" r="3" fill="#c9886e" opacity="0.8"/>
    <circle cx="2" cy="2.5" r="3" fill="#c9886e" opacity="0.8"/>
    <circle cx="0" cy="0" r="2.2" fill="#d4a843"/>
  </g>
</svg>
