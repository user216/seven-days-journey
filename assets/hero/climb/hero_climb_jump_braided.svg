<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8b6342"/>
      <stop offset="60%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#3a1a08"/>
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfc"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a08868"/>
      <stop offset="100%" stop-color="#6b5238"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Ground shadow (jump = smaller/lighter) -->
  <ellipse cx="60" cy="194" rx="22" ry="4" fill="#000" opacity="0.08"/>

  <!-- === LEGS — spread for jump === -->
  <line x1="46" y1="152" x2="38" y2="178" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="74" y1="152" x2="82" y2="178" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>

  <!-- === SHOES === -->
  <ellipse cx="38" cy="184" rx="13" ry="7" fill="url(#shoe)"/>
  <ellipse cx="38" cy="182" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>
  <ellipse cx="82" cy="184" rx="13" ry="7" fill="url(#shoe)"/>
  <ellipse cx="82" cy="182" rx="10" ry="4" fill="#c4a878" opacity="0.3"/>

  <!-- === DRESS — flowing up from jump wind === -->
  <polygon points="22,156 38,102 82,102 98,156" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Hem wave (dramatic flutter) -->
  <path d="M22,156 Q32,162 44,154 Q54,162 66,154 Q78,162 88,154 Q96,160 98,156" fill="url(#dress)" stroke="#d8d8d8" stroke-width="1"/>
  <!-- Fold lines -->
  <line x1="48" y1="106" x2="42" y2="152" stroke="#ddd" stroke-width="1.5" opacity="0.5"/>
  <line x1="72" y1="106" x2="78" y2="152" stroke="#ddd" stroke-width="1.5" opacity="0.5"/>
  <!-- Waistband -->
  <rect x="36" y="100" width="48" height="6" rx="3" fill="#e0d8d0" opacity="0.5"/>

  <!-- === TORSO / BLOUSE === -->
  <polygon points="38,102 34,70 86,70 82,102" fill="url(#blouse)" filter="url(#shadow)"/>
  <path d="M60,70 L52,84" stroke="#f0d4b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M60,70 L68,84" stroke="#f0d4b8" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M52,72 L60,70 L68,72" stroke="#e8e0d8" stroke-width="1.5" fill="none"/>

  <!-- === ARMS — raised upward === -->
  <!-- Left arm -->
  <line x1="34" y1="76" x2="10" y2="46" stroke="#d4b090" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  <line x1="34" y1="74" x2="10" y2="44" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="10" cy="44" r="7" fill="url(#skin)"/>
  <circle cx="8" cy="42" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Right arm -->
  <line x1="86" y1="74" x2="110" y2="44" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="110" cy="44" r="7" fill="url(#skin)"/>
  <circle cx="108" cy="42" r="3" fill="#fce4cc" opacity="0.4"/>
  <!-- Sleeve caps -->
  <ellipse cx="34" cy="74" rx="12" ry="10" fill="url(#blouse)"/>
  <ellipse cx="34" cy="72" rx="8" ry="5" fill="white" opacity="0.2"/>
  <ellipse cx="86" cy="74" rx="12" ry="10" fill="url(#blouse)"/>
  <ellipse cx="86" cy="72" rx="8" ry="5" fill="white" opacity="0.2"/>

  <!-- === NECK === -->
  <rect x="53" y="52" width="14" height="20" fill="url(#skin)" rx="4"/>

  <!-- === HAIR BACK (behind head — shadow + braids) === -->
  <!-- Dark base shadow behind crown -->
  <path d="M30,34 L32,12 L60,3 L88,12 L90,34 L88,44 L32,44 Z" fill="#4a2a14" opacity="0.3"/>
  <!-- Left braid shadow — flung outward -->
  <path d="M38,42 Q28,50 20,44 Q12,38 8,46 Q4,54 10,58" stroke="#4a2a14" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.15"/>
  <!-- Left braid — flung outward to the left -->
  <path d="M36,40 Q26,48 18,42 Q10,36 6,44 Q2,52 8,56" stroke="url(#hair)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Left braid woven texture -->
  <path d="M36,40 Q26,48 18,42 Q10,36 6,44 Q2,52 8,56" stroke="#c4985e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.25" stroke-dasharray="6 8"/>
  <!-- Left braid cross-hatching detail -->
  <path d="M32,42 L28,46" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M24,44 L20,42" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M16,40 L12,38" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M10,42 L6,46" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M4,50 L8,54" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Left braid inner strand detail -->
  <path d="M34,41 Q24,48 16,42" stroke="#9a7040" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M14,40 Q8,36 4,44" stroke="#9a7040" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Left braid highlight -->
  <path d="M30,44 Q22,48 16,44 Q10,40 6,48" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.08"/>
  <!-- Left braid loose wisps -->
  <path d="M28,46 Q24,50 26,54" stroke="#8a6438" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M12,38 Q8,34 10,30" stroke="#8a6438" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- Right braid shadow — flung outward -->
  <path d="M82,42 Q92,50 100,44 Q108,38 112,46 Q116,54 110,58" stroke="#4a2a14" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.15"/>
  <!-- Right braid — flung outward to the right -->
  <path d="M84,40 Q94,48 102,42 Q110,36 114,44 Q118,52 112,56" stroke="url(#hair)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Right braid woven texture -->
  <path d="M84,40 Q94,48 102,42 Q110,36 114,44 Q118,52 112,56" stroke="#c4985e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.25" stroke-dasharray="6 8"/>
  <!-- Right braid cross-hatching detail -->
  <path d="M88,42 L92,46" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M96,44 L100,42" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M104,40 L108,38" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M110,42 L114,46" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M116,50 L112,54" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Right braid inner strand detail -->
  <path d="M86,41 Q96,48 104,42" stroke="#9a7040" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M106,40 Q112,36 116,44" stroke="#9a7040" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Right braid highlight -->
  <path d="M90,44 Q98,48 104,44 Q110,40 114,48" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.08"/>
  <!-- Right braid loose wisps -->
  <path d="M92,46 Q96,50 94,54" stroke="#8a6438" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M108,38 Q112,34 110,30" stroke="#8a6438" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- Braid ties — golden -->
  <circle cx="8" cy="56" r="4" fill="#d4a843"/>
  <circle cx="8" cy="56" r="4" fill="none" stroke="#c49430" stroke-width="0.6"/>
  <circle cx="7" cy="55" r="1.8" fill="#f5e6b8" opacity="0.35"/>
  <circle cx="112" cy="56" r="4" fill="#d4a843"/>
  <circle cx="112" cy="56" r="4" fill="none" stroke="#c49430" stroke-width="0.6"/>
  <circle cx="111" cy="55" r="1.8" fill="#f5e6b8" opacity="0.35"/>

  <!-- === HEAD === -->
  <ellipse cx="60" cy="36" rx="28" ry="30" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="38" cy="44" rx="8" ry="5" fill="#ffb0a0" opacity="0.18"/>
  <ellipse cx="82" cy="44" rx="8" ry="5" fill="#ffb0a0" opacity="0.18"/>
  <ellipse cx="58" cy="20" rx="14" ry="8" fill="white" opacity="0.08"/>

  <!-- === HAIR TOP (crown, details — over head, before face) === -->
  <!-- Crown (shorter at back for braids) -->
  <path d="M32,32 L34,14 L60,6 L86,14 L88,32 L86,42 L34,42 Z" fill="url(#hair)"/>
  <!-- Crown volume puffiness -->
  <path d="M38,10 Q48,2 60,4 Q72,2 82,10" fill="url(#hair)" opacity="0.4"/>
  <path d="M33,34 L35,14 L60,7 L85,14 L87,34" fill="url(#hair)"/>
  <!-- Depth layers where hair meets head (already y<=42) -->
  <path d="M34,34 Q32,38 34,42" stroke="#5a3820" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M86,34 Q88,38 86,42" stroke="#5a3820" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Crown texture strands -->
  <path d="M48,16 Q46,24 46,32" stroke="#b88a50" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M72,16 Q74,24 74,32" stroke="#b88a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M56,12 Q55,22 56,32" stroke="#9a7040" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.18"/>
  <!-- Volume highlight -->
  <path d="M44,10 Q52,6 60,8" stroke="#c4985e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M62,8 Q70,6 76,10" stroke="#c4985e" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- Shine -->
  <path d="M52,10 Q56,14 54,30" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.12"/>
  <path d="M68,12 Q70,18 68,28" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.08"/>

  <!-- === EYES — excited/wide === -->
  <ellipse cx="48" cy="38" rx="9" ry="8.5" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <ellipse cx="72" cy="38" rx="9" ry="8.5" fill="white" stroke="#e8d8c8" stroke-width="0.5"/>
  <circle cx="50" cy="38" r="5.5" fill="url(#iris)"/>
  <circle cx="74" cy="38" r="5.5" fill="url(#iris)"/>
  <circle cx="50" cy="38" r="2.8" fill="#0a0400"/>
  <circle cx="74" cy="38" r="2.8" fill="#0a0400"/>
  <!-- Eye shines -->
  <circle cx="52" cy="36" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="76" cy="36" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="48" cy="40" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="72" cy="40" r="1.4" fill="white" opacity="0.5"/>
  <!-- Eyelids -->
  <path d="M39,33 Q48,28 57,33" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <path d="M63,33 Q72,28 81,33" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <!-- Eyelashes -->
  <path d="M39,33 L36,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M57,33 L59,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M63,33 L61,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M81,33 L83,30" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyebrows — raised (excited) -->
  <path d="M40,26 Q48,21 56,25" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M64,25 Q72,21 80,26" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M60,42 Q61,47 60,48" stroke="#d4b89a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Big excited smile -->
  <path d="M50,54 Q60,62 70,54" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Open mouth hint -->
  <path d="M53,56 Q60,60 67,56" fill="#a05040" opacity="0.3"/>

  <!-- === FLOWER ACCESSORY (top center) === -->
  <g transform="translate(60,4)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="4" fill="#e8705e" opacity="0.9"/>
    <circle cx="-4" cy="0" r="4" fill="#e8705e" opacity="0.85"/>
    <circle cx="4" cy="0" r="4" fill="#e8705e" opacity="0.85"/>
    <circle cx="0" cy="0" r="3" fill="#d4a843"/>
  </g>

  <!-- === RIM LIGHT === -->
  <path d="M86,14 L88,36 L86,70 L96,102 L98,156" stroke="white" stroke-width="1.5" fill="none" opacity="0.1" stroke-linecap="round"/>
</svg>
