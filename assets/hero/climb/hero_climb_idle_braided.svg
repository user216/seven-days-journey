<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#7eb89a"/>
      <stop offset="55%" stop-color="#4a8c6a"/>
      <stop offset="100%" stop-color="#2a5c3a"/>
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="194" rx="30" ry="5" fill="#000" opacity="0.1"/>

  <!-- === LEGS === -->
  <line x1="48" y1="155" x2="46" y2="176" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>
  <line x1="48" y1="155" x2="46" y2="176" stroke="#d8b898" stroke-width="11" stroke-linecap="round" opacity="0.15"/>
  <line x1="72" y1="155" x2="74" y2="176" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>

  <!-- === SHOES === -->
  <ellipse cx="46" cy="183" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="46" cy="181" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>
  <ellipse cx="74" cy="183" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="74" cy="181" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>

  <!-- === DRESS (A-line skirt) === -->
  <path d="M28,160 Q34,108 40,106 L80,106 Q86,108 92,160 Q78,164 60,162 Q42,164 28,160Z" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Hem scallops -->
  <path d="M28,160 Q36,167 44,159 Q52,167 60,160 Q68,167 76,159 Q84,167 92,160" fill="url(#dress)" stroke="#d4d0c8" stroke-width="0.8"/>
  <!-- Fold lines -->
  <line x1="50" y1="112" x2="46" y2="156" stroke="#ddd" stroke-width="1.2" opacity="0.4"/>
  <line x1="70" y1="112" x2="74" y2="156" stroke="#ddd" stroke-width="1.2" opacity="0.4"/>
  <line x1="60" y1="108" x2="60" y2="158" stroke="#ddd" stroke-width="0.8" opacity="0.25"/>
  <!-- Waistband with bow -->
  <rect x="38" y="104" width="44" height="5" rx="2.5" fill="#e8dcd0" opacity="0.5"/>
  <circle cx="60" cy="106" r="3.5" fill="#e0d4c4" opacity="0.6"/>
  <path d="M54,106 Q56,102 60,106 Q64,102 66,106" fill="#e0d4c4" opacity="0.5"/>

  <!-- === TORSO / BLOUSE === -->
  <path d="M40,106 Q38,78 42,74 L78,74 Q82,78 80,106Z" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <!-- Neckline V -->
  <path d="M60,74 L53,90" stroke="#f0d8c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M60,74 L67,90" stroke="#f0d8c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Peter Pan collar -->
  <path d="M48,76 Q54,80 60,74 Q66,80 72,76" stroke="#e8e2d8" stroke-width="1.2" fill="#f8f4ee" opacity="0.6"/>

  <!-- === ARMS === -->
  <!-- Left arm -->
  <line x1="38" y1="82" x2="22" y2="124" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
  <line x1="38" y1="80" x2="22" y2="122" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="22" cy="122" r="6.5" fill="url(#skin)"/>
  <circle cx="20" cy="120" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <!-- Right arm -->
  <line x1="82" y1="80" x2="98" y2="122" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="98" cy="122" r="6.5" fill="url(#skin)"/>
  <circle cx="96" cy="120" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <!-- Puffy sleeves -->
  <ellipse cx="38" cy="80" rx="13" ry="11" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <ellipse cx="38" cy="78" rx="8" ry="5" fill="white" opacity="0.15"/>
  <ellipse cx="82" cy="80" rx="13" ry="11" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <ellipse cx="82" cy="78" rx="8" ry="5" fill="white" opacity="0.15"/>

  <!-- === NECK === -->
  <rect x="53" y="58" width="14" height="18" fill="url(#skin)" rx="5"/>

  <!-- === HEAD (chibi — larger, rounder) === -->
  <ellipse cx="60" cy="40" rx="30" ry="32" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Cheek blush -->
  <ellipse cx="36" cy="50" rx="8" ry="5" fill="#ffb0a0" opacity="0.2"/>
  <ellipse cx="84" cy="50" rx="8" ry="5" fill="#ffb0a0" opacity="0.2"/>
  <!-- Forehead highlight -->
  <ellipse cx="58" cy="22" rx="16" ry="10" fill="white" opacity="0.07"/>

  <!-- === HAIR (BRAIDED — two braids from behind ears) === -->
  <!-- Back volume (short, just to braid origin) -->
  <path d="M30,38 L32,18 L60,8 L88,18 L90,38 L88,56 L78,58 L42,58 L32,56 Z" fill="url(#hair)"/>
  <!-- Crown shape -->
  <path d="M30,44 L34,18 L60,8 L86,18 L90,44" fill="url(#hair)"/>
  <!-- Side volume (minimal — hair pulled into braids) -->
  <path d="M30,44 Q29,50 32,55 Q33,56 35,53" fill="url(#hair)" opacity="0.9"/>
  <path d="M90,44 Q91,50 88,55 Q87,56 85,53" fill="url(#hair)" opacity="0.9"/>

  <!-- Left braid -->
  <!-- Hair tie at top of left braid -->
  <ellipse cx="35" cy="57" rx="4.5" ry="2.5" fill="#d4a843"/>
  <ellipse cx="35" cy="57" rx="4.5" ry="2.5" fill="none" stroke="#c49430" stroke-width="0.6"/>
  <!-- Left braid zigzag -->
  <path d="M35,59 L39,66 L31,73 L39,80 L31,87 L39,94 L35,102" stroke="url(#hair)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left braid texture overlay -->
  <path d="M35,59 L39,66 L31,73 L39,80 L31,87 L39,94 L35,102" stroke="#c49860" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Left braid cross-hatching for woven look -->
  <path d="M33,62 L37,64" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M37,69 L33,71" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M33,76 L37,78" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M37,83 L33,85" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M33,90 L37,92" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Hair tie at bottom of left braid -->
  <ellipse cx="35" cy="103" rx="4" ry="2.5" fill="#d4a843"/>
  <ellipse cx="35" cy="103" rx="4" ry="2.5" fill="none" stroke="#c49430" stroke-width="0.6"/>

  <!-- Right braid -->
  <!-- Hair tie at top of right braid -->
  <ellipse cx="85" cy="57" rx="4.5" ry="2.5" fill="#d4a843"/>
  <ellipse cx="85" cy="57" rx="4.5" ry="2.5" fill="none" stroke="#c49430" stroke-width="0.6"/>
  <!-- Right braid zigzag (mirrored) -->
  <path d="M85,59 L81,66 L89,73 L81,80 L89,87 L81,94 L85,102" stroke="url(#hair)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right braid texture overlay -->
  <path d="M85,59 L81,66 L89,73 L81,80 L89,87 L81,94 L85,102" stroke="#c49860" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- Right braid cross-hatching for woven look -->
  <path d="M87,62 L83,64" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M83,69 L87,71" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M87,76 L83,78" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M83,83 L87,85" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <path d="M87,90 L83,92" stroke="#b88a50" stroke-width="1.2" fill="none" opacity="0.25"/>
  <!-- Hair tie at bottom of right braid -->
  <ellipse cx="85" cy="103" rx="4" ry="2.5" fill="#d4a843"/>
  <ellipse cx="85" cy="103" rx="4" ry="2.5" fill="none" stroke="#c49430" stroke-width="0.6"/>

  <!-- Hair texture strands on crown -->
  <path d="M44,14 Q52,10 60,12" stroke="#c49860" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M48,22 L46,42" stroke="#b88a50" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M72,22 L74,42" stroke="#b88a50" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Hair shine -->
  <path d="M50,14 Q54,18 52,36" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.12"/>
  <path d="M68,16 Q70,22 68,34" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.08"/>

  <!-- === EYES (larger, more expressive) === -->
  <!-- Eye whites -->
  <ellipse cx="46" cy="44" rx="10" ry="9" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <ellipse cx="74" cy="44" rx="10" ry="9" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <!-- Iris -->
  <circle cx="48" cy="44" r="6.5" fill="url(#iris)"/>
  <circle cx="76" cy="44" r="6.5" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="48" cy="44" r="3.2" fill="#0a0800"/>
  <circle cx="76" cy="44" r="3.2" fill="#0a0800"/>
  <!-- Main highlight -->
  <circle cx="51" cy="42" r="2.8" fill="white" opacity="0.92"/>
  <circle cx="79" cy="42" r="2.8" fill="white" opacity="0.92"/>
  <!-- Secondary highlight -->
  <circle cx="46" cy="47" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="74" cy="47" r="1.5" fill="white" opacity="0.5"/>
  <!-- Upper eyelid -->
  <path d="M36,39 Q46,33 56,39" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <path d="M64,39 Q74,33 84,39" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <!-- Eyelashes -->
  <path d="M36,39 L34,35" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M56,39 L58,35" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64,39 L62,35" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M84,39 L86,35" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower lash line -->
  <path d="M40,50 Q46,52 52,50" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M68,50 Q74,52 80,50" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- Eyebrows -->
  <path d="M37,32 Q46,27 55,31" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M65,31 Q74,27 83,32" stroke="#7a5a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M59,50 Q60.5,55 59.5,56" stroke="#d4b89a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="57.5" cy="56" r="1" fill="#d4b89a" opacity="0.35"/>

  <!-- Mouth — warm smile -->
  <path d="M51,60 Q60,67 69,60" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M53,63 Q60,65 67,63" stroke="#d8988a" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- === FLOWER ACCESSORY === -->
  <g transform="translate(32,24)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="5" fill="#e87060" opacity="0.9"/>
    <circle cx="-5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="-3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="0" cy="0" r="3.5" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.8" fill="#f5e6b8" opacity="0.7"/>
    <circle cx="0" cy="-5" r="1.5" fill="white" opacity="0.2"/>
  </g>

  <!-- === RIM LIGHT === -->
  <path d="M88,18 L90,40 L86,74 L90,106 L92,160" stroke="white" stroke-width="1.5" fill="none" opacity="0.08" stroke-linecap="round"/>
</svg>
