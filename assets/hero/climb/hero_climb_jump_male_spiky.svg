<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a20"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#6a5232"/>
      <stop offset="55%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow (smaller during jump) -->
  <ellipse cx="60" cy="194" rx="22" ry="4" fill="#000" opacity="0.07"/>

  <!-- === LEGS — spread wider === -->
  <line x1="46" y1="143" x2="38" y2="170" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>
  <line x1="46" y1="143" x2="38" y2="170" stroke="#d8b898" stroke-width="11" stroke-linecap="round" opacity="0.15"/>
  <line x1="74" y1="143" x2="82" y2="170" stroke="url(#skin)" stroke-width="11" stroke-linecap="round"/>

  <!-- === SHOES (at x=38/82) === -->
  <ellipse cx="38" cy="177" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="38" cy="175" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>
  <ellipse cx="82" cy="177" rx="14" ry="8" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="82" cy="175" rx="10" ry="4" fill="#c8b088" opacity="0.25"/>

  <!-- === PANTS — two separate legs === -->
  <!-- Left pant leg -->
  <polygon points="30,148 38,94 58,94 50,148" fill="url(#pants)" filter="url(#shadow)"/>
  <!-- Right pant leg -->
  <polygon points="70,148 62,94 82,94 90,148" fill="url(#pants)" filter="url(#shadow)"/>
  <!-- Inseam lines -->
  <line x1="58" y1="94" x2="50" y2="148" stroke="#d4d0c8" stroke-width="1.2" opacity="0.4"/>
  <line x1="62" y1="94" x2="70" y2="148" stroke="#d4d0c8" stroke-width="1.2" opacity="0.4"/>
  <!-- Side creases -->
  <line x1="46" y1="100" x2="38" y2="144" stroke="#ddd" stroke-width="1.2" opacity="0.3"/>
  <line x1="74" y1="100" x2="82" y2="144" stroke="#ddd" stroke-width="1.2" opacity="0.3"/>
  <!-- Hem lines -->
  <line x1="30" y1="146" x2="50" y2="146" stroke="#d0ccc4" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="146" x2="90" y2="146" stroke="#d0ccc4" stroke-width="1.5" opacity="0.5"/>

  <!-- === TORSO / SHIRT === -->
  <path d="M38,94 Q36,66 40,62 L80,62 Q84,66 82,94Z" fill="url(#shirt)" filter="url(#inner_shadow)"/>
  <!-- Polo collar V-opening -->
  <path d="M60,62 L54,76" stroke="#f0d8c0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M60,62 L66,76" stroke="#f0d8c0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Polo collar (pointed, structured) -->
  <path d="M48,64 L54,68 L60,62 L66,68 L72,64" stroke="#e8e2d8" stroke-width="1.5" fill="#f8f4ee" opacity="0.7"/>
  <!-- 3 buttons -->
  <circle cx="60" cy="76" r="2" fill="#d4cec4"/>
  <circle cx="60" cy="82" r="2" fill="#d4cec4"/>
  <circle cx="60" cy="88" r="2" fill="#d4cec4"/>

  <!-- === ARMS — raised up === -->
  <!-- Left arm -->
  <line x1="36" y1="70" x2="12" y2="40" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.15"/>
  <line x1="36" y1="68" x2="12" y2="38" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="12" cy="38" r="6.5" fill="url(#skin)"/>
  <circle cx="10" cy="36" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <!-- Right arm -->
  <line x1="84" y1="68" x2="108" y2="38" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="108" cy="38" r="6.5" fill="url(#skin)"/>
  <circle cx="106" cy="36" r="2.5" fill="#fce4cc" opacity="0.35"/>
  <!-- Sleeve caps -->
  <ellipse cx="36" cy="68" rx="12" ry="10" fill="url(#shirt)" filter="url(#inner_shadow)"/>
  <ellipse cx="36" cy="66" rx="7" ry="4" fill="white" opacity="0.12"/>
  <ellipse cx="84" cy="68" rx="12" ry="10" fill="url(#shirt)" filter="url(#inner_shadow)"/>
  <ellipse cx="84" cy="66" rx="7" ry="4" fill="white" opacity="0.12"/>

  <!-- === NECK === -->
  <rect x="53" y="46" width="14" height="18" fill="url(#skin)" rx="5"/>

  <!-- === HAIR BACK (behind head) === -->
  <!-- Dark base shadow behind all hair -->
  <path d="M29,34 Q28,12 32,4 Q42,-4 60,-5 Q78,-4 88,4 Q92,12 91,34" fill="#2a1808" opacity="0.3"/>
  <!-- Spike shadow silhouettes (behind main spikes, wind-leaned) -->
  <polygon points="34,18 40,-18 50,12" fill="#2a1808" opacity="0.2"/>
  <polygon points="42,12 50,-22 58,8" fill="#2a1808" opacity="0.18"/>
  <polygon points="52,8 62,-24 70,6" fill="#2a1808" opacity="0.2"/>
  <polygon points="62,10 73,-20 80,12" fill="#2a1808" opacity="0.18"/>
  <polygon points="71,16 82,-14 92,18" fill="#2a1808" opacity="0.2"/>
  <!-- Base crown hugging head -->
  <path d="M31,32 Q30,14 34,6 Q44,0 60,-2 Q76,0 86,6 Q90,14 89,32" fill="url(#hair)"/>

  <!-- === HEAD (chibi — shifted up 12, center at cy=28) === -->
  <ellipse cx="60" cy="28" rx="30" ry="32" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Cheek blush (subtle for male) -->
  <ellipse cx="36" cy="38" rx="7" ry="4" fill="#ffb0a0" opacity="0.12"/>
  <ellipse cx="84" cy="38" rx="7" ry="4" fill="#ffb0a0" opacity="0.12"/>
  <!-- Forehead highlight -->
  <ellipse cx="58" cy="10" rx="16" ry="10" fill="white" opacity="0.07"/>

  <!-- === HAIR TOP (spikes, sides, strands above head) === -->
  <!-- Side volume (short, clipped to y<=42) -->
  <path d="M31,32 Q29,38 32,42 Q34,40 35,36" fill="url(#hair)" opacity="0.9"/>
  <path d="M89,32 Q91,38 88,42 Q86,40 85,36" fill="url(#hair)" opacity="0.9"/>
  <!-- Side depth shadow -->
  <path d="M31,32 Q28,36 31,41" fill="#2a1808" opacity="0.2"/>
  <path d="M89,32 Q92,36 89,41" fill="#2a1808" opacity="0.2"/>
  <!-- 7 spikes — leaning back/outward from wind, taller and more dynamic -->
  <polygon points="32,18 40,-16 50,14" fill="url(#hair)"/>
  <polygon points="40,12 50,-20 58,10" fill="url(#hair)"/>
  <polygon points="50,8 60,-22 68,8" fill="url(#hair)"/>
  <polygon points="58,8 66,-20 74,10" fill="url(#hair)"/>
  <polygon points="66,10 75,-16 82,14" fill="url(#hair)"/>
  <polygon points="74,16 82,-10 90,18" fill="url(#hair)"/>
  <polygon points="82,20 88,-2 94,22" fill="url(#hair)"/>
  <!-- Inner spike texture (darker wedges for depth) -->
  <polygon points="42,12 46,-12 52,10" fill="#2a1808" opacity="0.15"/>
  <polygon points="52,8 58,-14 62,8" fill="#2a1808" opacity="0.12"/>
  <polygon points="64,10 70,-12 76,12" fill="#2a1808" opacity="0.15"/>
  <polygon points="78,16 82,-4 86,18" fill="#2a1808" opacity="0.12"/>
  <!-- Gel/styled edge highlights on spike tips -->
  <line x1="40" y1="-12" x2="43" y2="2" stroke="white" stroke-width="1.4" opacity="0.12" stroke-linecap="round"/>
  <line x1="50" y1="-16" x2="53" y2="-2" stroke="white" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
  <line x1="60" y1="-18" x2="62" y2="-4" stroke="white" stroke-width="1.4" opacity="0.13" stroke-linecap="round"/>
  <line x1="66" y1="-16" x2="68" y2="-2" stroke="white" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
  <line x1="75" y1="-12" x2="77" y2="0" stroke="white" stroke-width="1.4" opacity="0.12" stroke-linecap="round"/>
  <line x1="82" y1="-6" x2="83" y2="4" stroke="white" stroke-width="1" opacity="0.08" stroke-linecap="round"/>
  <line x1="88" y1="0" x2="89" y2="10" stroke="white" stroke-width="0.8" opacity="0.07" stroke-linecap="round"/>
  <!-- Hair texture strands between spikes -->
  <path d="M44,10 L43,26" stroke="#6a4428" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M56,6 L55,22" stroke="#6a4428" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M68,8 L69,24" stroke="#5a3420" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M78,14 L80,28" stroke="#6a4428" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.15"/>
  <path d="M48,2 L47,22" stroke="#6a4428" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M36,16 L35,30" stroke="#5a3420" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.15"/>
  <!-- Gel shine contour highlights -->
  <path d="M44,2 Q52,-4 58,2" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.09"/>
  <path d="M64,2 Q70,-4 76,4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.07"/>
  <path d="M36,14 Q38,22 36,30" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.06"/>

  <!-- === EYES (slightly taller — excited) === -->
  <!-- Eye whites -->
  <ellipse cx="46" cy="32" rx="10" ry="9.5" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <ellipse cx="74" cy="32" rx="10" ry="9.5" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <!-- Iris -->
  <circle cx="48" cy="32" r="6.5" fill="url(#iris)"/>
  <circle cx="76" cy="32" r="6.5" fill="url(#iris)"/>
  <!-- Pupil -->
  <circle cx="48" cy="32" r="3.2" fill="#0a0800"/>
  <circle cx="76" cy="32" r="3.2" fill="#0a0800"/>
  <!-- Main highlight -->
  <circle cx="51" cy="30" r="2.8" fill="white" opacity="0.92"/>
  <circle cx="79" cy="30" r="2.8" fill="white" opacity="0.92"/>
  <!-- Secondary highlight -->
  <circle cx="46" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="74" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <!-- Upper eyelid (NO eyelashes) -->
  <path d="M36,27 Q46,21 56,27" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <path d="M64,27 Q74,21 84,27" stroke="#7a5a3a" stroke-width="2.2" fill="none"/>
  <!-- Lower lash line -->
  <path d="M40,38 Q46,40 52,38" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M68,38 Q74,40 80,38" stroke="#c4a888" stroke-width="0.8" fill="none" opacity="0.3"/>
  <!-- Eyebrows — raised (excited), thicker -->
  <path d="M37,19 Q46,14 55,18" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M65,18 Q74,14 83,19" stroke="#4a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M59,38 Q60.5,43 59.5,44" stroke="#d4b89a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="57.5" cy="44" r="1" fill="#d4b89a" opacity="0.35"/>

  <!-- Mouth — wider/open excited smile -->
  <path d="M49,48 Q60,56 71,48" stroke="#c07858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Open mouth -->
  <path d="M52,50 Q60,54 68,50" fill="#a05040" opacity="0.3"/>

  <!-- === RIM LIGHT === -->
  <path d="M88,6 L90,28 L86,62 L90,94 L92,148" stroke="white" stroke-width="1.5" fill="none" opacity="0.08" stroke-linecap="round"/>
</svg>
