<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#7eb89a"/>
      <stop offset="55%" stop-color="#4a8c6a"/>
      <stop offset="100%" stop-color="#2a5c3a"/>
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="56" cy="194" rx="28" ry="5" fill="#000" opacity="0.1"/>

  <!-- === BACK ARM (at side — neutral passing position) === -->
  <line x1="44" y1="80" x2="38" y2="118" stroke="#d8b898" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
  <circle cx="38" cy="118" r="5" fill="#d8b898" opacity="0.6"/>
  <ellipse cx="44" cy="80" rx="10" ry="9" fill="url(#blouse)" filter="url(#inner_shadow)" opacity="0.6"/>

  <!-- === LEGS (passing — feet close together, body slightly up) === -->
  <!-- Back leg -->
  <line x1="52" y1="153" x2="52" y2="174" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- Front leg -->
  <line x1="56" y1="153" x2="56" y2="174" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="56" y1="153" x2="56" y2="174" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.12"/>

  <!-- === SHOES (close together) === -->
  <ellipse cx="52" cy="181" rx="14" ry="7" fill="url(#shoe)" filter="url(#shadow)" opacity="0.7"/>
  <ellipse cx="58" cy="181" rx="15" ry="7" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="62" cy="179" rx="9" ry="3.5" fill="#c8b088" opacity="0.25"/>

  <!-- === DRESS (centered, slight bounce up) === -->
  <path d="M30,158 Q38,108 46,104 L68,104 Q74,108 80,158 Q68,163 55,161 Q42,163 30,158Z" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Hem scallops -->
  <path d="M30,158 Q38,165 46,157 Q54,165 62,157 Q70,165 80,158" fill="url(#dress)" stroke="#d4d0c8" stroke-width="0.8"/>
  <!-- Fold lines -->
  <line x1="50" y1="110" x2="46" y2="154" stroke="#ddd" stroke-width="1.2" opacity="0.4"/>
  <line x1="62" y1="110" x2="66" y2="154" stroke="#ddd" stroke-width="1" opacity="0.3"/>
  <line x1="56" y1="106" x2="56" y2="156" stroke="#ddd" stroke-width="0.8" opacity="0.2"/>
  <!-- Waistband -->
  <rect x="42" y="102" width="30" height="5" rx="2.5" fill="#e8dcd0" opacity="0.5"/>
  <circle cx="57" cy="104" r="3" fill="#e0d4c4" opacity="0.6"/>
  <path d="M52,104 Q54,100 57,104 Q60,100 62,104" fill="#e0d4c4" opacity="0.5"/>

  <!-- === TORSO / BLOUSE (slightly higher — bounce) === -->
  <path d="M46,104 Q43,78 46,74 L68,74 Q72,78 70,104Z" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <path d="M60,74 L55,88" stroke="#f0d8c0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M50,76 Q56,80 62,74" stroke="#e8e2d8" stroke-width="1" fill="#f8f4ee" opacity="0.6"/>

  <!-- === FRONT ARM (at side — neutral) === -->
  <line x1="66" y1="80" x2="74" y2="118" stroke="url(#skin)" stroke-width="9" stroke-linecap="round"/>
  <circle cx="74" cy="118" r="5.5" fill="url(#skin)"/>
  <circle cx="72" cy="116" r="2" fill="#fce4cc" opacity="0.35"/>
  <ellipse cx="66" cy="80" rx="12" ry="10" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <ellipse cx="66" cy="78" rx="7" ry="4.5" fill="white" opacity="0.15"/>

  <!-- === NECK === -->
  <rect x="50" y="58" width="13" height="18" fill="url(#skin)" rx="5"/>

  <!-- === HAIR — back volume === -->
  <path d="M28,36 Q26,55 24,98 L36,104 L48,98 Q44,55 40,40 Z" fill="url(#hair)"/>
  <path d="M30,50 Q28,72 26,96" stroke="#b88a50" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M38,48 Q36,68 34,92" stroke="#b88a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M34,50 Q32,64 30,88" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.08"/>

  <!-- === HEAD (chibi profile) === -->
  <ellipse cx="56" cy="36" rx="28" ry="30" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="74" cy="48" rx="7" ry="5" fill="#ffb0a0" opacity="0.2"/>
  <ellipse cx="54" cy="18" rx="14" ry="8" fill="white" opacity="0.07"/>

  <!-- === HAIR — crown and bangs === -->
  <path d="M28,38 Q30,12 56,6 Q76,10 80,28 L78,40 Q72,32 56,30 Q42,32 34,40 Z" fill="url(#hair)"/>
  <path d="M66,30 Q74,22 80,32 Q78,38 72,38 Z" fill="url(#hair)" opacity="0.9"/>
  <path d="M56,28 Q64,20 70,30 Q66,36 58,34 Z" fill="url(#hair)" opacity="0.85"/>
  <path d="M46,12 Q54,8 62,12" stroke="#c49860" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M48,14 Q50,22 48,34" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.1"/>
  <path d="M62,12 Q64,18 62,26" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.07"/>

  <!-- === EYE === -->
  <ellipse cx="72" cy="40" rx="8" ry="8" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <circle cx="74" cy="40" r="5.5" fill="url(#iris)"/>
  <circle cx="75" cy="40" r="2.8" fill="#0a0800"/>
  <circle cx="77" cy="38" r="2.4" fill="white" opacity="0.92"/>
  <circle cx="72" cy="43" r="1.3" fill="white" opacity="0.45"/>
  <path d="M64,35 Q72,29 80,35" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <path d="M80,35 L82,31" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64,35 L62,32" stroke="#7a5a3a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M66,46 Q72,48 78,46" stroke="#c4a888" stroke-width="0.7" fill="none" opacity="0.3"/>
  <path d="M63,28 Q72,23 80,28" stroke="#7a5a3a" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- === PROFILE NOSE === -->
  <path d="M82,42 Q86,48 84,52" stroke="#d4b89a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="84" cy="52" r="1.2" fill="#d4b89a" opacity="0.4"/>

  <!-- === MOUTH === -->
  <path d="M74,56 Q80,62 78,56" stroke="#c07858" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M75,58 Q78,60 77,58" stroke="#d8988a" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- === FLOWER ACCESSORY === -->
  <g transform="translate(34,18)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="4.5" fill="#e87060" opacity="0.9"/>
    <circle cx="-4.5" cy="-1" r="4.5" fill="#e87060" opacity="0.85"/>
    <circle cx="4.5" cy="-1" r="4.5" fill="#e87060" opacity="0.85"/>
    <circle cx="-3" cy="3.5" r="4.5" fill="#e87060" opacity="0.8"/>
    <circle cx="3" cy="3.5" r="4.5" fill="#e87060" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.5" fill="#f5e6b8" opacity="0.7"/>
    <circle cx="0" cy="-4.5" r="1.2" fill="white" opacity="0.2"/>
  </g>

  <!-- === RIM LIGHT === -->
  <path d="M82,12 Q84,28 86,48 Q84,64 72,74 L70,104 L80,158" stroke="white" stroke-width="1.5" fill="none" opacity="0.08" stroke-linecap="round"/>
</svg>
