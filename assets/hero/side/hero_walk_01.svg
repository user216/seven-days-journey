<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <radialGradient id="iris" cx="45%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#7eb89a"/>
      <stop offset="55%" stop-color="#4a8c6a"/>
      <stop offset="100%" stop-color="#2a5c3a"/>
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="58" cy="194" rx="30" ry="5" fill="#000" opacity="0.1"/>

  <!-- === BACK ARM (swings forward — extends right/ahead) === -->
  <line x1="44" y1="82" x2="58" y2="116" stroke="#d8b898" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
  <circle cx="58" cy="116" r="5" fill="#d8b898" opacity="0.6"/>
  <ellipse cx="44" cy="82" rx="10" ry="9" fill="url(#blouse)" filter="url(#inner_shadow)" opacity="0.6"/>

  <!-- === LEGS (stride — right foot forward, left back) === -->
  <!-- Back leg (left leg, further back/left) -->
  <line x1="50" y1="155" x2="40" y2="174" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- Front leg (right leg, forward/right) -->
  <line x1="56" y1="155" x2="66" y2="174" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
  <line x1="56" y1="155" x2="66" y2="174" stroke="#d8b898" stroke-width="10" stroke-linecap="round" opacity="0.12"/>

  <!-- === SHOES === -->
  <!-- Back shoe -->
  <ellipse cx="40" cy="181" rx="13" ry="7" fill="url(#shoe)" filter="url(#shadow)" opacity="0.7"/>
  <ellipse cx="42" cy="179" rx="8" ry="3" fill="#c8b088" opacity="0.2"/>
  <!-- Front shoe -->
  <ellipse cx="70" cy="181" rx="15" ry="7" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="74" cy="179" rx="9" ry="3.5" fill="#c8b088" opacity="0.25"/>

  <!-- === DRESS (A-line, slight forward sway) === -->
  <path d="M28,161 Q38,110 46,106 L68,106 Q74,110 82,161 Q68,166 55,164 Q40,166 28,161Z" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Hem scallops -->
  <path d="M28,161 Q37,168 46,160 Q55,168 64,160 Q73,168 82,161" fill="url(#dress)" stroke="#d4d0c8" stroke-width="0.8"/>
  <!-- Fold lines (skirt swaying with stride) -->
  <line x1="48" y1="112" x2="42" y2="157" stroke="#ddd" stroke-width="1.2" opacity="0.4"/>
  <line x1="62" y1="112" x2="68" y2="157" stroke="#ddd" stroke-width="1" opacity="0.3"/>
  <line x1="56" y1="108" x2="58" y2="158" stroke="#ddd" stroke-width="0.8" opacity="0.2"/>
  <!-- Waistband -->
  <rect x="42" y="104" width="30" height="5" rx="2.5" fill="#e8dcd0" opacity="0.5"/>
  <circle cx="57" cy="106" r="3" fill="#e0d4c4" opacity="0.6"/>

  <!-- === TORSO / BLOUSE === -->
  <path d="M46,106 Q43,80 46,76 L68,76 Q72,80 70,106Z" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <path d="M60,76 L55,90" stroke="#f0d8c0" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M50,78 Q56,82 62,76" stroke="#e8e2d8" stroke-width="1" fill="#f8f4ee" opacity="0.6"/>

  <!-- === FRONT ARM (swings back — extends left/behind) === -->
  <line x1="66" y1="82" x2="56" y2="120" stroke="url(#skin)" stroke-width="9" stroke-linecap="round"/>
  <circle cx="56" cy="120" r="5.5" fill="url(#skin)"/>
  <circle cx="54" cy="118" r="2" fill="#fce4cc" opacity="0.35"/>
  <ellipse cx="66" cy="82" rx="12" ry="10" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <ellipse cx="66" cy="80" rx="7" ry="4.5" fill="white" opacity="0.15"/>

  <!-- === NECK === -->
  <rect x="50" y="60" width="13" height="18" fill="url(#skin)" rx="5"/>

  <!-- === HAIR — back volume (flowing left, with wind from walking) === -->
  <path d="M26,36 Q22,55 20,100 L34,106 L48,98 Q44,55 40,40 Z" fill="url(#hair)"/>
  <path d="M28,50 Q24,74 22,98" stroke="#b88a50" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
  <path d="M36,48 Q32,70 30,94" stroke="#b88a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M32,50 Q28,66 26,90" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.08"/>

  <!-- === HEAD (chibi profile facing right) === -->
  <ellipse cx="56" cy="38" rx="28" ry="30" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="74" cy="50" rx="7" ry="5" fill="#ffb0a0" opacity="0.2"/>
  <ellipse cx="54" cy="20" rx="14" ry="8" fill="white" opacity="0.07"/>

  <!-- === HAIR — crown and bangs === -->
  <path d="M28,40 Q30,14 56,8 Q76,12 80,30 L78,42 Q72,34 56,32 Q42,34 34,42 Z" fill="url(#hair)"/>
  <path d="M66,32 Q74,24 80,34 Q78,40 72,40 Z" fill="url(#hair)" opacity="0.9"/>
  <path d="M56,30 Q64,22 70,32 Q66,38 58,36 Z" fill="url(#hair)" opacity="0.85"/>
  <path d="M46,14 Q54,10 62,14" stroke="#c49860" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M48,16 Q50,24 48,36" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.1"/>
  <path d="M62,14 Q64,20 62,28" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.07"/>

  <!-- === EYE (single visible, right-side profile) === -->
  <ellipse cx="72" cy="42" rx="8" ry="8" fill="white" stroke="#e0d4c8" stroke-width="0.5"/>
  <circle cx="74" cy="42" r="5.5" fill="url(#iris)"/>
  <circle cx="75" cy="42" r="2.8" fill="#0a0800"/>
  <circle cx="77" cy="40" r="2.4" fill="white" opacity="0.92"/>
  <circle cx="72" cy="45" r="1.3" fill="white" opacity="0.45"/>
  <path d="M64,37 Q72,31 80,37" stroke="#7a5a3a" stroke-width="2" fill="none"/>
  <path d="M80,37 L82,33" stroke="#7a5a3a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64,37 L62,34" stroke="#7a5a3a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M66,48 Q72,50 78,48" stroke="#c4a888" stroke-width="0.7" fill="none" opacity="0.3"/>
  <path d="M63,30 Q72,25 80,30" stroke="#7a5a3a" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- === PROFILE NOSE === -->
  <path d="M82,44 Q86,50 84,54" stroke="#d4b89a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="84" cy="54" r="1.2" fill="#d4b89a" opacity="0.4"/>

  <!-- === MOUTH (wider smile — walking) === -->
  <path d="M74,58 Q81,64 79,58" stroke="#c07858" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M75,60 Q79,63 78,60" stroke="#d8988a" stroke-width="0.8" fill="none" opacity="0.35"/>

  <!-- === FLOWER ACCESSORY === -->
  <g transform="translate(34,20)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="4.5" fill="#e87060" opacity="0.9"/>
    <circle cx="-4.5" cy="-1" r="4.5" fill="#e87060" opacity="0.85"/>
    <circle cx="4.5" cy="-1" r="4.5" fill="#e87060" opacity="0.85"/>
    <circle cx="-3" cy="3.5" r="4.5" fill="#e87060" opacity="0.8"/>
    <circle cx="3" cy="3.5" r="4.5" fill="#e87060" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.5" fill="#f5e6b8" opacity="0.7"/>
    <circle cx="0" cy="-4.5" r="1.2" fill="white" opacity="0.2"/>
  </g>

  <!-- === RIM LIGHT === -->
  <path d="M82,14 Q84,30 86,50 Q84,66 72,76 L70,106 L82,161" stroke="white" stroke-width="1.5" fill="none" opacity="0.08" stroke-linecap="round"/>
</svg>
