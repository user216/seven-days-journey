<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="192" rx="34" ry="6" fill="#000" opacity="0.08"/>

  <!-- === FEET (two small ovals at bottom, together) === -->
  <ellipse cx="50" cy="182" rx="9" ry="6" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="50" cy="180" rx="6" ry="3" fill="#c8b088" opacity="0.2"/>
  <ellipse cx="70" cy="182" rx="9" ry="6" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="70" cy="180" rx="6" ry="3" fill="#c8b088" opacity="0.2"/>

  <!-- === LEGS (short, seen from above) === -->
  <line x1="50" y1="165" x2="50" y2="176" stroke="url(#skin)" stroke-width="9" stroke-linecap="round"/>
  <line x1="70" y1="165" x2="70" y2="176" stroke="url(#skin)" stroke-width="9" stroke-linecap="round"/>

  <!-- === DRESS / SKIRT (circle from above) === -->
  <ellipse cx="60" cy="148" rx="34" ry="30" fill="url(#dress)" filter="url(#shadow)"/>
  <!-- Dress folds (radial from center) -->
  <line x1="60" y1="120" x2="52" y2="176" stroke="#ddd" stroke-width="1" opacity="0.35"/>
  <line x1="60" y1="120" x2="68" y2="176" stroke="#ddd" stroke-width="1" opacity="0.35"/>
  <line x1="60" y1="120" x2="36" y2="162" stroke="#ddd" stroke-width="0.8" opacity="0.25"/>
  <line x1="60" y1="120" x2="84" y2="162" stroke="#ddd" stroke-width="0.8" opacity="0.25"/>
  <!-- Hem detail -->
  <path d="M28,155 Q36,162 44,154 Q52,162 60,155 Q68,162 76,155 Q84,162 92,155" stroke="#d4d0c8" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Waist -->
  <ellipse cx="60" cy="122" rx="18" ry="8" fill="#e8dcd0" opacity="0.4"/>
  <circle cx="60" cy="122" r="2.5" fill="#e0d4c4" opacity="0.5"/>

  <!-- === TORSO / SHOULDERS (small oval from above) === -->
  <ellipse cx="60" cy="112" rx="22" ry="12" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <!-- Collar from above -->
  <ellipse cx="60" cy="106" rx="12" ry="6" fill="#f8f4ee" opacity="0.5" stroke="#e8e2d8" stroke-width="0.8"/>

  <!-- === ARMS (extending from shoulders to sides) === -->
  <!-- Left arm -->
  <line x1="38" y1="112" x2="24" y2="140" stroke="url(#skin)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="24" cy="140" r="5" fill="url(#skin)"/>
  <circle cx="23" cy="138" r="1.8" fill="#fce4cc" opacity="0.3"/>
  <!-- Left sleeve (from above) -->
  <ellipse cx="38" cy="112" rx="10" ry="8" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <!-- Right arm -->
  <line x1="82" y1="112" x2="96" y2="140" stroke="url(#skin)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="96" cy="140" r="5" fill="url(#skin)"/>
  <circle cx="95" cy="138" r="1.8" fill="#fce4cc" opacity="0.3"/>
  <!-- Right sleeve -->
  <ellipse cx="82" cy="112" rx="10" ry="8" fill="url(#blouse)" filter="url(#inner_shadow)"/>

  <!-- === HEAD (large circle, top-down view) === -->
  <circle cx="60" cy="60" r="38" fill="url(#skin)" filter="url(#shadow)"/>
  <!-- Forehead highlight (top of head) -->
  <ellipse cx="58" cy="42" rx="16" ry="12" fill="white" opacity="0.07"/>

  <!-- === HAIR (seen from above — covers most of head) === -->
  <!-- Main hair mass -->
  <path d="M22,58 Q22,22 60,18 Q98,22 98,58 Q96,72 88,78 Q76,84 60,82 Q44,84 32,78 Q24,72 22,58Z" fill="url(#hair)"/>
  <!-- Part line (center, slightly left) -->
  <path d="M56,20 Q58,40 56,76" stroke="#8a6438" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Hair texture strands -->
  <path d="M40,24 Q48,22 56,26" stroke="#c49860" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M64,24 Q72,22 78,28" stroke="#c49860" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Hair shine -->
  <path d="M44,26 Q46,38 44,54" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.1"/>
  <path d="M70,28 Q72,40 70,52" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.08"/>
  <!-- Hair edge detail (back of head visible below) -->
  <path d="M32,78 Q46,86 60,84 Q74,86 88,78" stroke="#6b4226" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Hair trailing behind / below head -->
  <path d="M36,78 Q38,90 40,98 L60,100 L80,98 Q82,90 84,78" fill="url(#hair)" opacity="0.7"/>
  <path d="M42,82 Q44,92 46,98" stroke="#b88a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M76,82 Q78,92 80,98" stroke="#b88a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>

  <!-- === FACE (tiny peek at bottom of head circle — forehead/eyes just visible) === -->
  <!-- The top of the eyes barely visible at the front of the head -->
  <path d="M50,80 Q54,78 58,80" stroke="#7a5a3a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M62,80 Q66,78 70,80" stroke="#7a5a3a" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- === FLOWER ACCESSORY (visible from above, left side) === -->
  <g transform="translate(34,40)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="5" fill="#e87060" opacity="0.9"/>
    <circle cx="-5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="-3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="0" cy="0" r="3.5" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.8" fill="#f5e6b8" opacity="0.7"/>
    <circle cx="0" cy="-5" r="1.5" fill="white" opacity="0.2"/>
  </g>

  <!-- === RIM LIGHT (subtle edge) === -->
  <path d="M96,30 Q100,50 98,60 Q96,75 88,78" stroke="white" stroke-width="1.5" fill="none" opacity="0.06" stroke-linecap="round"/>
</svg>
