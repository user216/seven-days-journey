<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200">
  <defs>
    <radialGradient id="skin" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fce4cc"/>
      <stop offset="100%" stop-color="#e8c4a0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0784e"/>
      <stop offset="100%" stop-color="#6b4226"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcfcfa"/>
      <stop offset="100%" stop-color="#e8e6e0"/>
    </linearGradient>
    <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#f0ede4"/>
    </linearGradient>
    <radialGradient id="shoe" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b09878"/>
      <stop offset="100%" stop-color="#7a6248"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="inner_shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="192" rx="34" ry="6" fill="#000" opacity="0.08"/>

  <!-- === FEET (walking — one forward, one back) === -->
  <!-- Left foot (forward / down) -->
  <ellipse cx="48" cy="186" rx="9" ry="6" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="48" cy="184" rx="6" ry="3" fill="#c8b088" opacity="0.2"/>
  <!-- Right foot (back / up) -->
  <ellipse cx="72" cy="174" rx="9" ry="6" fill="url(#shoe)" filter="url(#shadow)"/>
  <ellipse cx="72" cy="172" rx="6" ry="3" fill="#c8b088" opacity="0.2"/>

  <!-- === LEGS (walking stride from above) === -->
  <!-- Left leg (forward) -->
  <line x1="50" y1="167" x2="48" y2="180" stroke="url(#skin)" stroke-width="9" stroke-linecap="round"/>
  <!-- Right leg (back) -->
  <line x1="70" y1="163" x2="72" y2="168" stroke="url(#skin)" stroke-width="9" stroke-linecap="round"/>

  <!-- === DRESS / SKIRT (slightly rotated for movement) === -->
  <ellipse cx="61" cy="148" rx="34" ry="30" fill="url(#dress)" filter="url(#shadow)" transform="rotate(-3, 61, 148)"/>
  <!-- Dress folds with slight asymmetry -->
  <line x1="61" y1="120" x2="50" y2="176" stroke="#ddd" stroke-width="1" opacity="0.35"/>
  <line x1="61" y1="120" x2="72" y2="174" stroke="#ddd" stroke-width="1" opacity="0.35"/>
  <line x1="61" y1="120" x2="34" y2="160" stroke="#ddd" stroke-width="0.8" opacity="0.25"/>
  <line x1="61" y1="120" x2="88" y2="158" stroke="#ddd" stroke-width="0.8" opacity="0.25"/>
  <!-- Hem with sway -->
  <path d="M28,156 Q36,163 44,155 Q52,163 61,156 Q69,163 77,155 Q85,163 93,155" stroke="#d4d0c8" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Waist -->
  <ellipse cx="61" cy="122" rx="18" ry="8" fill="#e8dcd0" opacity="0.4" transform="rotate(-3, 61, 122)"/>
  <circle cx="61" cy="122" r="2.5" fill="#e0d4c4" opacity="0.5"/>

  <!-- === TORSO / SHOULDERS (slight rotation for walking) === -->
  <ellipse cx="61" cy="112" rx="22" ry="12" fill="url(#blouse)" filter="url(#inner_shadow)" transform="rotate(-3, 61, 112)"/>
  <!-- Collar -->
  <ellipse cx="61" cy="106" rx="12" ry="6" fill="#f8f4ee" opacity="0.5" stroke="#e8e2d8" stroke-width="0.8"/>

  <!-- === ARMS (swinging with walk — slight asymmetry) === -->
  <!-- Left arm (swinging forward / down) -->
  <line x1="39" y1="114" x2="22" y2="148" stroke="url(#skin)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="22" cy="148" r="5" fill="url(#skin)"/>
  <circle cx="21" cy="146" r="1.8" fill="#fce4cc" opacity="0.3"/>
  <ellipse cx="39" cy="114" rx="10" ry="8" fill="url(#blouse)" filter="url(#inner_shadow)"/>
  <!-- Right arm (swinging back / up) -->
  <line x1="83" y1="110" x2="96" y2="132" stroke="url(#skin)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="96" cy="132" r="5" fill="url(#skin)"/>
  <circle cx="95" cy="130" r="1.8" fill="#fce4cc" opacity="0.3"/>
  <ellipse cx="83" cy="110" rx="10" ry="8" fill="url(#blouse)" filter="url(#inner_shadow)"/>

  <!-- === HEAD (large circle, slightly rotated) === -->
  <circle cx="61" cy="60" r="38" fill="url(#skin)" filter="url(#shadow)"/>
  <ellipse cx="59" cy="42" rx="16" ry="12" fill="white" opacity="0.07"/>

  <!-- === HAIR (seen from above, slight rotation) === -->
  <!-- Main hair mass -->
  <path d="M23,58 Q23,22 61,18 Q99,22 99,58 Q97,72 89,78 Q77,84 61,82 Q45,84 33,78 Q25,72 23,58Z" fill="url(#hair)"/>
  <!-- Part line -->
  <path d="M57,20 Q59,40 57,76" stroke="#8a6438" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Hair texture strands -->
  <path d="M41,24 Q49,22 57,26" stroke="#c49860" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M65,24 Q73,22 79,28" stroke="#c49860" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Hair shine -->
  <path d="M45,26 Q47,38 45,54" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.1"/>
  <path d="M71,28 Q73,40 71,52" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.08"/>
  <!-- Hair edge -->
  <path d="M33,78 Q47,86 61,84 Q75,86 89,78" stroke="#6b4226" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Hair trailing behind -->
  <path d="M37,78 Q39,90 41,98 L61,100 L81,98 Q83,90 85,78" fill="url(#hair)" opacity="0.7"/>
  <path d="M43,82 Q45,92 47,98" stroke="#b88a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <path d="M77,82 Q79,92 81,98" stroke="#b88a50" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Wind-blown strand on one side -->
  <path d="M30,66 Q26,72 28,80" stroke="url(#hair)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- === FACE (barely visible — looking down) === -->
  <path d="M51,80 Q55,78 59,80" stroke="#7a5a3a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M63,80 Q67,78 71,80" stroke="#7a5a3a" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- === FLOWER ACCESSORY (left side of head from above) === -->
  <g transform="translate(35,40)" filter="url(#shadow)">
    <circle cx="0" cy="-4" r="5" fill="#e87060" opacity="0.9"/>
    <circle cx="-5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="5" cy="-1" r="5" fill="#e87060" opacity="0.85"/>
    <circle cx="-3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="3" cy="4" r="5" fill="#e87060" opacity="0.8"/>
    <circle cx="0" cy="0" r="3.5" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="1.8" fill="#f5e6b8" opacity="0.7"/>
    <circle cx="0" cy="-5" r="1.5" fill="white" opacity="0.2"/>
  </g>

  <!-- === RIM LIGHT === -->
  <path d="M97,30 Q101,50 99,60 Q97,75 89,78" stroke="white" stroke-width="1.5" fill="none" opacity="0.06" stroke-linecap="round"/>
</svg>
