<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Yoga mat -->
  <polygon points="10,65 90,65 85,50 15,50" fill="#5e8a3c"/>
  <polygon points="15,50 85,50 82,48 18,48" fill="#6a9545"/>
  <line x1="20" y1="56" x2="80" y2="56" stroke="#4a7030" stroke-width="0.8" opacity="0.4"/>
  <!-- Lotus flower -->
  <g transform="translate(50,30)">
    <!-- Petals -->
    <ellipse cx="0" cy="-12" rx="6" ry="10" fill="#c9886e" opacity="0.8"/>
    <ellipse cx="-11" cy="-5" rx="6" ry="10" fill="#c9886e" opacity="0.75" transform="rotate(-60,0,0)"/>
    <ellipse cx="11" cy="-5" rx="6" ry="10" fill="#c9886e" opacity="0.75" transform="rotate(60,0,0)"/>
    <ellipse cx="-8" cy="6" rx="6" ry="9" fill="#d4a0a0" opacity="0.7" transform="rotate(-30,0,0)"/>
    <ellipse cx="8" cy="6" rx="6" ry="9" fill="#d4a0a0" opacity="0.7" transform="rotate(30,0,0)"/>
    <ellipse cx="0" cy="8" rx="5" ry="8" fill="#d4a0a0" opacity="0.65"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="6" fill="#d4a843"/>
    <circle cx="-1" cy="-1" r="2.5" fill="#f5e6b8" opacity="0.7"/>
  </g>
</svg>
