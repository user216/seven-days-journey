<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <!-- Left page -->
  <polygon points="28,60 48,55 48,15 28,20" fill="#f5e6b8"/>
  <!-- Right page -->
  <polygon points="52,55 72,60 72,20 52,15" fill="#f8eed0"/>
  <!-- Spine -->
  <line x1="50" y1="15" x2="50" y2="58" stroke="#8b7355" stroke-width="2.5"/>
  <!-- Lines on left page -->
  <line x1="32" y1="28" x2="46" y2="26" stroke="#9e9578" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="34" x2="46" y2="32" stroke="#9e9578" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="40" x2="46" y2="38" stroke="#9e9578" stroke-width="0.8" opacity="0.5"/>
  <line x1="32" y1="46" x2="42" y2="44" stroke="#9e9578" stroke-width="0.8" opacity="0.5"/>
  <!-- Lines on right page -->
  <line x1="54" y1="26" x2="68" y2="28" stroke="#9e9578" stroke-width="0.8" opacity="0.5"/>
  <line x1="54" y1="32" x2="68" y2="34" stroke="#9e9578" stroke-width="0.8" opacity="0.5"/>
  <line x1="54" y1="38" x2="66" y2="40" stroke="#9e9578" stroke-width="0.8" opacity="0.5"/>
  <!-- Pencil -->
  <line x1="65" y1="62" x2="78" y2="38" stroke="#d4a843" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="38" x2="80" y2="34" stroke="#8b7355" stroke-width="2" stroke-linecap="round"/>
  <!-- Pencil tip -->
  <polygon points="80,34 79,32 81,32" fill="#3d3929"/>
</svg>
