  <line x1="50" y1="5" x2="50" y2="28" stroke="#8b7355" stroke-width="2"/>
  <!-- Page lines -->
  <line x1="32" y1="15" x2="46" y2="13" stroke="#9e9578" stroke-width="0.6" opacity="0.4"/>
  <line x1="32" y1="19" x2="46" y2="17" stroke="#9e9578" stroke-width="0.6" opacity="0.4"/>
  <line x1="54" y1="13" x2="68" y2="15" stroke="#9e9578" stroke-width="0.6" opacity="0.4"/>
  <line x1="54" y1="17" x2="68" y2="19" stroke="#9e9578" stroke-width="0.6" opacity="0.4"/>
</svg>
