<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Outer glow -->
  <circle cx="60" cy="60" r="55" fill="#f5e6b8" opacity="0.15"/>
  <circle cx="60" cy="60" r="45" fill="#f5e6b8" opacity="0.25"/>
  <!-- Rays -->
  <g stroke="#d4a843" stroke-width="2.5" opacity="0.35">
    <line x1="60" y1="2" x2="60" y2="16"/>
    <line x1="60" y1="104" x2="60" y2="118"/>
    <line x1="2" y1="60" x2="16" y2="60"/>
    <line x1="104" y1="60" x2="118" y2="60"/>
    <line x1="18.5" y1="18.5" x2="28" y2="28"/>
    <line x1="92" y1="92" x2="101.5" y2="101.5"/>
    <line x1="101.5" y1="18.5" x2="92" y2="28"/>
    <line x1="28" y1="92" x2="18.5" y2="101.5"/>
    <!-- Shorter intermediate rays -->
    <line x1="34" y1="7" x2="38" y2="18" opacity="0.25"/>
    <line x1="86" y1="7" x2="82" y2="18" opacity="0.25"/>
    <line x1="7" y1="34" x2="18" y2="38" opacity="0.25"/>
    <line x1="113" y1="34" x2="102" y2="38" opacity="0.25"/>
  </g>
  <!-- Main body -->
  <circle cx="60" cy="60" r="28" fill="#d4a843"/>
  <!-- Bright center -->
  <circle cx="60" cy="60" r="18" fill="#f5e6b8"/>
  <!-- Hot spot -->
  <circle cx="55" cy="55" r="8" fill="#fffde8" opacity="0.7"/>
</svg>
