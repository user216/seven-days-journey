<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <!-- Mountain body -->
  <polygon points="0,120 100,15 200,120" fill="#8b9880"/>
  <!-- Darker face -->
  <polygon points="100,15 200,120 130,120" fill="#7a8870" opacity="0.7"/>
  <!-- Snow cap -->
  <polygon points="80,42 100,15 120,42" fill="white" opacity="0.65"/>
  <!-- Snow edge detail -->
  <path d="M80,42 Q85,46 90,42 Q95,38 100,42 Q105,46 110,42 Q115,38 120,42" fill="white" opacity="0.4"/>
  <!-- Ridge highlight -->
  <line x1="100" y1="15" x2="80" y2="42" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
